          if (!this.isFarFromPlanets(x, y, 520)) continue;
          if (!this.isFarFromOtherTarantulas(x, y, 2400)) continue;
          if (!this.canPlaceBody(x, y, spec, 26)) continue;

          this.registerProceduralBody(this.buildBody(x, y, spec));
          return true;
        }

        return false;
      }

      spawnInitialBodies() {
        let hosts = this.collectPlanetHosts();
        let planetAttempts = 0;

        while (hosts.length < this.targetHostCount && planetAttempts < 500) {
          planetAttempts++;

          const spec = this.createPlanetSpec();
          const angle = randomBetween(0, Math.PI * 2);
          const distance = randomBetween(1400, this.spawnRadius - 700);
          const x = this.player.x + Math.cos(angle) * distance;
          const y = this.player.y + Math.sin(angle) * distance;

          if (!this.canPlaceBody(x, y, spec, 120)) continue;

          const body = this.registerProceduralBody(this.buildBody(x, y, spec));
          hosts.push(body);
        }

        const remainingInitialBodies = Math.max(0, this.initialBodyCount - this.getProceduralCount());
        let desiredOrbiters = Math.min(
          Math.floor(remainingInitialBodies * 0.28),
          hosts.length * 24
        );
        let orbiterAttempts = 0;

        while (desiredOrbiters > 0 && orbiterAttempts < desiredOrbiters * 20) {
          orbiterAttempts++;
          const host = hosts[randomInt(0, hosts.length - 1)];
          if (!host) break;

          if (this.spawnOrbiterAroundHost(host)) {
            desiredOrbiters--;
          }
        }

        let scatterAttempts = 0;
        const maxScatterAttempts = this.initialBodyCount * 30;

        while (this.getProceduralCount() < this.initialBodyCount - this.targetStationCount && scatterAttempts < maxScatterAttempts) {
          scatterAttempts++;

          const planetChance = this.getProceduralCount() < 60 ? 0.03 : 0.012;
          const spawned = this.spawnScatteredBody(planetChance, 680);

          if (!spawned && hosts.length > 0 && Math.random() < 0.45) {
            const host = hosts[randomInt(0, hosts.length - 1)];
            this.spawnOrbiterAroundHost(host);
          }
        }

        let stationAttempts = 0;
        while (this.stationCount < this.targetStationCount && stationAttempts < this.targetStationCount * 40) {
          stationAttempts++;
          this.spawnScatteredStation(950);
        }

        let fleaAttempts = 0;
        while (this.fleaCount < this.targetFleaCount && fleaAttempts < this.targetFleaCount * 8) {
          fleaAttempts++;
          this.spawnFleaSchool(1100);
        }

        let waspAttempts = 0;
        while (this.waspCount < this.targetWaspCount && waspAttempts < this.targetWaspCount * 6) {
          waspAttempts++;
          this.spawnWaspSquad(1250);
        }

        let dragonflyAttempts = 0;
        while (this.dragonflyCount < this.targetDragonflyCount && dragonflyAttempts < this.targetDragonflyCount * 8) {
          dragonflyAttempts++;
          this.spawnDragonflySquad(1350);
        }

        let minerAttempts = 0;
        while (this.minerCount < this.targetMinerCount && minerAttempts < this.targetMinerCount * 10) {
          minerAttempts++;
          this.spawnScatteredMiner(1200);
        }

        let tarantulaAttempts = 0;
        while (this.tarantulaCount < this.targetTarantulaCount && tarantulaAttempts < this.targetTarantulaCount * 14) {
          tarantulaAttempts++;
          this.spawnScatteredTarantula(1800);
        }
      }

      spawnBodyOnMovement(movementAngle) {
        if (this.getProceduralCount() >= this.maxProceduralBodies) {
          return false;
        }

        for (let attempt = 0; attempt < 36; attempt++) {
          const spec = this.createRandomBodySpec(0.025);
          const angle = movementAngle + randomBetween(-Math.PI * 0.95, Math.PI * 0.95);
          const x = this.player.x + Math.cos(angle) * this.spawnRadius;
          const y = this.player.y + Math.sin(angle) * this.spawnRadius;

          if (!this.canPlaceBody(x, y, spec, 2)) continue;

          this.registerProceduralBody(this.buildBody(x, y, spec));
          return true;
        }

        return false;
      }

      spawnStationOnMovement(movementAngle) {
        if (this.stationCount >= this.targetStationCount || this.getProceduralCount() >= this.maxProceduralBodies) {
          return false;
        }

        const hosts = this.collectPlanetHosts().filter((host) => {
          const hostDistSq = distanceSquared(host.x, host.y, this.player.x, this.player.y);
          return hostDistSq < (this.spawnRadius - 260) * (this.spawnRadius - 260);
        });

        shuffleInPlace(hosts);

        for (let i = 0; i < hosts.length; i++) {
          const host = hosts[i];
          const hostAngle = Math.atan2(host.y - this.player.y, host.x - this.player.x);
          const angleDelta = Math.abs(wrapAngle(hostAngle - movementAngle));

          if (angleDelta > Math.PI * 0.85) {
            continue;
          }

          if (this.spawnStationAroundHost(host, 900, null)) {
            return true;
          }
        }

        return this.spawnScatteredStation(900);
      }

      spawnFleaSchool(minDistanceFromPlayer = 950, preferredAngle = null) {
        if (this.fleaCount >= this.targetFleaCount || this.getProceduralCount() >= this.maxProceduralBodies) {
          return false;
        }

        const schoolSize = Math.min(
          randomInt(8, 16),
          this.maxProceduralBodies - this.getProceduralCount(),
          this.targetFleaCount - this.fleaCount
        );

        if (schoolSize < 8) {
          return false;
        }

        for (let attempt = 0; attempt < 26; attempt++) {
          const schoolId = this.nextSchoolId++;
          const angle = preferredAngle ?? randomBetween(0, Math.PI * 2);
          const distance = randomBetween(minDistanceFromPlayer, this.spawnRadius - 260);
          const centerX = this.player.x + Math.cos(angle) * distance;
          const centerY = this.player.y + Math.sin(angle) * distance;
          const travelAngle = angle + randomBetween(-0.2, 0.2) + Math.PI;
          const cruiseSpeed = randomBetween(120, 180);
          const anchorVX = Math.cos(travelAngle) * cruiseSpeed;
          const anchorVY = Math.sin(travelAngle) * cruiseSpeed;
          const sharedCruiseSpeed = randomBetween(150, 190);
          const sharedMaxCruiseSpeed = randomBetween(440, 520);
          const sharedMaxAcceleration = randomBetween(1320, 1620);
          const sharedSenseRadius = randomBetween(340, 390);
          const sharedPreferredRadius = randomBetween(18, 24);
          const schoolPhase = randomBetween(0, Math.PI * 2);
          const placements = [];
          let ok = true;

          for (let i = 0; i < schoolSize; i++) {
            const spec = this.createFleaSpec(schoolId, anchorVX, anchorVY);
            spec.schoolCruiseSpeed = sharedCruiseSpeed;
            spec.maxCruiseSpeed = sharedMaxCruiseSpeed;
            spec.maxAcceleration = sharedMaxAcceleration;
            spec.schoolSenseRadius = sharedSenseRadius;
            spec.preferredSchoolRadius = sharedPreferredRadius;
            spec.schoolPhase = schoolPhase;
            const memberAngle = (i / schoolSize) * Math.PI * 2 + randomBetween(-0.04, 0.04);
            const memberRadius = randomBetween(6, 14) + (i % 3) * 1.5;
            const x = centerX + Math.cos(memberAngle) * memberRadius;
            const y = centerY + Math.sin(memberAngle) * memberRadius;
            if (!this.canPlaceBody(x, y, spec, 0)) {
              ok = false;
              break;
            }
            placements.push({ x, y, spec });
          }

          if (!ok) continue;

          for (const placement of placements) {
            this.registerProceduralBody(this.buildBody(placement.x, placement.y, placement.spec));
          }
          return true;
        }

        return false;
      }

      spawnWaspSquad(minDistanceFromPlayer = 1200, preferredAngle = null) {
        if (this.waspCount >= this.targetWaspCount || this.getProceduralCount() >= this.maxProceduralBodies) {
          return false;
        }

        const capacity = this.maxProceduralBodies - this.getProceduralCount();
        if (capacity < 6) return false;
        const squadSize = Math.min(randomInt(12, 26), capacity, this.targetWaspCount - this.waspCount);
        if (squadSize < 6) return false;

        for (let attempt = 0; attempt < 24; attempt++) {
          const squadId = this.nextSchoolId++;
          const angle = preferredAngle ?? randomBetween(0, Math.PI * 2);
          const distance = randomBetween(minDistanceFromPlayer, this.spawnRadius - 280);
          const centerX = this.player.x + Math.cos(angle) * distance;
          const centerY = this.player.y + Math.sin(angle) * distance;
          const travelAngle = angle + Math.PI + randomBetween(-0.32, 0.32);
          const cruiseSpeed = randomBetween(110, 150);
          const anchorVX = Math.cos(travelAngle) * cruiseSpeed;
          const anchorVY = Math.sin(travelAngle) * cruiseSpeed;
          const sharedSenseRadius = randomBetween(300, 360);
          const sharedPreferredRadius = randomBetween(34, 44);
          const sharedCruiseSpeed = randomBetween(118, 142);
          const sharedMaxCruiseSpeed = randomBetween(248, 282);
          const sharedMaxAcceleration = randomBetween(318, 352);
          const sharedPhase = randomBetween(0, Math.PI * 2);
          const placements = [];
          let ok = true;

          for (let i = 0; i < squadSize; i++) {
            const wantsLarge = squadSize >= 6 && (i === 0 || (Math.random() < 0.22 && i < 3));
            const spec = this.createWaspSpec(squadId, wantsLarge ? "large" : "small", anchorVX, anchorVY);
            spec.squadSenseRadius = sharedSenseRadius;
            spec.preferredSquadRadius = wantsLarge ? sharedPreferredRadius + 6 : sharedPreferredRadius;
            spec.squadCruiseSpeed = wantsLarge ? sharedCruiseSpeed - 10 : sharedCruiseSpeed;
            spec.maxCruiseSpeed = wantsLarge ? sharedMaxCruiseSpeed - 14 : sharedMaxCruiseSpeed;
            spec.maxAcceleration = wantsLarge ? sharedMaxAcceleration - 16 : sharedMaxAcceleration;
            spec.squadPhase = sharedPhase;
            const memberAngle = (i / squadSize) * Math.PI * 2 + randomBetween(-0.08, 0.08);
            const memberRadius = randomBetween(14, 30) + (wantsLarge ? 8 : 0);
            const x = centerX + Math.cos(memberAngle) * memberRadius;
            const y = centerY + Math.sin(memberAngle) * memberRadius;
            if (!this.canPlaceBody(x, y, spec, 0)) {
              ok = false;
              break;
            }
            placements.push({ x, y, spec });
          }

          if (!ok) continue;
          for (const placement of placements) {
            this.registerProceduralBody(this.buildBody(placement.x, placement.y, placement.spec));
          }
          return true;
        }

        return false;
      }

      spawnDragonflySquad(minDistanceFromPlayer = 1300, preferredAngle = null) {
        if (this.dragonflyCount >= this.targetDragonflyCount || this.getProceduralCount() >= this.maxProceduralBodies) {
          return false;
        }

        const capacity = this.maxProceduralBodies - this.getProceduralCount();
        if (capacity < 4) return false;
        const squadSize = Math.min(randomInt(4, 8), capacity, this.targetDragonflyCount - this.dragonflyCount);
        if (squadSize < 4) return false;

        for (let attempt = 0; attempt < 24; attempt++) {
          const squadId = this.nextSchoolId++;
          const angle = preferredAngle ?? randomBetween(0, Math.PI * 2);
          const distance = randomBetween(minDistanceFromPlayer, this.spawnRadius - 300);
          const centerX = this.player.x + Math.cos(angle) * distance;
          const centerY = this.player.y + Math.sin(angle) * distance;
          const travelAngle = angle + Math.PI + randomBetween(-0.28, 0.28);
          const cruiseSpeed = randomBetween(92, 122);
          const anchorVX = Math.cos(travelAngle) * cruiseSpeed;
          const anchorVY = Math.sin(travelAngle) * cruiseSpeed;
          const sharedSenseRadius = randomBetween(280, 340);
          const sharedPreferredRadius = randomBetween(38, 50);
          const sharedCruiseSpeed = randomBetween(108, 132);
          const sharedMaxCruiseSpeed = randomBetween(260, 296);
          const sharedMaxAcceleration = randomBetween(332, 372);
          const sharedPhase = randomBetween(0, Math.PI * 2);
          const placements = [];
          let ok = true;

          for (let i = 0; i < squadSize; i++) {
            const wantsLarge = squadSize >= 3 && (i === 0 || (Math.random() < 0.25 && i === squadSize - 1));
            const spec = this.createDragonflySpec(squadId, wantsLarge ? "large" : "small", anchorVX, anchorVY);
            spec.squadSenseRadius = sharedSenseRadius;
            spec.preferredSquadRadius = wantsLarge ? sharedPreferredRadius + 8 : sharedPreferredRadius;
            spec.squadCruiseSpeed = wantsLarge ? sharedCruiseSpeed - 8 : sharedCruiseSpeed;
            spec.maxCruiseSpeed = wantsLarge ? sharedMaxCruiseSpeed - 10 : sharedMaxCruiseSpeed;
            spec.maxAcceleration = wantsLarge ? sharedMaxAcceleration - 14 : sharedMaxAcceleration;
            spec.squadPhase = sharedPhase;
            const memberAngle = (i / squadSize) * Math.PI * 2 + randomBetween(-0.07, 0.07);
            const memberRadius = randomBetween(18, 34) + (wantsLarge ? 10 : 0);
            const x = centerX + Math.cos(memberAngle) * memberRadius;
            const y = centerY + Math.sin(memberAngle) * memberRadius;
            if (!this.canPlaceBody(x, y, spec, 0)) {
              ok = false;
              break;
            }
            placements.push({ x, y, spec });
          }

          if (!ok) continue;
          for (const placement of placements) {
            this.registerProceduralBody(this.buildBody(placement.x, placement.y, placement.spec));
          }
          return true;
        }

        return false;
      }

      despawnFarBodies() {
        const maxDistanceSq = this.despawnRadius * this.despawnRadius;

        for (let i = this.world.bodies.length - 1; i >= 0; i--) {
          const body = this.world.bodies[i];
          if (body === this.player || body.isRemoved) continue;

          if (distanceSquared(body.x, body.y, this.player.x, this.player.y) > maxDistanceSq) {
            this.world.removeBody(body);
          }
        }

        this.world.cleanupRemovedBodies();
      }

      update(dt = 1 / 60) {
        this.despawnFarBodies();

        const dx = this.player.x - this.lastPlayerX;
        const dy = this.player.y - this.lastPlayerY;
        const movedDistance = Math.hypot(dx, dy);
        let movementAngle = randomBetween(0, Math.PI * 2);

        if (!this.spawnsEnabled) {
          this.spawnAccumulator = 0;
          this.lastPlayerX = this.player.x;
          this.lastPlayerY = this.player.y;
          return;
        }

        if (movedDistance > 0.01) {
          this.spawnAccumulator += movedDistance;
          movementAngle = Math.atan2(dy, dx);
          let spawnedThisFrame = 0;

          while (
            this.spawnAccumulator >= this.spawnStep &&
            spawnedThisFrame < this.maxSpawnPerFrame &&
            this.getProceduralCount() < this.maxProceduralBodies
          ) {
            const spawned = this.spawnBodyOnMovement(movementAngle);

            if (!spawned) {
              this.spawnAccumulator = Math.min(this.spawnAccumulator, this.spawnStep);
              break;
            }

            this.spawnAccumulator -= this.spawnStep;
            spawnedThisFrame++;
          }

          let catchUpBudget = Math.min(
            this.maxSpawnPerFrame - spawnedThisFrame,
            Math.max(0, this.targetProceduralBodies - this.getProceduralCount())
          );

          while (catchUpBudget > 0 && this.getProceduralCount() < this.maxProceduralBodies) {
            if (!this.spawnBodyOnMovement(movementAngle)) break;
            spawnedThisFrame++;
            catchUpBudget--;
          }
        }

        if (this.stationCount < this.targetStationCount) {
          let stationBudget = Math.min(2, this.targetStationCount - this.stationCount);

          while (stationBudget > 0 && this.getProceduralCount() < this.maxProceduralBodies) {
            const spawned = movedDistance > 0.01
              ? this.spawnStationOnMovement(movementAngle)
              : this.spawnScatteredStation(900);

            if (!spawned) break;
            stationBudget--;
          }
        }

        this.fleaSpawnCooldown = Math.max(0, this.fleaSpawnCooldown - dt);
        this.waspSpawnCooldown = Math.max(0, this.waspSpawnCooldown - dt);
        this.dragonflySpawnCooldown = Math.max(0, this.dragonflySpawnCooldown - dt);
        this.minerSpawnCooldown = Math.max(0, this.minerSpawnCooldown - dt);
        this.tarantulaSpawnCooldown = Math.max(0, this.tarantulaSpawnCooldown - dt);

        if (
          this.fleaCount <= this.targetFleaCount - 8 &&
          this.getProceduralCount() < this.maxProceduralBodies &&
          this.fleaSpawnCooldown <= 0
        ) {
          if (this.spawnFleaSchool(1000, movedDistance > 0.01 ? movementAngle + randomBetween(-0.55, 0.55) : null)) {
            this.fleaSpawnCooldown = this.fleaSpawnInterval;
          }
        }

        if (
          this.waspCount <= this.targetWaspCount - 8 &&
          this.getProceduralCount() < this.maxProceduralBodies &&
          this.waspSpawnCooldown <= 0
        ) {
          if (this.spawnWaspSquad(1200, movedDistance > 0.01 ? movementAngle + randomBetween(-0.45, 0.45) : null)) {
            this.waspSpawnCooldown = this.waspSpawnInterval;
          }
        }

        if (
          this.dragonflyCount <= this.targetDragonflyCount - 3 &&
          this.getProceduralCount() < this.maxProceduralBodies &&
          this.dragonflySpawnCooldown <= 0
        ) {
          if (this.spawnDragonflySquad(1300, movedDistance > 0.01 ? movementAngle + randomBetween(-0.45, 0.45) : null)) {
            this.dragonflySpawnCooldown = this.dragonflySpawnInterval;
          }
        }

        if (
          this.minerCount < this.targetMinerCount &&
          this.getProceduralCount() < this.maxProceduralBodies &&
          this.minerSpawnCooldown <= 0
        ) {
          if (this.spawnScatteredMiner(1200)) {
            this.minerSpawnCooldown = this.minerSpawnInterval;
          }
        }

        if (
          this.tarantulaCount < this.targetTarantulaCount &&
          this.getProceduralCount() < this.maxProceduralBodies &&
          this.tarantulaSpawnCooldown <= 0
        ) {
          if (this.spawnScatteredTarantula(1700)) {
            this.tarantulaSpawnCooldown = this.tarantulaSpawnInterval;
          }
        }

        this.lastPlayerX = this.player.x;
        this.lastPlayerY = this.player.y;
      }
    }

    const world = new World();

    const playerShip = world.addBody(new PlayerShip({
      x: 0,
      y: -260,
      angle: -Math.PI / 2,
      color: "white",
      faction: "jugador",
      maxHp: 10,
      hp: 10,
      coinPickupRadius: 18
    }));


    const proceduralField = new ProceduralField(world, playerShip);
    proceduralField.spawnInitialBodies();

    factionSystem.defineFaction("jugador", { selfRelation: 100 });
    factionSystem.defineFaction("Mercader Ambulante", { selfRelation: 100 });
    factionSystem.defineFaction("Pulgas", { selfRelation: 100 });
    factionSystem.defineFaction("Avispas", { selfRelation: 100 });
    factionSystem.defineFaction("Libélulas", { selfRelation: 100 });
    factionSystem.defineFaction("Mineros", { selfRelation: 100 });
    factionSystem.defineFaction("Tarántulas", { selfRelation: 100 });
    factionSystem.setPair("jugador", "Mercader Ambulante", 50, 50);
    factionSystem.setPair("jugador", "Pulgas", 0, 0);
    factionSystem.setPair("Mercader Ambulante", "Pulgas", 0, 0);
    factionSystem.setPair("jugador", "Avispas", 50, 50);
    factionSystem.setPair("jugador", "Libélulas", 50, 50);
    factionSystem.setPair("Mercader Ambulante", "Avispas", 50, 50);
    factionSystem.setPair("Mercader Ambulante", "Libélulas", 50, 50);

    function applyFactionHitConsequences(attackerFaction, targetFaction, damageAmount = 1) {
      if (!attackerFaction || !targetFaction || attackerFaction === targetFaction) {
        return;
      }

      const scaled = clamp((damageAmount || 1) * 5, 6, 18);
      const equilibriumScaled = scaled * 0.7;

      if (targetFaction === "Avispas") {
        factionSystem.addRelation(attackerFaction, "Avispas", -scaled);
        factionSystem.addEquilibrium(attackerFaction, "Avispas", -equilibriumScaled);
        factionSystem.addRelation(attackerFaction, "Libélulas", scaled);
        factionSystem.addEquilibrium(attackerFaction, "Libélulas", equilibriumScaled);
      } else if (targetFaction === "Libélulas") {
        factionSystem.addRelation(attackerFaction, "Libélulas", -scaled);
        factionSystem.addEquilibrium(attackerFaction, "Libélulas", -equilibriumScaled);
        factionSystem.addRelation(attackerFaction, "Avispas", scaled);
        factionSystem.addEquilibrium(attackerFaction, "Avispas", equilibriumScaled);
      }
    }

    function drawVerticalScrollbar(x, y, viewportHeight, contentHeight, scrollOffset, accentColor = "rgba(255,255,255,0.85)") {
      if (!(contentHeight > viewportHeight + 0.5)) return;

      const trackWidth = 8;
      const trackX = x - trackWidth;
      ctx.fillStyle = "rgba(255,255,255,0.09)";
      ctx.fillRect(trackX, y, trackWidth, viewportHeight);

      const thumbHeight = Math.max(28, viewportHeight * (viewportHeight / contentHeight));
      const scrollRange = Math.max(1, contentHeight - viewportHeight);
      const thumbY = y + (viewportHeight - thumbHeight) * (scrollOffset / scrollRange);
      ctx.fillStyle = accentColor;
      ctx.fillRect(trackX, thumbY, trackWidth, thumbHeight);
    }

    function getShopDefinitionByKey(key) {

    function getAvailableShopDefinitions(excludeKeys = []) {
      const exclude = new Set(excludeKeys);

      return shopCatalog.filter((definition) => {

    function isMerchantAlly(station) {

    function buildMerchantServiceEntry(definition, station) {
      return {
        kind: "service",
        key: definition.key,
        title: definition.title,
        description: definition.getDescription(playerShip),
        cost: isMerchantAlly(station) ? 0 : definition.getCost(playerShip),
        available: !definition.isAvailable || definition.isAvailable(playerShip)
      };
    }

    function refreshShopEntries() {
      const services = merchantServiceCatalog.map((definition) => buildMerchantServiceEntry(definition, shopState.station));
      const upgrades = shopState.offers.map((offer) => ({
        kind: "upgrade",
        ...offer,
        available: true
      }));
      shopState.entries = [...services, ...upgrades];
    }

    function buildShopOffer(definition) {
      return {
        key: definition.key,
        title: definition.title,
        description: definition.getDescription(playerShip),
        cost: definition.getCost(playerShip)
      };
    }

    function generateShopOffers(count = 5) {
      const definitions = getAvailableShopDefinitions();
      shuffleInPlace(definitions);
      return definitions.slice(0, Math.min(count, definitions.length)).map(buildShopOffer);
    }

    function refreshShopOffers() {
      shopState.offers = shopState.offers.map((offer) => {
        const definition = getShopDefinitionByKey(offer.key);
        if (!definition) return offer;
        return buildShopOffer(definition);
      });
      if (shopState.isOpen) {
        refreshShopEntries();
      }
    }

    function rerollShopOffer(index) {
      const excludeKeys = shopState.offers
        .filter((offer, offerIndex) => offerIndex !== index)
        .map((offer) => offer.key);

      let definitions = getAvailableShopDefinitions(excludeKeys);

      if (definitions.length === 0) {
        definitions = getAvailableShopDefinitions();
      }

      if (definitions.length === 0) {
        return;
      }

      shuffleInPlace(definitions);
      shopState.offers[index] = buildShopOffer(definitions[0]);
    }

    function findNearbyStation() {
      if (!world.grid) {
        return null;
      }

      let nearestStation = null;
      let bestDistSq = Infinity;
      const queryRadius = 220;
      const stamp = world.gravityQueryStamp++;

      world.grid.forEachNearbyUnique(playerShip.x, playerShip.y, queryRadius, stamp, (body) => {
        if (body.isRemoved || body.kind !== "station") return;

        const interactionRadius = body.interactionRadius ?? (body.radius + 120);
        const distSq = distanceSquared(body.x, body.y, playerShip.x, playerShip.y);

        if (distSq <= interactionRadius * interactionRadius && distSq < bestDistSq) {
          nearestStation = body;
          bestDistSq = distSq;
        }
      });

      return nearestStation;
    }

    function pickBodyUnderCursor(options = {}) {
      if (!world.grid) {
        return null;
      }

      const includePlayer = options.includePlayer ?? false;
      const includeProjectiles = options.includeProjectiles ?? false;
      const includeCoins = options.includeCoins ?? false;
      const pickRadius = options.pickRadius ?? 28;
      let bestBody = null;
      let bestScore = Infinity;
      const stamp = world.gravityQueryStamp++;

      world.grid.forEachNearbyUnique(mouse.worldX, mouse.worldY, pickRadius, stamp, (body) => {
        if (body.isRemoved) {
          return;
        }
        if (!includePlayer && body === playerShip) {
          return;
        }
        if (!includeProjectiles && body.kind === "projectile") {
          return;
        }
        if (!includeCoins && body.kind === "coin") {
          return;
        }

        const dx = mouse.worldX - body.x;
        const dy = mouse.worldY - body.y;
        const dist = Math.hypot(dx, dy);
        const allowed = body.radius + pickRadius;
        if (dist > allowed) {
          return;
        }

        const score = Math.max(0, dist - body.radius) - Math.min(body.radius, 32) * 0.12;
        if (score < bestScore) {
          bestScore = score;
          bestBody = body;
        }
      });

      return bestBody;
    }

    function findBodyUnderCursor() {
      return pickBodyUnderCursor();
    }

    function findManipulableBodyUnderCursor() {
      return pickBodyUnderCursor({ includePlayer: true, includeCoins: false, includeProjectiles: false, pickRadius: 34 });
    }

    function openShop(station) {
      if (!station || !playerShip.isAlive || world.isGameOver) {
        return;
      }

      if (factionSystem.getDisposition(playerShip.faction, station.faction) === "enemy") {
        world.lastMerchantRefusalTimer = 2.8;
        return;
      }

      shopState.isOpen = true;
      shopState.station = station;
      shopState.offers = generateShopOffers(5);
      refreshShopEntries();
      shopState.buttons = [];
      shopState.hoverIndex = -1;
      resetMenuScroll(shopState);
    }

    function closeShop() {
      shopState.isOpen = false;
      shopState.station = null;
      shopState.offers = [];
      shopState.entries = [];
      shopState.buttons = [];
      shopState.hoverIndex = -1;
      resetMenuScroll(shopState);
      canvas.style.cursor = "crosshair";
    }

    function attemptPurchaseEntry(index) {
      if (!shopState.isOpen) return false;

      const entry = shopState.entries[index];
      if (!entry || entry.available === false) return false;
      if (playerShip.credits < entry.cost) return false;

      if (entry.kind === "service") {
        const definition = merchantServiceCatalog.find((service) => service.key === entry.key);
        if (!definition) return false;
        if (definition.isAvailable && !definition.isAvailable(playerShip)) return false;

        playerShip.credits -= entry.cost;
        definition.apply(playerShip);
        refreshShopOffers();
        refreshShopEntries();
        return true;
      }

      const offerIndex = Math.max(0, index - merchantServiceCatalog.length);
      const offer = shopState.offers[offerIndex];
      if (!offer) return false;

      const definition = getShopDefinitionByKey(offer.key);
      if (!definition) return false;
      if (definition.isAvailable && !definition.isAvailable(playerShip)) return false;

      playerShip.credits -= offer.cost;
      definition.apply(playerShip);
      if (shopState.station?.faction && offer.cost > 0) {
        factionSystem.addRelation(playerShip.faction, shopState.station.faction, offer.cost / 10);
      }
      rerollShopOffer(offerIndex);
      refreshShopOffers();
      refreshShopEntries();
      return true;
    }

    function handleMenuHotkeys(e) {
      if (e.code === "KeyP") {
        if (testCheats.testMode) {
          return;
        }
        if (!shopState.isOpen && !factionMenuState.isOpen && !world.isGameOver) {
          pauseState.manual = !pauseState.manual;
        }
        e.preventDefault();
        return;
      }

      if (e.code === "KeyQ") {
        factionMenuState.isOpen = !factionMenuState.isOpen;
        if (factionMenuState.isOpen) {
          pauseState.manual = false;
          resetMenuScroll(factionMenuState);
        }
        e.preventDefault();
        return;
      }

      if (e.code === "KeyE") {
        if (shopState.isOpen) {
          closeShop();
        } else if (!factionMenuState.isOpen) {
          const station = findNearbyStation();
          if (station && playerShip.isAlive) {
            openShop(station);
          }
        }

        e.preventDefault();
        return;
      }

      if (factionMenuState.isOpen && (e.key === "Escape" || e.code === "KeyQ")) {
        factionMenuState.isOpen = false;
        resetMenuScroll(factionMenuState);
        e.preventDefault();
        return;
      }

      const activeScrollableMenu = shopState.isOpen ? shopState : (factionMenuState.isOpen ? factionMenuState : null);
      if (activeScrollableMenu) {
        const lineStep = 52;
        const pageStep = Math.max(120, (activeScrollableMenu.viewport?.h || 0) - 48);
        if (e.key === "ArrowDown") {
          scrollMenu(activeScrollableMenu, lineStep);
          e.preventDefault();
          return;
        }
        if (e.key === "ArrowUp") {
          scrollMenu(activeScrollableMenu, -lineStep);
          e.preventDefault();
          return;
        }
        if (e.key === "PageDown") {
          scrollMenu(activeScrollableMenu, pageStep);
          e.preventDefault();
          return;
        }
        if (e.key === "PageUp") {
          scrollMenu(activeScrollableMenu, -pageStep);
          e.preventDefault();
          return;
        }
        if (e.key === "Home") {
          activeScrollableMenu.scrollOffset = 0;
          e.preventDefault();
          return;
        }
        if (e.key === "End") {
          activeScrollableMenu.scrollOffset = Math.max(0, activeScrollableMenu.maxScroll || 0);
          e.preventDefault();
          return;
        }
      }

      if (!shopState.isOpen) {
        return;
      }

      if (e.key === "Escape") {
        closeShop();
        e.preventDefault();
        return;
      }

      if (/^[1-8]$/.test(e.key)) {
        attemptPurchaseEntry(Number(e.key) - 1);
        e.preventDefault();
      }
    }

    function getCanvasPointer(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * (canvas.width / rect.width),
        y: (event.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    canvas.addEventListener("mousemove", (event) => {
      const pointer = getCanvasPointer(event);
      mouse.x = pointer.x;
      mouse.y = pointer.y;
      updateMouseWorld();

      if (!shopState.isOpen) {
        canvas.style.cursor = factionMenuState.isOpen ? "default" : "crosshair";
        return;
      }

      let hoverIndex = -1;

      for (let i = 0; i < shopState.buttons.length; i++) {
        const button = shopState.buttons[i];
        if (
          pointer.x >= button.x &&
          pointer.x <= button.x + button.w &&
          pointer.y >= button.y &&
          pointer.y <= button.y + button.h
        ) {
          hoverIndex = button.index;
          break;
        }
      }

      shopState.hoverIndex = hoverIndex;
      canvas.style.cursor = hoverIndex >= 0 ? "pointer" : "default";
    });

    canvas.addEventListener("mouseleave", () => {
      shopState.hoverIndex = -1;
      mouse.left = false;
      mouse.right = false;
      mouse.brakeLockTarget = null;
      canvas.style.cursor = "default";
    });

    canvas.addEventListener("contextmenu", (event) => {
      event.preventDefault();
    });

    canvas.addEventListener("wheel", (event) => {
      const activeScrollableMenu = shopState.isOpen ? shopState : (factionMenuState.isOpen ? factionMenuState : null);
      if (!activeScrollableMenu) return;
      scrollMenu(activeScrollableMenu, event.deltaY);
      event.preventDefault();
    }, { passive: false });

    canvas.addEventListener("mousedown", (event) => {
      const pointer = getCanvasPointer(event);
      mouse.x = pointer.x;
      mouse.y = pointer.y;
      updateMouseWorld();

      if (!shopState.isOpen) {
        if (event.button === 0) {
          mouse.left = true;
          event.preventDefault();
        } else if (event.button === 2) {
          mouse.right = true;
          mouse.brakeLockTarget = findBodyUnderCursor();
          event.preventDefault();
        }
        return;
      }

      if (event.button !== 0) {
        event.preventDefault();
        return;
      }

      for (let i = 0; i < shopState.buttons.length; i++) {
        const button = shopState.buttons[i];
        if (
          pointer.x >= button.x &&
          pointer.x <= button.x + button.w &&
          pointer.y >= button.y &&
          pointer.y <= button.y + button.h
        ) {
          attemptPurchaseEntry(button.index);
          event.preventDefault();
          return;
        }
      }
    });

    window.addEventListener("mouseup", (event) => {
      if (event.button === 0) {
        mouse.left = false;
      } else if (event.button === 2) {
        mouse.right = false;
      }
    });

    function fireProjectile(ship) {
      if (!ship.isAlive) {
        return false;
      }

      const shotCount = ship.projectilesPerShot;
      const ammoCost = ship.getAmmoCostPerShot();

      if (ship.ammo < ammoCost) {
        return false;
      }

      ship.ammo -= ammoCost;

      const projectileRadius = 3;
      const muzzleDistance = ship.radius + projectileRadius + 6;
      const centerOffset = (shotCount - 1) * 0.5;
      const projectileColor = ship.projectileColor ?? (ship.kind === "station" ? "#8ee7ff" : ship.color ?? "white");

      for (let i = 0; i < shotCount; i++) {
        const offset = (i - centerOffset) * ship.projectileSpread;
        const shotAngle = ship.angle + offset;
        const dirX = Math.cos(shotAngle);
        const dirY = Math.sin(shotAngle);

        world.addBody(new ProjectileBody({
          x: ship.x + dirX * muzzleDistance,
          y: ship.y + dirY * muzzleDistance,
          vx: ship.vx + dirX * ship.projectileSpeed,
          vy: ship.vy + dirY * ship.projectileSpeed,
          angle: shotAngle,
          radius: projectileRadius,
          mass: 0.08,
          color: projectileColor,
          owner: ship,
          faction: ship.faction ?? null,
          damage: ship.projectileDamage ?? 1,
          originX: ship.x,
          originY: ship.y,
          isProcedural: false,
          isFieldBody: false
        }));
      }

      return true;
    }

    function updatePlayerWeapons(dt) {
      if (!playerShip.isAlive) {
        playerShip.timeUntilNextShot = 0;
        return;
      }

      playerShip.timeUntilNextShot = Math.max(playerShip.timeUntilNextShot - dt, -0.5);

      if (!mouse.left || playerShip.fireRate <= 0) {
        return;
      }

      const shotInterval = 1 / playerShip.fireRate;
      let guard = 0;

      while (playerShip.timeUntilNextShot <= 0 && guard < 6) {
        if (!fireProjectile(playerShip)) {
          playerShip.timeUntilNextShot = Math.max(playerShip.timeUntilNextShot, 0);
          break;
        }

        playerShip.timeUntilNextShot += shotInterval;
        guard++;
      }
    }


    function isNpcShotLikelySafe(station, target) {
      if (!station || !target || !station.aiWorld || !station.aiWorld.grid) {
        return true;
      }

      const dx = target.x - station.x;
      const dy = target.y - station.y;
      const targetDist = Math.hypot(dx, dy);
      if (!(targetDist > 0.001)) {
        return false;
      }

      const targetDirX = dx / targetDist;
      const targetDirY = dy / targetDist;
      const shotCount = Math.max(1, station.projectilesPerShot | 0);
      const centerOffset = (shotCount - 1) * 0.5;
      const spread = Math.max(0, station.projectileSpread || 0);
      const projectileSpeed = Math.max(1, station.projectileSpeed || 1);
      const muzzleDistance = station.radius + 9;
      const corridorRadius = Math.max(16, projectileSpeed * 0.015 + station.projectilesPerShot * 6 + 8);
      const endPadding = Math.max(24, target.radius + 14);
      const halfRange = targetDist * 0.5;
      const midX = station.x + targetDirX * halfRange;
      const midY = station.y + targetDirY * halfRange;
      const queryRange = halfRange + target.radius + corridorRadius + 64;
      const stamp = station.aiWorld.gravityQueryStamp++;
      let safe = true;

      station.aiWorld.grid.forEachNearbyUnique(midX, midY, queryRange, stamp, (body) => {
        if (body === station || body === target || body.isRemoved) return;
        if (!isShipLike(body)) return;
        if (!body.isAlive) return;

        const disposition = station.getDispositionTo(body.faction);
        if (disposition === "enemy") return;

        for (let pellet = 0; pellet < shotCount; pellet++) {
          const offset = (pellet - centerOffset) * spread;
          const shotAngle = station.angle + offset;
          const dirX = Math.cos(shotAngle);
          const dirY = Math.sin(shotAngle);
          const startX = station.x + dirX * muzzleDistance;
          const startY = station.y + dirY * muzzleDistance;
          const relX = body.x - startX;
          const relY = body.y - startY;
          const along = relX * dirX + relY * dirY;

          if (along <= 0 || along >= targetDist + endPadding) {
            continue;
          }

          const perp = Math.abs(relX * dirY - relY * dirX);
          const avoidRadius = body.radius + corridorRadius;
          if (perp <= avoidRadius) {
            safe = false;
            return false;
          }
        }

        if (!isShipLike(target)) {
          const keepout = target.radius + body.radius + 18;
          if (distanceSquared(body.x, body.y, target.x, target.y) <= keepout * keepout) {
            safe = false;
            return false;
          }
        }
      });

      return safe;
    }

    function updateNpcWeapons(dt) {
      for (let i = 0; i < world.bodies.length; i++) {
        const ship = world.bodies[i];
        if (ship.isRemoved || !isArmedNpcShip(ship) || !ship.isAlive) {
          continue;
        }

        ship.timeUntilNextShot = Math.max(ship.timeUntilNextShot - dt, -0.35);

        const target = ship.combatTarget;
        if (!target || target.isRemoved || (!target.isAlive && isShipLike(target))) {
          continue;
        }

        const dx = target.x - ship.x;
        const dy = target.y - ship.y;
        const dist = Math.hypot(dx, dy);
        const range = ship.kind === "station"
          ? (ship.targetPreference === "enemy" ? ship.enemyWeaponRange : ship.weaponRange)
          : ship.weaponRange;

        if (!(dist > 0.001) || dist > range * 1.05) {
          continue;
        }

        const targetAngle = ship.combatAimAngle ?? Math.atan2(dy, dx);
        const angleError = Math.abs(wrapAngle(targetAngle - ship.angle));

        if (angleError > (ship.fireAngleTolerance ?? 0.22) || ship.fireRate <= 0) {
          continue;
        }

        if (!isNpcShotLikelySafe(ship, target)) {
          continue;
        }

        const shotInterval = 1 / ship.fireRate;
        let guard = 0;
        const burstLimit = ship.kind === "station" ? 2 : 1;

        while (ship.timeUntilNextShot <= 0 && guard < burstLimit) {
          if (!fireProjectile(ship)) {
            ship.timeUntilNextShot = Math.max(ship.timeUntilNextShot, 0);
            break;
          }

          ship.timeUntilNextShot += shotInterval;
          guard++;
        }
      }
    }

    function updateTarantulaDiplomacy(dt) {
      if (!world.grid || !(dt > 0)) return;
      const nearbyFactions = new Set();

      for (let i = 0; i < world.bodies.length; i++) {
        const ship = world.bodies[i];
        if (ship.isRemoved || ship.kind !== "tarantula" || !ship.isAlive) {
          continue;
        }

        const stamp = world.gravityQueryStamp++;
        world.grid.forEachNearbyUnique(ship.x, ship.y, 200, stamp, (body) => {
          if (body.isRemoved || !isShipLike(body) || !body.isAlive || body === ship) return;
          if (!body.faction || body.faction === ship.faction) return;
          if (distanceSquared(ship.x, ship.y, body.x, body.y) <= 200 * 200) {
            nearbyFactions.add(body.faction);
          }
        });
      }

      for (const factionName of nearbyFactions) {
        factionSystem.addRelation("Tarántulas", factionName, dt);
      }
    }

    function updatePlanetResupply(dt) {
      if (!playerShip.isAlive) {
        playerShip.isTouchingPlanet = false;
        playerShip.rechargeReady = false;
        playerShip.refuelTimer = 0;
        return;
      }

      let touchingPlanet = null;
      let bestDistSq = Infinity;
      const queryRadius = 1600;
      const stamp = world.gravityQueryStamp++;

      world.grid.forEachNearbyUnique(playerShip.x, playerShip.y, queryRadius, stamp, (body) => {
        if (body.isRemoved || body.kind !== "planet") return;

        const surfaceRange = body.radius + playerShip.radius + 6;
        const distSq = distanceSquared(body.x, body.y, playerShip.x, playerShip.y);

        if (distSq <= surfaceRange * surfaceRange && distSq < bestDistSq) {
          touchingPlanet = body;
          bestDistSq = distSq;
        }
      });

      playerShip.isTouchingPlanet = !!touchingPlanet;
      const needsRecharge =
        playerShip.fuel < playerShip.maxFuel - 0.001 ||
        playerShip.ammo < playerShip.maxAmmo - 0.001 ||
        playerShip.hp < playerShip.maxHp - 0.001;

      if (touchingPlanet) {
        const rechargeTickSeconds = Math.max(0.05, playerShip.refuelDelay);
        const rechargeMultiplier = dt / rechargeTickSeconds;
        const canHeal = playerShip.timeSinceLastDamage >= 2;
        playerShip.fuel = Math.min(playerShip.maxFuel, playerShip.fuel + 10 * rechargeMultiplier);
        playerShip.ammo = Math.min(playerShip.maxAmmo, playerShip.ammo + 10 * rechargeMultiplier);
        if (canHeal) {
          playerShip.hp = Math.min(playerShip.maxHp, playerShip.hp + 1 * rechargeMultiplier);
        }
        const needsFuel = playerShip.fuel < playerShip.maxFuel - 0.001;
        const needsAmmo = playerShip.ammo < playerShip.maxAmmo - 0.001;
        const needsHp = playerShip.hp < playerShip.maxHp - 0.001;
        const healingBlocked = needsHp && !canHeal;
        playerShip.refuelTimer = (needsFuel || needsAmmo || needsHp) ? rechargeTickSeconds : 0;
        playerShip.rechargeReady = !(needsFuel || needsAmmo || needsHp || healingBlocked);
        playerShip.healReady = canHeal;
      } else {
        playerShip.refuelTimer = 0;
        playerShip.rechargeReady = false;
        playerShip.healReady = false;
      }
    }

    function updateCoinMagnet(dt) {
      if (!world.grid) {
        return;
      }

      for (let i = 0; i < world.bodies.length; i++) {
        const ship = world.bodies[i];
        if (ship.isRemoved || !isShipLike(ship) || !ship.isAlive || ship.coinMagnetRadius <= 0) {
          continue;
        }

        const magnetRadius = ship.coinMagnetRadius;
        const magnetRadiusSq = magnetRadius * magnetRadius;
        const stamp = world.gravityQueryStamp++;

        world.grid.forEachNearbyUnique(ship.x, ship.y, magnetRadius, stamp, (body) => {
          if (body.isRemoved || body.kind !== "coin") return;

          const dx = ship.x - body.x;
          const dy = ship.y - body.y;
          const distSq = dx * dx + dy * dy;

          if (distSq < 1 || distSq > magnetRadiusSq) {
            return;
          }

          const dist = Math.sqrt(distSq);
          const t = 1 - dist / Math.max(1, magnetRadius);
          const pull = 4200 + magnetRadius * 4.8;
          const accel = pull * (1.2 + t * t * 8.8) / Math.max(10, dist * 0.34);
          const invDist = 1 / dist;

          body.vx += dx * invDist * accel * dt;
          body.vy += dy * invDist * accel * dt;
        });
      }
    }

    const camera = {

    function updateCamera(dt) {
      const halfW = canvas.width * 0.5;
      const halfH = canvas.height * 0.5;
      const maxOffsetX = canvas.width * 0.22;
      const maxOffsetY = canvas.height * 0.22;
      const screenDX = mouse.x - halfW;
      const screenDY = mouse.y - halfH;
      const offsetX = clamp(screenDX * 0.42, -maxOffsetX, maxOffsetX);
      const offsetY = clamp(screenDY * 0.42, -maxOffsetY, maxOffsetY);
      const desiredX = playerShip.x - halfW + offsetX;
      const desiredY = playerShip.y - halfH + offsetY;
      const step = Math.max(1 / 240, dt || (1 / 60));
      const follow = 1 - Math.pow(0.0012, step);
      camera.x += (desiredX - camera.x) * follow;
      camera.y += (desiredY - camera.y) * follow;

      const marginX = 36;
      const marginY = 36;
      const minX = playerShip.x - (canvas.width - marginX);
      const maxX = playerShip.x - marginX;
      const minY = playerShip.y - (canvas.height - marginY);
      const maxY = playerShip.y - marginY;
      camera.x = clamp(camera.x, minX, maxX);
      camera.y = clamp(camera.y, minY, maxY);
      updateMouseWorld();
    }

    function drawBackground() {

    function drawStars() {
      const left = camera.x;
      const top = camera.y;
      const right = camera.x + canvas.width;
      const bottom = camera.y + canvas.height;

      ctx.fillStyle = "white";

      const step = 220;
      const startX = Math.floor(left / step) * step;
      const endX = Math.ceil(right / step) * step;
      const startY = Math.floor(top / step) * step;
      const endY = Math.ceil(bottom / step) * step;

      for (let y = startY; y <= endY; y += step) {
        for (let x = startX; x <= endX; x += step) {
          const seed = ((x * 73856093) ^ (y * 19349663)) >>> 0;
          const px = x + (seed % 170);
          const py = y + ((seed >> 8) % 170);
          const r = 1 + ((seed >> 16) % 2);

          ctx.beginPath();
          ctx.arc(px - camera.x, py - camera.y, r, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

      ctx.fillRect(x, y, width, height);

      ctx.fillRect(x, y, width * clampedRatio, height);
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, width, height);
      ctx.restore();

      const rowWidth = panelWidth - 66;
      const footerHeight = 28;
      const listViewportHeight = Math.max(72, panelHeight - (listY - panelY) - footerHeight);
      const totalListHeight = entryCount * rowHeight + Math.max(0, entryCount - 1) * rowGap;
      shopState.viewport = { x: listX, y: listY, w: rowWidth, h: listViewportHeight };
      shopState.maxScroll = Math.max(0, totalListHeight - listViewportHeight);
      clampMenuScroll(shopState);

      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, 0.78)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "rgba(10, 18, 25, 0.94)";
      ctx.fillRect(panelX, panelY, panelWidth, panelHeight);
      ctx.strokeStyle = "rgba(125, 220, 255, 0.55)";
      ctx.lineWidth = 2;
      ctx.strokeRect(panelX, panelY, panelWidth, panelHeight);

      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.fillStyle = "#7ddcff";
      ctx.font = "bold 30px monospace";
      ctx.fillText("MERCADER AMBULANTE", panelX + 26, panelY + 24);

      ctx.font = "16px monospace";
      ctx.fillStyle = "white";
      ctx.fillText("La simulacion esta en pausa. Compra recursos y mejoras con creditos.", panelX + 26, panelY + 68);
      ctx.fillText("Haz clic o pulsa 1-8. E o ESC para salir.", panelX + 26, panelY + 92);

      ctx.textAlign = "right";
      ctx.fillStyle = "#ffd45a";
      ctx.fillText(`creditos: ${Math.trunc(playerShip.credits)}`, panelX + panelWidth - 26, panelY + 32);
      ctx.textAlign = "left";

      ctx.fillStyle = "rgba(255,255,255,0.82)";
      ctx.fillText(
        `arma ${Math.round(playerShip.projectileSpeed)} vel. | ${playerShip.fireRate.toFixed(2)}/s | ${playerShip.projectilesPerShot} balas/disparo | daño ${playerShip.projectileDamage}`,
        panelX + 26,
        panelY + 126
      );
      ctx.fillText(
        `casco ${playerShip.getCrashSpeedThreshold(world.shipCrashSpeed).toFixed(0)} choque | ${Math.floor(playerShip.maxAmmo)} mun. | ${playerShip.maxFuel.toFixed(0)} s combustible | empuje ${playerShip.thrustPower.toFixed(0)}`,
        panelX + 26,
        panelY + 150
      );

      shopState.buttons = [];

      ctx.save();
      ctx.beginPath();
      ctx.rect(listX, listY, rowWidth, listViewportHeight);
      ctx.clip();

      for (let i = 0; i < shopState.entries.length; i++) {
        const entry = shopState.entries[i];
        const rowY = listY - shopState.scrollOffset + i * (rowHeight + rowGap);
        const affordable = playerShip.credits >= entry.cost;
        const hovered = shopState.hoverIndex === i;
        const available = entry.available !== false;
        const isService = entry.kind === "service";

        if (rowY + rowHeight < listY || rowY > listY + listViewportHeight) {
          continue;
        }

        if (available && affordable) {
          ctx.fillStyle = isService ? "rgba(24, 52, 74, 0.9)" : "rgba(28, 58, 38, 0.9)";
        } else if (!available) {
          ctx.fillStyle = "rgba(34, 34, 40, 0.9)";
        } else {
          ctx.fillStyle = "rgba(56, 24, 24, 0.9)";
        }
        ctx.fillRect(listX, rowY, rowWidth, rowHeight);
        ctx.strokeStyle = hovered ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.18)";
        ctx.lineWidth = hovered ? 2 : 1;
        ctx.strokeRect(listX, rowY, rowWidth, rowHeight);

        ctx.textAlign = "left";
        ctx.fillStyle = isService ? "#7ddcff" : "white";
        ctx.font = "bold 18px monospace";
        ctx.fillText(`${i + 1}. ${entry.title}`, listX + 16, rowY + 10);
        ctx.font = "15px monospace";
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.fillText(entry.description, listX + 16, rowY + 36);

        ctx.textAlign = "right";
        ctx.fillStyle = entry.cost <= 0 ? "#9dff9d" : "#ffd45a";
        ctx.font = "bold 18px monospace";
        ctx.fillText(entry.cost <= 0 ? "gratis" : `${entry.cost} cr`, listX + rowWidth - 16, rowY + 10);
        ctx.font = "14px monospace";
        if (!available) {
          ctx.fillStyle = "rgba(255,255,255,0.45)";
          ctx.fillText("completo", listX + rowWidth - 16, rowY + 38);
        } else {
          ctx.fillStyle = affordable ? "#bfffbf" : "#ffb2b2";
          ctx.fillText(affordable ? "comprar" : "faltan creditos", listX + rowWidth - 16, rowY + 38);
        }

        shopState.buttons.push({
          index: i,
          x: listX,
          y: rowY,
          w: rowWidth,
          h: rowHeight
        });
      }

      ctx.restore();
      drawVerticalScrollbar(panelX + panelWidth - 18, listY, listViewportHeight, totalListHeight, shopState.scrollOffset, "rgba(125, 220, 255, 0.95)");

      if (shopState.maxScroll > 0) {
        ctx.textAlign = "right";
        ctx.font = "14px monospace";
        ctx.fillStyle = "rgba(255,255,255,0.65)";
        ctx.fillText("rueda / flechas para desplazar", panelX + panelWidth - 26, panelY + panelHeight - 18);
      }

      ctx.restore();
    }

    function drawPauseOverlay() {
      if (!pauseState.manual || shopState.isOpen || factionMenuState.isOpen) return;

      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, 0.28)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const panelWidth = Math.min(420, canvas.width - 80);
      const panelHeight = 120;
      const panelX = (canvas.width - panelWidth) * 0.5;
      const panelY = (canvas.height - panelHeight) * 0.5;

      ctx.fillStyle = "rgba(10, 16, 24, 0.92)";
      ctx.fillRect(panelX, panelY, panelWidth, panelHeight);
      ctx.strokeStyle = "rgba(255,255,255,0.22)";
      ctx.lineWidth = 2;
      ctx.strokeRect(panelX, panelY, panelWidth, panelHeight);

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "white";
      ctx.font = "bold 30px monospace";
      ctx.fillText("PAUSA", canvas.width * 0.5, panelY + 42);
      ctx.font = "16px monospace";
      ctx.fillStyle = "rgba(255,255,255,0.82)";
      ctx.fillText("Pulsa P para continuar", canvas.width * 0.5, panelY + 84);
      ctx.restore();
    }

    function drawGameOverOverlay() {
      if (playerShip.isAlive) return;

      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, 0.45)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ff6666";
      ctx.font = "bold 34px monospace";
      ctx.textAlign = "center";
      ctx.fillText("HAS SIDO DESTRUIDO", canvas.width * 0.5, canvas.height * 0.5 - 10);
      ctx.font = "18px monospace";
      ctx.fillStyle = "white";
      ctx.fillText("Tu nave ya no puede continuar", canvas.width * 0.5, canvas.height * 0.5 + 26);
      ctx.restore();
    }

    function draw() {
      drawBackground();
      drawStars();

      if (world.showGrid) {
        world.grid.draw(ctx, camera, canvas.width, canvas.height);
      }

      world.draw(ctx, camera, canvas.width, canvas.height);
      drawBrakeLockIndicator();
      drawHUD();
      drawFactionOverlay();
      drawShopOverlay();
      drawPauseOverlay();
      drawGameOverOverlay();
    }

    let lastTime = performance.now();

    function tickSimulation(dt) {
      world.update(dt);

      if (!world.isGameOver) {
        testCheats.update(dt);
        factionSystem.update(dt);
        updateTarantulaDiplomacy(dt);
        updateCoinMagnet(dt);
        world.updateShipCoinPickup(dt);
        updatePlanetResupply(dt);
        updatePlayerWeapons(dt);
        updateNpcWeapons(dt);
        proceduralField.update(dt);
      }

      if (world.isGameOver && shopState.isOpen) {
        closeShop();
      }
    }

    function gameLoop(currentTime) {
      let dt = (currentTime - lastTime) / 1000;
      lastTime = currentTime;

      dt = clamp(dt, 0, 0.05);

      if (!world.isGameOver && !isSimulationPaused()) {
        tickSimulation(dt);
      }

      updateCamera(dt);
      draw();

      requestAnimationFrame(gameLoop);
    }

    window.__game = {
      world,
      playerShip,
      proceduralField,
      shopState,
      factionSystem,
      factionMenuState,
      keys,
      testCheats,
      findNearbyStation,
      openShop,
      closeShop,
      attemptPurchaseEntry,
      fireProjectile,
      updateNpcWeapons,
      tickSimulation,
      getCounts() {
        const countsByKind = {};
        for (const body of world.bodies) {
          countsByKind[body.kind] = (countsByKind[body.kind] ?? 0) + 1;
        }

        return {
          total: world.bodies.length,
          procedural: proceduralField.getProceduralCount(),
          stations: proceduralField.getStationCount(),
          fleas: proceduralField.getFleaCount(),
          wasps: proceduralField.getWaspCount(),
          dragonflies: proceduralField.getDragonflyCount(),
          miners: proceduralField.getMinerCount(),
          tarantulas: proceduralField.getTarantulaCount(),
          ammo: playerShip.ammo,
          fuel: playerShip.fuel,
          credits: playerShip.credits,
          crashThreshold: playerShip.getCrashSpeedThreshold(world.shipCrashSpeed),
          kinds: countsByKind
        };
      }
    };

    updatePlanetResupply(0);
    updateCamera(1 / 60);
    updateMouseWorld();
    canvas.style.cursor = "crosshair";
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
