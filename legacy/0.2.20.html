      consumeFuel(dt, rate = this.fuelBurnRate) {
        return Math.max(0, dt);
      }

      getCrashSpeedThreshold(baseCrashSpeed) {
        return Math.max(baseCrashSpeed, 1000);
      }

      setAIContext(world, player) {
        this.aiWorld = world;
        this.aiPlayer = player;
        return this;
      }

      queryNearby(range, callback) {
        if (!this.aiWorld || !this.aiWorld.grid || !(range > 0)) {
          return;
        }

        const stamp = this.aiWorld.gravityQueryStamp++;
        this.aiWorld.grid.forEachNearbyUnique(this.x, this.y, range, stamp, (body) => {
          if (body === this || body.isRemoved) return;
          callback(body);
        });
      }

      getDispositionTo(factionName) {
        if (!factionSystem || !factionName) return "neutral";
        return factionSystem.getDisposition(this.faction, factionName);
      }

      chooseEnemyTarget() {
        let bestTarget = null;
        let bestScore = Infinity;

        this.queryNearby(this.enemySenseRadius, (body) => {
          if (!isShipLike(body) || !body.isAlive) return;
          if (this.getDispositionTo(body.faction) !== "enemy") return;

          const dx = body.x - this.x;
          const dy = body.y - this.y;
          const dist = Math.hypot(dx, dy);
          if (!(dist > 0.001) || dist > this.enemySenseRadius) return;

          const forwardX = Math.cos(body.angle);
          const forwardY = Math.sin(body.angle);
          const dirX = dx / dist;
          const dirY = dy / dist;
          const frontalBias = Math.max(0, dirX * forwardX + dirY * forwardY);
          const score = dist + frontalBias * 180;

          if (score < bestScore) {
            bestScore = score;
            bestTarget = body;
          }
        });

        return bestTarget;
      }

      chooseCoinTarget() {
        let bestCoin = null;
        let bestScore = Infinity;

        this.queryNearby(this.coinSenseRadius, (body) => {
          if (body.kind !== "coin") return;
          const dx = body.x - this.x;
          const dy = body.y - this.y;
          const dist = Math.hypot(dx, dy);
          if (!(dist > 0.001) || dist > this.coinSenseRadius) return;
          const relVX = body.vx - this.vx;
          const relVY = body.vy - this.vy;
          const score = dist + Math.hypot(relVX, relVY) * 0.2;
          if (score < bestScore) {
            bestScore = score;
            bestCoin = body;
          }
        });

        return bestCoin;
      }

      chooseScrapTarget() {
        let bestScrap = null;
        let bestScore = Infinity;

        this.queryNearby(this.scrapSenseRadius, (body) => {
          if (body.kind !== "scrap") return;
          const dx = body.x - this.x;
          const dy = body.y - this.y;
          const dist = Math.hypot(dx, dy);
          if (!(dist > 0.001) || dist > this.scrapSenseRadius) return;
          const score = dist + Math.hypot(body.vx - this.vx, body.vy - this.vy) * 0.08;
          if (score < bestScore) {
            bestScore = score;
            bestScrap = body;
          }
        });

        return bestScrap;
      }

      computeSchooling() {
        let separationX = 0;
        let separationY = 0;
        let alignmentX = 0;
        let alignmentY = 0;
        let centerX = this.x;
        let centerY = this.y;
        let shellX = 0;
        let shellY = 0;
        let count = 1;

        this.queryNearby(this.schoolSenseRadius, (body) => {
          if (body.kind !== "flea" || body.faction !== this.faction || body.schoolId !== this.schoolId) return;

          const dx = body.x - this.x;
          const dy = body.y - this.y;
          const dist = Math.hypot(dx, dy);
          if (!(dist > 0.001) || dist > this.schoolSenseRadius) return;

          count++;
          alignmentX += body.vx;
          alignmentY += body.vy;
          centerX += body.x;
          centerY += body.y;

          const spacingError = dist - this.preferredSchoolRadius;
          shellX += (dx / dist) * spacingError;
          shellY += (dy / dist) * spacingError;

          if (dist < this.personalSpace) {
            const push = (this.personalSpace - dist) / this.personalSpace;
            separationX -= (dx / dist) * push * 520;
            separationY -= (dy / dist) * push * 520;
          }
        });

        if (count <= 1) {
          return {
            x: 0,
            y: 0,
            members: 1,
            centerX: this.x,
            centerY: this.y,
            avgVX: this.vx,
            avgVY: this.vy,
            compactness: 0
          };
        }

        const avgVX = (alignmentX + this.vx) / count;
        const avgVY = (alignmentY + this.vy) / count;
        const schoolCenterX = centerX / count;
        const schoolCenterY = centerY / count;
        const toCenterX = schoolCenterX - this.x;
        const toCenterY = schoolCenterY - this.y;
        const centerDist = Math.hypot(toCenterX, toCenterY);
        const compactness = clamp(1 - centerDist / Math.max(1, this.schoolSenseRadius), 0, 1);
        alignmentX = (avgVX - this.vx) * 1.8;
        alignmentY = (avgVY - this.vy) * 1.8;
        const cohesionX = toCenterX * 1.25;
        const cohesionY = toCenterY * 1.25;
        shellX *= 0.32;
        shellY *= 0.32;

        return {
          x: separationX + alignmentX + cohesionX + shellX,
          y: separationY + alignmentY + cohesionY + shellY,
          members: count,
          centerX: schoolCenterX,
          centerY: schoolCenterY,
          avgVX,
          avgVY,
          compactness
        };
      }

      computeProjectileDodge() {
        let dodgeX = 0;
        let dodgeY = 0;

        this.queryNearby(this.projectileSenseRadius, (body) => {
          if (body.kind !== "projectile") return;
          if (body.owner === this) return;
          if (body.faction && this.getDispositionTo(body.faction) !== "enemy") return;

          const dx = this.x - body.x;
          const dy = this.y - body.y;
          const dist = Math.hypot(dx, dy);
          if (!(dist > 0.001) || dist > this.projectileSenseRadius) return;

          const speed = Math.hypot(body.vx, body.vy);
          if (!(speed > 0.001)) return;

          const dirX = body.vx / speed;
          const dirY = body.vy / speed;
          const toMeX = dx / dist;
          const toMeY = dy / dist;
          const closing = dirX * toMeX + dirY * toMeY;
          if (closing < 0.55) return;

          const side = Math.sign(dirX * toMeY - dirY * toMeX) || (this.id % 2 === 0 ? 1 : -1);
          const panic = (1 - dist / this.projectileSenseRadius) * (0.7 + closing * 0.7);
          dodgeX += -dirY * side * panic * 900 - dirX * panic * 260;
          dodgeY += dirX * side * panic * 900 - dirY * panic * 260;
        });

        return { x: dodgeX, y: dodgeY };
      }

      updateAutopilot(dt) {
        if (!this.aiWorld) {
          return;
        }

        this.targetEnemy = this.chooseEnemyTarget();
        this.targetCoin = this.chooseCoinTarget();
        const targetScrap = this.targetEnemy || this.targetCoin ? null : this.chooseScrapTarget();

        const schooling = this.computeSchooling();
        const dodge = this.computeProjectileDodge();
        const dodgeStrength = Math.hypot(dodge.x, dodge.y);
        const isDodging = dodgeStrength > 120;
        let desiredVX = 0;
        let desiredVY = 0;
        let desiredAngle = this.angle;
        let effectiveMaxCruiseSpeed = this.maxCruiseSpeed;

        if (isDodging) {
          desiredVX = this.vx * 0.35 + schooling.avgVX * 0.35 + schooling.x * 0.9 + dodge.x * 1.35;
          desiredVY = this.vy * 0.35 + schooling.avgVY * 0.35 + schooling.y * 0.9 + dodge.y * 1.35;
          effectiveMaxCruiseSpeed = Math.max(this.maxCruiseSpeed, Math.hypot(this.vx, this.vy) + 280, dodgeStrength * 0.75);
          desiredAngle = Math.atan2(desiredVY, desiredVX);
        } else if (this.targetCoin && !this.targetCoin.isRemoved) {
          const coin = this.targetCoin;
          const dx = coin.x - this.x;
          const dy = coin.y - this.y;
          const dist = Math.max(0.001, Math.hypot(dx, dy));
          const accelBias = 1.25 + (1 - dist / this.coinSenseRadius) * 2.4;
          desiredVX = coin.vx + schooling.avgVX * 0.15 + (dx / dist) * 420 * accelBias;
          desiredVY = coin.vy + schooling.avgVY * 0.15 + (dy / dist) * 420 * accelBias;
          effectiveMaxCruiseSpeed = Math.max(this.maxCruiseSpeed, Math.hypot(coin.vx, coin.vy) + 420);
          desiredAngle = Math.atan2(dy, dx);
        } else if (this.targetEnemy && !this.targetEnemy.isRemoved && this.targetEnemy.isAlive) {
          const enemy = this.targetEnemy;
          const dx = enemy.x - this.x;
          const dy = enemy.y - this.y;
          const dist = Math.max(0.001, Math.hypot(dx, dy));
          const nx = dx / dist;
          const ny = dy / dist;
          const tx = -ny * this.orbitDirection;
          const ty = nx * this.orbitDirection;
          const laneOffset = ((this.id + this.schoolPhase) % 7 - 3) * 5;
          const orbitRadius = enemy.radius + 52 + laneOffset;
          const radiusError = dist - orbitRadius;
          const enemyForwardX = Math.cos(enemy.angle);
          const enemyForwardY = Math.sin(enemy.angle);
          const frontalDot = nx * enemyForwardX + ny * enemyForwardY;
          const avoidFront = Math.max(0, frontalDot);
          const behindBiasX = -enemyForwardX * avoidFront * 220;
          const behindBiasY = -enemyForwardY * avoidFront * 220;
          const schoolAnchorX = (schooling.centerX - this.x) * 1.15;
          const schoolAnchorY = (schooling.centerY - this.y) * 1.15;
          desiredVX = enemy.vx + schooling.avgVX * 0.18 + tx * 420 + nx * clamp(radiusError * 5.8, -280, 280) + behindBiasX + schoolAnchorX;
          desiredVY = enemy.vy + schooling.avgVY * 0.18 + ty * 420 + ny * clamp(radiusError * 5.8, -280, 280) + behindBiasY + schoolAnchorY;
          effectiveMaxCruiseSpeed = Math.max(this.maxCruiseSpeed, Math.hypot(enemy.vx, enemy.vy) + 440);
          desiredAngle = Math.atan2(desiredVY - enemy.vy, desiredVX - enemy.vx);
        } else if (targetScrap) {
          const scrap = targetScrap;
          const dx = scrap.x - this.x;
          const dy = scrap.y - this.y;
          const dist = Math.max(0.001, Math.hypot(dx, dy));
          const nx = dx / dist;
          const ny = dy / dist;
          const tx = -ny * this.orbitDirection;
          const ty = nx * this.orbitDirection;
          const orbitRadius = scrap.radius + 30 + ((this.id + this.schoolPhase) % 5 - 2) * 3;
          const radiusError = dist - orbitRadius;
          const schoolAnchorX = (schooling.centerX - this.x) * 1.05;
          const schoolAnchorY = (schooling.centerY - this.y) * 1.05;
          desiredVX = scrap.vx + schooling.avgVX * 0.28 + tx * 120 + nx * clamp(radiusError * 3.8, -120, 160) + schoolAnchorX;
          desiredVY = scrap.vy + schooling.avgVY * 0.28 + ty * 120 + ny * clamp(radiusError * 3.8, -120, 160) + schoolAnchorY;
          effectiveMaxCruiseSpeed = Math.max(this.maxCruiseSpeed, 230);
          desiredAngle = Math.atan2(desiredVY - scrap.vy, desiredVX - scrap.vx);
        } else {
          if (!this.wanderAngle || Math.random() < dt * 0.35) {
            this.wanderAngle += randomBetween(-0.28, 0.28);
          }

          const driftAngle = this.wanderAngle + Math.sin((this.aiWorld.time ?? 0) * 0.7 + this.schoolPhase) * 0.08;
          desiredVX = schooling.avgVX * 0.72 + Math.cos(driftAngle) * this.schoolCruiseSpeed + (schooling.centerX - this.x) * 1.35 + schooling.x * 1.45;
          desiredVY = schooling.avgVY * 0.72 + Math.sin(driftAngle) * this.schoolCruiseSpeed + (schooling.centerY - this.y) * 1.35 + schooling.y * 1.45;
          desiredAngle = Math.atan2(desiredVY, desiredVX);
        }

        desiredVX += schooling.x * 1.2 + dodge.x;
        desiredVY += schooling.y * 1.2 + dodge.y;

        const steer = clampVectorMagnitude(
          (desiredVX - this.vx) * 5.1,
          (desiredVY - this.vy) * 5.1,
          this.maxAcceleration
        );
        this.applyAcceleration(steer.x, steer.y, dt);

        const velocity = clampVectorMagnitude(this.vx, this.vy, effectiveMaxCruiseSpeed);
        this.vx = velocity.x;
        this.vy = velocity.y;

        if (Math.hypot(this.vx, this.vy) > 0.001) {
          desiredAngle = Math.atan2(this.vy, this.vx);
        }

        this.angle += wrapAngle(desiredAngle - this.angle) * clamp(dt * 16.5, 0, 1);
        this.angularVelocity = 0;
      }

      update(dt) {
        this.updateAutopilot(dt);
        super.update(dt);
      }

      draw(ctx, camera) {
        const sx = this.x - camera.x;
        const sy = this.y - camera.y;

        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(this.angle);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 1.5;

        ctx.beginPath();
        ctx.moveTo(this.radius * 1.1, 0);
        ctx.lineTo(-this.radius * 0.6, -this.radius * 0.55);
        ctx.lineTo(-this.radius * 0.18, 0);
        ctx.lineTo(-this.radius * 0.6, this.radius * 0.55);
        ctx.closePath();
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-this.radius * 0.75, -this.radius * 0.85);
        ctx.lineTo(-this.radius * 0.18, -this.radius * 0.2);
        ctx.moveTo(-this.radius * 0.75, this.radius * 0.85);
        ctx.lineTo(-this.radius * 0.18, this.radius * 0.2);
        ctx.stroke();

        ctx.restore();
      }
    }

    class FactionSystem {
      constructor() {
        this.factions = new Map();
        this.pairs = new Map();
        this.defaultEquilibrium = 50;
        this.relaxRate = 0.004;
      }

      defineFaction(name, options = {}) {
        this.factions.set(name, {
          name,
          selfRelation: options.selfRelation ?? 100
        });
      }

      pairKey(a, b) {
        return a < b ? `${a}::${b}` : `${b}::${a}`;
      }

      ensurePair(a, b) {
        const key = this.pairKey(a, b);
        if (!this.pairs.has(key)) {
          this.pairs.set(key, {
            relation: this.defaultEquilibrium,
            equilibrium: this.defaultEquilibrium
          });
        }
        return this.pairs.get(key);
      }

      setPair(a, b, relation, equilibrium = relation) {
        if (a === b) return;
        const pair = this.ensurePair(a, b);
        pair.relation = relation;
        pair.equilibrium = equilibrium;
      }

      getRelation(a, b) {
        if (a === b) {
          return this.factions.get(a)?.selfRelation ?? 100;
        }
        return this.ensurePair(a, b).relation;
      }

      getEquilibrium(a, b) {
        if (a === b) {
          return this.factions.get(a)?.selfRelation ?? 100;
        }
        return this.ensurePair(a, b).equilibrium;
      }

      addRelation(a, b, delta) {
        if (!a || !b || a === b || !Number.isFinite(delta) || delta === 0) return;
        const pair = this.ensurePair(a, b);
        pair.relation = clamp(pair.relation + delta, 0, 100);
      }

      addEquilibrium(a, b, delta) {
        if (!a || !b || a === b || !Number.isFinite(delta) || delta === 0) return;
        const pair = this.ensurePair(a, b);
        pair.equilibrium = clamp(pair.equilibrium + delta, 0, 100);
      }

      getDisposition(a, b) {
        const relation = this.getRelation(a, b);
        if ((a === "jugador" && b === "Mineros") || (a === "Mineros" && b === "jugador")) {
          return relation < 40 ? "enemy" : "neutral";
        }
        return getFactionDisposition(relation);
      }

      update(dt) {
        for (const pair of this.pairs.values()) {
          const delta = pair.equilibrium - pair.relation;
          if (Math.abs(delta) < 0.0001) continue;
          pair.relation = clamp(pair.relation + delta * this.relaxRate * dt, 0, 100);
        }
      }

      listForFaction(name) {
        const result = [];
        for (const factionName of this.factions.keys()) {
          result.push({
            name: factionName,
            relation: this.getRelation(name, factionName),
            equilibrium: this.getEquilibrium(name, factionName),
            disposition: this.getDisposition(name, factionName)
          });
        }
        return result.sort((a, b) => a.name.localeCompare(b.name, 'es'));
      }
    }

    class World {
      constructor() {
        this.bodies = [];
        this.grid = new SpatialGrid(280);
        this.asteroidBodies = [];
        this.planetBodies = [];
        this.scrapBodies = [];

        this.G = 156;
        this.minGravityAcceleration = 0.12;
        this.showGrid = false;

        this.maxSubstep = 1 / 60;
        this.maxCollisionPasses = 2;
        this.gravityQueryStamp = 1;
        this.hasRemovedBodies = false;
        this.onBodyAdded = null;
        this.onBodyRemoved = null;
        this.asteroidFragmentRadiusFactor = 0.68;
        this.minAsteroidFragmentRadius = 10;
        this.projectileAsteroidMinSubdivisions = 2;
        this.projectileAsteroidMaxSubdivisions = 4;
        this.defaultAsteroidProjectileEjectionSpeed = 6;
        this.asteroidCollisionExplosionMinSpeed = 80;
        this.asteroidCollisionExplosionGuaranteedSpeed = 130;
        this.asteroidCollisionExplosionChancePerSpeed = 0.02;
        this.asteroidCollisionMinSubdivisionCount = 3;
        this.asteroidCollisionMaxSubdivisionCount = 8;
        this.asteroidCollisionMinEjectionFactor = 0.5;
        this.asteroidCollisionMaxEjectionFactor = 0.8;
        this.planetCollisionMinAsteroidCount = 10;
        this.planetCollisionMaxAsteroidCount = 18;
        this.planetCollisionAsteroidAreaFraction = 0.34;
        this.planetCollisionAsteroidMassFraction = 0.2;
        this.planetCollisionEscapeSpeedFactor = 1.18;
        this.asteroidPlanetAbsorptionContactDelay = 2.4;
        this.asteroidPlanetAbsorptionAnimationDuration = 1.15;
        this.asteroidPlanetAbsorptionContactPadding = 8;
        this.asteroidPlanetAbsorptionMaxPlanetQueryRadius = 2400;
        this.shipCrashSpeed = 80;
        this.collisionDamageFactor = 0.2;
        this.isGameOver = false;
        this.lastMerchantRefusalTimer = 0;
        this.merchantRescueStationId = null;
        this.merchantRescueRadius = 1000;
        this.merchantRescueFuelThreshold = 2;
      }

      updateBodyGravityProfile(body) {
        if (!body.exertsGravity || body.mass <= 0) {
          body.gravityRange = 0;
          body.gravityRangeSq = 0;
          return;
        }

        if (this.minGravityAcceleration <= 0) {
          body.gravityRange = Infinity;
          body.gravityRangeSq = Infinity;
          return;
        }

        body.gravityRange = Math.sqrt((this.G * body.mass) / this.minGravityAcceleration);
        body.gravityRangeSq = body.gravityRange * body.gravityRange;
      }

      addBody(body) {
        body.isRemoved = false;
        this.updateBodyGravityProfile(body);
        this.bodies.push(body);

        if (body.kind === "asteroid") {
          this.asteroidBodies.push(body);
        } else if (body.kind === "planet") {
          this.planetBodies.push(body);
        } else if (body.kind === "scrap") {
          this.scrapBodies.push(body);
        }

        if (this.onBodyAdded) {
          this.onBodyAdded(body);
        }

        return body;
      }

      removeBody(body) {
        if (!body || body.isRemoved) return;

        if (typeof body.onRemoved === "function") {
          body.onRemoved();
        }

        body.isRemoved = true;
        this.hasRemovedBodies = true;

        if (this.onBodyRemoved) {
          this.onBodyRemoved(body);
        }
      }

      cleanupRemovedBodies() {
        if (!this.hasRemovedBodies) return;

        const compact = (list) => {
          let writeIndex = 0;

          for (let readIndex = 0; readIndex < list.length; readIndex++) {
            const body = list[readIndex];
            if (body.isRemoved) continue;
            list[writeIndex++] = body;
          }

          list.length = writeIndex;
        };

        compact(this.bodies);
        compact(this.asteroidBodies);
        compact(this.planetBodies);
        compact(this.scrapBodies);
        this.hasRemovedBodies = false;
      }

      rebuildGrid() {
        this.grid.clear();

        for (let i = 0; i < this.bodies.length; i++) {
          const body = this.bodies[i];
          if (body.isRemoved) continue;
          this.grid.insert(body);
        }
      }

      cullTransientBodies() {
        for (let i = 0; i < this.bodies.length; i++) {
          const body = this.bodies[i];
          if (body.isRemoved || !body.shouldDespawn) continue;
          this.removeBody(body);
        }
      }

      updateMerchantRescueState(player) {
        this.merchantRescueStationId = null;

        if (!player || player.isRemoved || !player.isAlive || !this.grid) {
          return;
        }

        const rescueFuelThreshold = this.merchantRescueFuelThreshold ?? 0.001;
        if (player.fuel > rescueFuelThreshold) {
          return;
        }

        let nearestStation = null;
        let bestDistSq = Infinity;
        const rescueRadius = this.merchantRescueRadius;
        const rescueRadiusSq = rescueRadius * rescueRadius;
        const stamp = this.gravityQueryStamp++;

        this.grid.forEachNearbyUnique(player.x, player.y, rescueRadius, stamp, (body) => {
          if (body.isRemoved || body.kind !== "station" || !body.isAlive) return;
          if (factionSystem.getDisposition(player.faction, body.faction) === "enemy") return;

          const distSq = distanceSquared(body.x, body.y, player.x, player.y);
          if (distSq > rescueRadiusSq || distSq >= bestDistSq) return;

          nearestStation = body;
          bestDistSq = distSq;
        });

        this.merchantRescueStationId = nearestStation?.id ?? null;
      }

      applyGravity(dt) {
        const minGravityAcceleration = this.minGravityAcceleration;
        const contactEpsilon = 0.5;

        for (let i = 0; i < this.bodies.length; i++) {
          const source = this.bodies[i];
          if (source.isRemoved || !source.exertsGravity) continue;

          const range = source.gravityRange;

          if (!(range > 0)) continue;

          const rangeSq = source.gravityRangeSq;
          const stamp = this.gravityQueryStamp++;

          this.grid.forEachNearbyUnique(source.x, source.y, range, stamp, (target) => {
            if (target === source || target.isRemoved || !target.receivesGravity) return;

            const dx = source.x - target.x;
            const dy = source.y - target.y;
            const distSq = dx * dx + dy * dy;

            if (distSq < 0.0001 || distSq > rangeSq) return;

            const minDistance = source.colliderRadius + target.colliderRadius + contactEpsilon;
            if (distSq <= minDistance * minDistance) return;

            const accel = (this.G * source.mass) / distSq;
            if (accel < minGravityAcceleration) return;

            const invDistance = 1 / Math.sqrt(distSq);
            target.applyAcceleration(dx * invDistance * accel, dy * invDistance * accel, dt);
          });
        }
      }

      resolveCollisions() {
        let resolvedCount = 0;

        this.grid.forEachCollisionPair((a, b) => {
          if (a.isRemoved || b.isRemoved || a.isCollisionDisabled || b.isCollisionDisabled) return;

          if (this.resolveCircleCollision(a, b)) {
            resolvedCount++;
          }
        });

        return resolvedCount;
      }

      applyCollisionDamage(ship, impactSpeed, threshold) {
        if (!ship || ship.isRemoved || !ship.isAlive) return;
        if (ship === playerShip && testCheats.isPlayerInvincible()) return;
        if (!(impactSpeed > threshold)) return;

        const excessSpeed = impactSpeed - threshold;
        const damage = Math.round(excessSpeed * this.collisionDamageFactor);
        if (!(damage > 0)) return;

        const cooldownWindow = 0.12;
        const alreadyCounted = ship.collisionDamageCooldown > 0 && impactSpeed <= ship.lastCollisionDamageSpeed + 0.5;
        if (alreadyCounted) return;

        ship.collisionDamageCooldown = cooldownWindow;
        ship.lastCollisionDamageSpeed = impactSpeed;
        this.damageBody(ship, damage, null);
      }

      destroyShip(ship) {
        if (!ship || !ship.isAlive) return;

        ship.isAlive = false;
        ship.color = "#ff6666";
        ship.angularVelocity = 0;
        ship.refuelTimer = 0;

        this.spawnScrapFragments(ship, Math.max(32, Math.hypot(ship.vx, ship.vy) * 0.22 + 28), clamp(Math.round((ship.mass ?? 0) / 3.8), 2, 12));

        if (ship.kind === "flea") {
          this.addBody(new CoinBody({
            x: ship.x,
            y: ship.y,
            vx: ship.vx + randomBetween(-14, 14),
            vy: ship.vy + randomBetween(-14, 14),
            angle: randomBetween(0, Math.PI * 2),
            angularVelocity: randomBetween(-2.5, 2.5),
            radius: 4.8,
            colliderRadius: 5.8,
            mass: 0.035,
            value: 1,
            isProcedural: false,
            isFieldBody: false
          }));
        }

        if (ship.kind === "wasp" || ship.kind === "dragonfly") {
          const isLargeHull = ship.hullClass === "large";
          const dropCount = ship.kind === "wasp"
            ? (isLargeHull ? randomInt(5, 8) : randomInt(2, 4))
            : (isLargeHull ? randomInt(7, 11) : randomInt(3, 5));
          for (let i = 0; i < dropCount; i++) {
            this.addBody(new CoinBody({
              x: ship.x + randomBetween(-ship.radius * 0.45, ship.radius * 0.45),
              y: ship.y + randomBetween(-ship.radius * 0.45, ship.radius * 0.45),
              vx: ship.vx + randomBetween(-36, 36),
              vy: ship.vy + randomBetween(-36, 36),
              angle: randomBetween(0, Math.PI * 2),
              angularVelocity: randomBetween(-4, 4),
              radius: isLargeHull ? 5.4 : 4.8,
              colliderRadius: isLargeHull ? 6.4 : 5.8,
              mass: isLargeHull ? 0.045 : 0.035,
              value: 1,
              isProcedural: false,
              isFieldBody: false
            }));
          }
        }

        if (ship.kind === "tarantula") {
          const dropCount = randomInt(14, 25);
          for (let i = 0; i < dropCount; i++) {
            this.addBody(new CoinBody({
              x: ship.x + randomBetween(-ship.radius * 0.5, ship.radius * 0.5),
              y: ship.y + randomBetween(-ship.radius * 0.5, ship.radius * 0.5),
              vx: ship.vx + randomBetween(-42, 42),
              vy: ship.vy + randomBetween(-42, 42),
              angle: randomBetween(0, Math.PI * 2),
              angularVelocity: randomBetween(-4.2, 4.2),
              radius: 5.6,
              colliderRadius: 6.6,
              mass: 0.045,
              value: 1,
              isProcedural: false,
              isFieldBody: false
            }));
          }
        }

        if (ship.kind === "ship") {
          this.isGameOver = true;
          return;
        }

        this.removeBody(ship);
      }

      damageBody(body, amount, projectile = null) {
        if (!body || body.isRemoved || !(amount > 0)) return;
        if (body === playerShip && testCheats.isPlayerInvincible()) return;
        body.timeSinceLastDamage = 0;
        body.hp = Math.max(0, body.hp - amount);

        if (body.kind === "station" && projectile && projectile.faction && projectile.faction !== body.faction) {
          factionSystem.addRelation(projectile.faction, body.faction, -5);

          const sourceDistance = Math.hypot((projectile.originX ?? projectile.x) - body.x, (projectile.originY ?? projectile.y) - body.y);
          if (sourceDistance > body.weaponRange && typeof body.registerLongRangeHit === "function") {
            body.registerLongRangeHit(projectile);
          }
        }

        if ((body.kind === "wasp" || body.kind === "dragonfly") && projectile && projectile.faction && projectile.faction !== body.faction) {
          applyFactionHitConsequences(projectile.faction, body.faction, amount);
        }

        if (body.kind === "miner" && projectile && projectile.faction && projectile.faction !== body.faction) {
          factionSystem.addRelation(projectile.faction, body.faction, -6);

          const sourceDistance = Math.hypot((projectile.originX ?? projectile.x) - body.x, (projectile.originY ?? projectile.y) - body.y);
          if (sourceDistance > body.weaponRange && typeof body.registerLongRangeHit === "function") {
            body.registerLongRangeHit(projectile);
          }
        }

        if (body.kind === "tarantula" && projectile && projectile.faction && projectile.faction !== body.faction) {
          factionSystem.addRelation(projectile.faction, body.faction, -10);
        }

        if (body.hp <= 0) {
          if (body.kind === "scrap") {
            this.destroyScrap(body, projectile);
            return;
          }

          if (isShipLike(body)) {
            this.destroyShip(body);
          }
        }
      }

      resolveDirectionalVector(source, fallbackAngle = randomBetween(0, Math.PI * 2)) {
        if (source) {
          const vx = source.x ?? source.vx ?? 0;
          const vy = source.y ?? source.vy ?? 0;
          const speed = Math.hypot(vx, vy);

          if (speed > 0.0001) {
            return {
              x: vx / speed,
              y: vy / speed,
              angle: Math.atan2(vy, vx)
            };
          }

          if (typeof source.angle === "number") {
            return {
              x: Math.cos(source.angle),
              y: Math.sin(source.angle),
              angle: source.angle
            };
          }
        }

        return {
          x: Math.cos(fallbackAngle),
          y: Math.sin(fallbackAngle),
          angle: fallbackAngle
        };
      }

      getAsteroidMaxSubdivisionCount(radius) {
        if (!(radius > 0) || !(this.minAsteroidFragmentRadius > 0)) {
          return 0;
        }

        return Math.floor((radius * radius) / (this.minAsteroidFragmentRadius * this.minAsteroidFragmentRadius));
      }

      getAsteroidFragmentCount(radius, requestedSubdivisionCount) {
        const desiredCount = Math.max(2, Math.round(requestedSubdivisionCount));
        const maxAllowedCount = this.getAsteroidMaxSubdivisionCount(radius);

        if (maxAllowedCount < 2) {
          return 0;
        }

        return Math.min(desiredCount, maxAllowedCount);
      }

      getAsteroidFragmentRadius(radius, subdivisionCount) {
        if (!(subdivisionCount > 0)) {
          return 0;
        }

        return radius / Math.sqrt(subdivisionCount);
      }

      getAsteroidSubdivisionAngles(fragmentCount, divisionAngle) {
        if (fragmentCount <= 1) {
          return [divisionAngle];
        }

        const totalArc = Math.min(
          Math.PI * 1.5,
          Math.max(Math.PI * 0.6, (fragmentCount - 1) * (Math.PI / 7.5))
        );
        const angleStep = totalArc / (fragmentCount - 1);
        const startAngle = divisionAngle - totalArc * 0.5;
        const angles = [];

        for (let i = 0; i < fragmentCount; i++) {
          angles.push(startAngle + angleStep * i);
        }

        return angles;
      }

      breakAsteroid(asteroid, {
        subdivisionCount = 2,
        ejectionSpeed = 0,
        divisionVector = null,
        coinSource = null
      } = {}) {
        if (!asteroid || asteroid.isRemoved) {
          return 0;
        }

        const fragmentCount = this.getAsteroidFragmentCount(asteroid.radius, subdivisionCount);
        this.removeBody(asteroid);

        if (fragmentCount < 2) {
          this.spawnCoinFromAsteroid(asteroid, coinSource ?? divisionVector);
          return 0;
        }

        const childRadius = this.getAsteroidFragmentRadius(asteroid.radius, fragmentCount);
        if (childRadius < this.minAsteroidFragmentRadius) {
          this.spawnCoinFromAsteroid(asteroid, coinSource ?? divisionVector);
          return 0;
        }

        const direction = this.resolveDirectionalVector(divisionVector, asteroid.angle);
        const angles = this.getAsteroidSubdivisionAngles(fragmentCount, direction.angle);
        const density = asteroid.mass / Math.max(1, asteroid.radius * asteroid.radius);
        const childMass = Math.max(0.6, density * childRadius * childRadius);
        const childHp = getAsteroidMaxHpFromRadius(childRadius);
        const separationRadius = Math.max(
          childRadius * 1.15,
          childRadius / Math.max(0.16, Math.sin(Math.PI / fragmentCount))
        );

        for (let i = 0; i < angles.length; i++) {
          const angle = angles[i];
          const dirX = Math.cos(angle);
          const dirY = Math.sin(angle);
          const offsetJitter = childRadius * 0.08;

          const childAsteroid = new PhysicalBody({
            x: asteroid.x + dirX * separationRadius + randomBetween(-offsetJitter, offsetJitter),
            y: asteroid.y + dirY * separationRadius + randomBetween(-offsetJitter, offsetJitter),
            vx: asteroid.vx + dirX * ejectionSpeed,
            vy: asteroid.vy + dirY * ejectionSpeed,
            radius: childRadius,
            mass: childMass,
            angle: randomBetween(0, Math.PI * 2),
            angularVelocity: asteroid.angularVelocity + randomBetween(-1.6, 1.6),
            color: asteroid.color,
            bounciness: 0.0,
            isProcedural: asteroid.isProcedural,
            isFieldBody: asteroid.isFieldBody,
            kind: "asteroid",
            hp: childHp,
            maxHp: childHp
          });
          this.addBody(childAsteroid);
        }

        return fragmentCount;
      }

      spawnCoinFromAsteroid(asteroid, source = null) {
        const direction = this.resolveDirectionalVector(source);
        const dirX = direction.x;
        const dirY = direction.y;
        const coinCount = randomInt(1, 5);

        for (let i = 0; i < coinCount; i++) {
          const perpX = -dirY;
          const perpY = dirX;
          const lateralKick = randomBetween(-28, 28);
          const forwardKick = randomBetween(-8, 12);
          const coinRadius = clamp(asteroid.radius * 0.22, 4.2, 6.2);
          const coinMass = Math.min(
            Math.max(0.018, asteroid.mass * 0.0022),
            asteroid.mass * 0.08,
            0.05
          );

          this.addBody(new CoinBody({
            x: asteroid.x + perpX * randomBetween(-asteroid.radius * 0.25, asteroid.radius * 0.25),
            y: asteroid.y + perpY * randomBetween(-asteroid.radius * 0.25, asteroid.radius * 0.25),
            vx: asteroid.vx + perpX * lateralKick + dirX * forwardKick,
            vy: asteroid.vy + perpY * lateralKick + dirY * forwardKick,
            angle: randomBetween(0, Math.PI * 2),
            angularVelocity: randomBetween(-3.5, 3.5),
            radius: coinRadius,
            colliderRadius: coinRadius + 1,
            mass: coinMass,
            value: 1,
            isProcedural: false,
            isFieldBody: false
          }));
        }
      }

      spawnCoinFromScrap(scrap, source = null) {
        const direction = this.resolveDirectionalVector(source, scrap.angle);
        const perpX = -direction.y;
        const perpY = direction.x;

        this.addBody(new CoinBody({
          x: scrap.x + perpX * randomBetween(-scrap.radius * 0.25, scrap.radius * 0.25),
          y: scrap.y + perpY * randomBetween(-scrap.radius * 0.25, scrap.radius * 0.25),
          vx: scrap.vx + direction.x * randomBetween(8, 20) + perpX * randomBetween(-14, 14),
          vy: scrap.vy + direction.y * randomBetween(8, 20) + perpY * randomBetween(-14, 14),
          angle: randomBetween(0, Math.PI * 2),
          angularVelocity: randomBetween(-3.2, 3.2),
          radius: 4.6,
          colliderRadius: 5.6,
          mass: 0.03,
          value: 1,
          isProcedural: false,
          isFieldBody: false
        }));
      }

      spawnScrapFragments(source, ejectionSpeed = 0, fragmentCount = 1) {
        if (!source || !(fragmentCount > 0)) {
          return 0;
        }

        const count = Math.max(1, Math.round(fragmentCount));
        const baseDirection = this.resolveDirectionalVector(source, source.angle ?? 0);
        const baseAngle = baseDirection.angle + randomBetween(-0.18, 0.18);
        const procedural = !!source.isProcedural;
        const fieldBody = !!source.isFieldBody;

        for (let i = 0; i < count; i++) {
          const angle = baseAngle + (i / count) * Math.PI * 2 + randomBetween(-0.34, 0.34);
          const dirX = Math.cos(angle);
          const dirY = Math.sin(angle);
          const speed = ejectionSpeed * randomBetween(0.72, 1.18);
          const spawnRadius = Math.max(4, (source.radius ?? 12) * 0.28);

          this.addBody(new ScrapBody({
            x: source.x + dirX * randomBetween(0, spawnRadius),
            y: source.y + dirY * randomBetween(0, spawnRadius),
            vx: (source.vx ?? 0) + dirX * speed,
            vy: (source.vy ?? 0) + dirY * speed,
            angle: randomBetween(0, Math.PI * 2),
            angularVelocity: randomBetween(-4.5, 4.5),
            color: source.color ?? "#b9bccb",
            accentColor: "rgba(255,255,255,0.3)",
            shapeIndex: randomInt(0, 3),
            hp: randomInt(1, 5),
            maxHp: 5,
            isProcedural: procedural,
            isFieldBody: fieldBody
          }));
        }

        return count;
      }

      destroyScrap(scrap, source = null) {
        if (!scrap || scrap.isRemoved) return;
        this.removeBody(scrap);
        this.spawnCoinFromScrap(scrap, source);
      }

      collectScrap(ship, scrap) {
        if (!ship || !ship.isAlive || !scrap || scrap.isRemoved) return;
        this.removeBody(scrap);
        if (ship.kind === "dragonfly" || ship.kind === "tarantula") {
          ship.hp = Math.min(ship.maxHp, ship.hp + 5);
        }
      }

      collectCoin(ship, coin) {
        if (!ship.isAlive) return;
        const value = Math.max(1, coin.value ?? 1);
        this.removeBody(coin);
        ship.credits += value;
        if (ship.kind === "tarantula") {
          ship.hp = Math.min(ship.maxHp, ship.hp + value * 15);
        }
      }

      updateShipCoinPickup(dt) {
        if (!this.grid) {
          return;
        }

        for (let i = 0; i < this.bodies.length; i++) {
          const ship = this.bodies[i];
          if (ship.isRemoved || !isShipLike(ship) || !ship.isAlive) {
            continue;
          }

          const shipReach = ship.colliderRadius ?? ship.radius ?? 0;
          if (!(shipReach > 0)) {
            continue;
          }

          const stamp = this.gravityQueryStamp++;
          this.grid.forEachNearbyUnique(ship.x, ship.y, shipReach + 8, stamp, (coin) => {
            if (coin.isRemoved || coin.kind !== "coin") return;

            const reach = shipReach + (coin.colliderRadius ?? coin.radius ?? 0);
            const distSq = distanceSquared(ship.x, ship.y, coin.x, coin.y);

            if (distSq <= reach * reach) {
              this.collectCoin(ship, coin);
            }
          });
        }
      }

      handleProjectileAsteroidImpact(projectile, asteroid) {
        this.removeBody(projectile);

        if (asteroid.isRemoved) return;

        this.damageBody(asteroid, projectile.damage ?? 1, projectile);
        if (asteroid.hp > 0 || asteroid.isRemoved) {
          return;
        }

        const projectileDirection = this.resolveDirectionalVector(projectile, projectile.angle);
        const requestedSubdivisionCount = randomInt(
          this.projectileAsteroidMinSubdivisions,
          this.projectileAsteroidMaxSubdivisions
        );

        this.breakAsteroid(asteroid, {
          subdivisionCount: requestedSubdivisionCount,
          ejectionSpeed: this.defaultAsteroidProjectileEjectionSpeed,
          divisionVector: {
            x: -projectileDirection.x,
            y: -projectileDirection.y
          },
          coinSource: projectile
        });
      }

      getAsteroidCollisionExplosionChance(impactSpeed) {
        const excessSpeed = impactSpeed - this.asteroidCollisionExplosionMinSpeed;
        if (!(excessSpeed > 0)) {
          return 0;
        }

        return clamp(
          excessSpeed * this.asteroidCollisionExplosionChancePerSpeed,
          0,
          1
        );
      }

      getAsteroidCollisionSubdivisionCount(radius) {
        const radiusT = clamp((radius - 13) / (40 - 13), 0, 1);
        const requestedCount = Math.round(
          lerp(
            this.asteroidCollisionMinSubdivisionCount,
            this.asteroidCollisionMaxSubdivisionCount,
            radiusT
          )
        );

        return clamp(
          requestedCount,
          this.asteroidCollisionMinSubdivisionCount,
          this.asteroidCollisionMaxSubdivisionCount
        );
      }

      tryExplodeAsteroidFromCollision(asteroid, collider, impactSpeed, fallbackNormal = null) {
        if (!asteroid || asteroid.isRemoved || asteroid.kind !== "asteroid") {
          return false;
        }

        const explosionChance = this.getAsteroidCollisionExplosionChance(impactSpeed);
        if (!(explosionChance > 0) || Math.random() >= explosionChance) {
          return false;
        }

        const relativeVelocityX = asteroid.vx - (collider?.vx ?? 0);
        const relativeVelocityY = asteroid.vy - (collider?.vy ?? 0);
        let divisionVector = {
          x: -relativeVelocityX,
          y: -relativeVelocityY
        };

        if (Math.hypot(divisionVector.x, divisionVector.y) < 0.001 && fallbackNormal) {
          divisionVector = {
            x: fallbackNormal.x,
            y: fallbackNormal.y
          };
        }

        this.breakAsteroid(asteroid, {
          subdivisionCount: this.getAsteroidCollisionSubdivisionCount(asteroid.radius),
          ejectionSpeed: impactSpeed * randomBetween(
            this.asteroidCollisionMinEjectionFactor,
            this.asteroidCollisionMaxEjectionFactor
          ),
          divisionVector,
          coinSource: divisionVector
        });

        return true;
      }

      getPlanetCollisionAsteroidCount(planetA, planetB) {
        const combinedRadius = (planetA?.radius ?? 0) + (planetB?.radius ?? 0);
        const radiusT = clamp((combinedRadius - 520) / (2400 - 520), 0, 1);
        const requestedCount = Math.round(lerp(
          this.planetCollisionMinAsteroidCount,
          this.planetCollisionMaxAsteroidCount,
          radiusT
        ));

        return clamp(
          requestedCount,
          this.planetCollisionMinAsteroidCount,
          this.planetCollisionMaxAsteroidCount
        );
      }

      explodePlanetsIntoAsteroids(planetA, planetB, impactSpeed, fallbackNormal = null) {
        if (!planetA || !planetB || planetA.isRemoved || planetB.isRemoved) {
          return false;
        }

        const totalMass = Math.max(1, planetA.mass + planetB.mass);
        const totalArea = Math.max(1, planetA.radius * planetA.radius + planetB.radius * planetB.radius);
        const fragmentCount = this.getPlanetCollisionAsteroidCount(planetA, planetB);
        const generatedArea = totalArea * this.planetCollisionAsteroidAreaFraction;
        const generatedMass = totalMass * this.planetCollisionAsteroidMassFraction;
        const centerX = (planetA.x * planetA.mass + planetB.x * planetB.mass) / totalMass;
        const centerY = (planetA.y * planetA.mass + planetB.y * planetB.mass) / totalMass;
        const centerVx = (planetA.vx * planetA.mass + planetB.vx * planetB.mass) / totalMass;
        const centerVy = (planetA.vy * planetA.mass + planetB.vy * planetB.mass) / totalMass;

        let divisionVector = {
          x: planetA.vx - planetB.vx,
          y: planetA.vy - planetB.vy
        };

        if (Math.hypot(divisionVector.x, divisionVector.y) < 0.001 && fallbackNormal) {
          divisionVector = {
            x: fallbackNormal.x,
            y: fallbackNormal.y
          };
        }

        const direction = this.resolveDirectionalVector(divisionVector);
        const weights = [];
        let totalWeight = 0;

        for (let i = 0; i < fragmentCount; i++) {
          const weight = randomBetween(0.78, 1.22);
          weights.push(weight);
          totalWeight += weight;
        }

        const fragments = weights.map((weight) => {
          const areaShare = weight / totalWeight;
          const area = generatedArea * areaShare;
          const radius = Math.max(this.minAsteroidFragmentRadius * 1.8, Math.sqrt(area));
          return {
            radius,
            mass: Math.max(12, generatedMass * areaShare)
          };
        }).sort((a, b) => b.radius - a.radius);

        const totalDiameter = fragments.reduce((sum, fragment) => sum + fragment.radius * 2, 0);
        const largestRadius = fragments[0]?.radius ?? this.minAsteroidFragmentRadius;
        const combinedPlanetRadius = Math.sqrt(totalArea);
        const ringRadius = Math.max(
          combinedPlanetRadius * 0.72 + largestRadius * 2.4,
          (totalDiameter * 1.16) / (Math.PI * 2)
        );
        const escapeSpeed = Math.sqrt((2 * this.G * generatedMass) / Math.max(ringRadius, largestRadius * 2));
        const baseEjectionSpeed = Math.max(impactSpeed * 0.72, escapeSpeed * this.planetCollisionEscapeSpeedFactor);
        const baseAngle = direction.angle + randomBetween(-0.12, 0.12);
        const procedural = !!(planetA.isProcedural || planetB.isProcedural);
        const fieldBody = !!(planetA.isFieldBody || planetB.isFieldBody);

        this.removeBody(planetA);
        this.removeBody(planetB);

        for (let i = 0; i < fragments.length; i++) {
          const fragment = fragments[i];
          const angle = baseAngle + (i / fragments.length) * Math.PI * 2 + randomBetween(-0.09, 0.09);
          const dirX = Math.cos(angle);
          const dirY = Math.sin(angle);
          const spawnRadius = ringRadius + randomBetween(-fragment.radius * 0.24, fragment.radius * 0.24);
          const speed = baseEjectionSpeed * randomBetween(1.0, 1.14);
          const hp = getAsteroidMaxHpFromRadius(fragment.radius);

          this.addBody(new PhysicalBody({
            x: centerX + dirX * spawnRadius,
            y: centerY + dirY * spawnRadius,
            vx: centerVx + dirX * speed,
            vy: centerVy + dirY * speed,
            radius: fragment.radius,
            mass: fragment.mass,
            angle: randomBetween(0, Math.PI * 2),
            angularVelocity: randomBetween(-0.55, 0.55),
            color: randomColor({
              minSaturation: 55,
              maxSaturation: 100,
              minLightness: 45,
              maxLightness: 72
            }),
            bounciness: 0.0,
            isProcedural: procedural,
            isFieldBody: fieldBody,
            kind: "asteroid",
            hp,
            maxHp: hp
          }));
        }

        return true;
      }

      startAsteroidPlanetAbsorption(asteroid, planet) {
        if (!asteroid || asteroid.isRemoved || asteroid.kind !== "asteroid" || asteroid.absorptionState) {
          return false;
        }

        if (!planet || planet.isRemoved || planet.kind !== "planet") {
          return false;
        }

        const dx = asteroid.x - planet.x;
        const dy = asteroid.y - planet.y;
        const distance = Math.max(0.0001, Math.hypot(dx, dy));
        const startRadius = asteroid.radius;
        const startMass = Math.max(0, asteroid.mass);

        asteroid.absorptionState = {
          planet,
          elapsed: 0,
          duration: this.asteroidPlanetAbsorptionAnimationDuration,
          startDistance: distance,
          startAngle: Math.atan2(dy, dx),
          startRadius,
          startMass
        };
        asteroid.planetContactTimer = 0;
        asteroid.planetContactId = planet.id;
        asteroid.touchingPlanetCandidate = null;
        asteroid.touchingPlanetDistSq = Infinity;
        asteroid.vx = planet.vx;
        asteroid.vy = planet.vy;
        asteroid.angularVelocity *= 0.35;
        asteroid.exertsGravity = false;
        asteroid.receivesGravity = false;
        asteroid.isCollisionDisabled = true;
        asteroid.mass = 0;
        asteroid.colliderRadius = 0;
        asteroid.renderOpacity = 1;
        this.updateBodyGravityProfile(asteroid);

        if (typeof planet.absorbAsteroidMass === "function") {
          planet.absorbAsteroidMass(startMass, startRadius);
        } else {
          planet.mass += startMass;
        }
        this.updateBodyGravityProfile(planet);
        return true;
      }

      updateAsteroidPlanetAbsorption(dt) {
        const asteroids = this.asteroidBodies;
        const planets = this.planetBodies;
        const padding = this.asteroidPlanetAbsorptionContactPadding;

        for (let i = 0; i < asteroids.length; i++) {
          const asteroid = asteroids[i];
          if (asteroid.isRemoved) continue;

          const state = asteroid.absorptionState;
          if (state) {
            const planet = state.planet;
            if (!planet || planet.isRemoved) {
              this.removeBody(asteroid);
              continue;
            }

            state.elapsed += dt;
            const t = clamp(state.elapsed / Math.max(0.0001, state.duration), 0, 1);
            const eased = 1 - Math.pow(1 - t, 3);
            const swirl = (1 - eased) * 0.18 * Math.sin(state.elapsed * 10 + asteroid.id * 0.37);
            const angle = state.startAngle + swirl;
            const targetDistance = Math.max(planet.radius * 0.14, planet.radius - state.startRadius * 0.3);
            const distance = lerp(state.startDistance, targetDistance, eased);

            asteroid.x = planet.x + Math.cos(angle) * distance;
            asteroid.y = planet.y + Math.sin(angle) * distance;
            asteroid.vx = planet.vx;
            asteroid.vy = planet.vy;
            asteroid.angle += (asteroid.angularVelocity + 2.6 * (1 - eased)) * dt;
            asteroid.radius = Math.max(0.2, lerp(state.startRadius, state.startRadius * 0.08, eased));
            asteroid.colliderRadius = 0;
            asteroid.renderOpacity = clamp(1 - eased * 0.94, 0.04, 1);

            if (t >= 1) {
              this.removeBody(asteroid);
            }
            continue;
          }

          let nearestPlanet = null;
          let nearestDistSq = Infinity;

          for (let j = 0; j < planets.length; j++) {
            const planet = planets[j];
            if (planet.isRemoved) continue;

            const contactRange = asteroid.radius + planet.radius + padding;
            const distSq = distanceSquared(asteroid.x, asteroid.y, planet.x, planet.y);
            if (distSq <= contactRange * contactRange && distSq < nearestDistSq) {
              nearestPlanet = planet;
              nearestDistSq = distSq;
            }
          }

          if (nearestPlanet) {
            if (asteroid.planetContactId === nearestPlanet.id) {
              asteroid.planetContactTimer = (asteroid.planetContactTimer ?? 0) + dt;
            } else {
              asteroid.planetContactId = nearestPlanet.id;
              asteroid.planetContactTimer = dt;
            }

            if (asteroid.planetContactTimer >= this.asteroidPlanetAbsorptionContactDelay) {
              this.startAsteroidPlanetAbsorption(asteroid, nearestPlanet);
            }
          } else {
            asteroid.planetContactTimer = 0;
            asteroid.planetContactId = 0;
          }
        }
      }

      handleSpecialCollision(a, b) {
        if (a.kind === "coin" || b.kind === "coin") {
          const coin = a.kind === "coin" ? a : b;
          const other = a.kind === "coin" ? b : a;

          if (isShipLike(other)) {
            this.collectCoin(other, coin);
            return true;
          }
        }

        if (a.kind === "scrap" || b.kind === "scrap") {
          const scrap = a.kind === "scrap" ? a : b;
          const other = a.kind === "scrap" ? b : a;

          if (isShipLike(other) && isScrapCollectorShip(other)) {
            this.collectScrap(other, scrap);
            return true;
          }
        }

        const aIsProjectile = a.kind === "projectile";
        const bIsProjectile = b.kind === "projectile";

        if (!aIsProjectile && !bIsProjectile) {
          return false;
        }

        if (aIsProjectile && bIsProjectile) {
          return true;
        }

        const projectile = aIsProjectile ? a : b;
        const other = aIsProjectile ? b : a;

        if (other === projectile.owner) {
          return true;
        }

        if (other.kind === "asteroid") {
          this.handleProjectileAsteroidImpact(projectile, other);
          return true;
        }

        if (other.kind === "scrap") {
          this.removeBody(projectile);
          this.damageBody(other, projectile.damage ?? 1, projectile);
          return true;
        }

        if (isShipLike(other)) {
          this.removeBody(projectile);
          this.damageBody(other, projectile.damage ?? 1, projectile);
          return true;
        }

        if (other.kind === "planet") {
          this.removeBody(projectile);
          return true;
        }

        return true;
      }

      resolveCircleCollision(a, b) {
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const distSq = dx * dx + dy * dy;
        const minDist = a.colliderRadius + b.colliderRadius;

        if (distSq >= minDist * minDist) return false;

        if (this.handleSpecialCollision(a, b)) {
          return true;
        }

        let distance = Math.sqrt(distSq);
        let nx = 1;
        let ny = 0;

        if (distance > 0.000001) {
          nx = dx / distance;
          ny = dy / distance;
        } else {
          distance = 0;
        }

        const invMassA = a.inverseMass;
        const invMassB = b.inverseMass;
        const invMassSum = invMassA + invMassB;

        if (invMassSum <= 0) return false;

        const penetration = minDist - distance;
        const slop = 0.01;
        const percent = 0.85;
        const correctionMagnitude = Math.max(penetration - slop, 0) * percent / invMassSum;

        if (correctionMagnitude > 0) {
          a.x -= nx * correctionMagnitude * invMassA;
          a.y -= ny * correctionMagnitude * invMassA;
          b.x += nx * correctionMagnitude * invMassB;
          b.y += ny * correctionMagnitude * invMassB;
        }

        const rvx = b.vx - a.vx;
        const rvy = b.vy - a.vy;
        const velAlongNormal = rvx * nx + rvy * ny;
        const impactSpeed = -velAlongNormal;

        if (a.kind === "planet" && b.kind === "planet") {
          return this.explodePlanetsIntoAsteroids(a, b, impactSpeed, { x: -nx, y: -ny });
        }

        if (isShipLike(a) && (b.kind === "asteroid" || b.kind === "planet")) {
          const crashSpeedThreshold = a.getCrashSpeedThreshold
            ? a.getCrashSpeedThreshold(this.shipCrashSpeed)
            : this.shipCrashSpeed;

          this.applyCollisionDamage(a, impactSpeed, crashSpeedThreshold);
        }

        if (isShipLike(b) && (a.kind === "asteroid" || a.kind === "planet")) {
          const crashSpeedThreshold = b.getCrashSpeedThreshold
            ? b.getCrashSpeedThreshold(this.shipCrashSpeed)
            : this.shipCrashSpeed;

          this.applyCollisionDamage(b, impactSpeed, crashSpeedThreshold);
        }

        if (impactSpeed > this.asteroidCollisionExplosionMinSpeed) {
          let exploded = false;

          if (a.kind === "asteroid" && b.kind === "asteroid") {
            const massA = Math.max(0.0001, a.mass ?? 0);
            const massB = Math.max(0.0001, b.mass ?? 0);

            if (massA >= massB * 4) {
              exploded = this.tryExplodeAsteroidFromCollision(b, a, impactSpeed, { x: nx, y: ny }) || exploded;
            } else if (massB >= massA * 4) {
              exploded = this.tryExplodeAsteroidFromCollision(a, b, impactSpeed, { x: -nx, y: -ny }) || exploded;
            } else {
              exploded = this.tryExplodeAsteroidFromCollision(a, b, impactSpeed, { x: -nx, y: -ny }) || exploded;
              exploded = this.tryExplodeAsteroidFromCollision(b, a, impactSpeed, { x: nx, y: ny }) || exploded;
            }
          } else {
            if (a.kind === "asteroid" && b.kind === "planet") {
              exploded = this.tryExplodeAsteroidFromCollision(a, b, impactSpeed, { x: -nx, y: -ny }) || exploded;
            }

            if (b.kind === "asteroid" && a.kind === "planet") {
              exploded = this.tryExplodeAsteroidFromCollision(b, a, impactSpeed, { x: nx, y: ny }) || exploded;
            }
          }

          if (exploded) {
            return true;
          }
        }

        if (velAlongNormal > 0) return true;

        const restitution = Math.min(a.bounciness, b.bounciness);
        const impulseMagnitude = -(1 + restitution) * velAlongNormal / invMassSum;

        const impulseX = impulseMagnitude * nx;
        const impulseY = impulseMagnitude * ny;

        a.vx -= impulseX * invMassA;
        a.vy -= impulseY * invMassA;
        b.vx += impulseX * invMassB;
        b.vy += impulseY * invMassB;

        const newRvx = b.vx - a.vx;
        const newRvy = b.vy - a.vy;
        const residualNormalSpeed = newRvx * nx + newRvy * ny;

        if (residualNormalSpeed < 0) {
          const cancelMagnitude = -residualNormalSpeed / invMassSum;
          const cancelX = cancelMagnitude * nx;
          const cancelY = cancelMagnitude * ny;

          a.vx -= cancelX * invMassA;
          a.vy -= cancelY * invMassA;
          b.vx += cancelX * invMassB;
          b.vy += cancelY * invMassB;
        }

        return true;
      }

      step(dt) {
        this.cleanupRemovedBodies();
        this.rebuildGrid();
        this.updateMerchantRescueState(playerShip);
        this.applyGravity(dt);

        for (let i = 0; i < this.bodies.length; i++) {
          const body = this.bodies[i];
          if (body.isRemoved) continue;
          body.update(dt);
        }

        this.cullTransientBodies();
        this.cleanupRemovedBodies();
        this.rebuildGrid();
        let collisions = this.resolveCollisions();

        for (let pass = 1; pass < this.maxCollisionPasses && collisions > 0; pass++) {
          this.cleanupRemovedBodies();
          this.rebuildGrid();
          collisions = this.resolveCollisions();
        }

        this.cleanupRemovedBodies();
        this.rebuildGrid();
        this.updateAsteroidPlanetAbsorption(dt);
        this.cleanupRemovedBodies();
      }

      update(dt) {
        this.lastMerchantRefusalTimer = Math.max(0, this.lastMerchantRefusalTimer - dt);
        let remaining = dt;

        while (remaining > 0 && !this.isGameOver) {
          const stepDt = Math.min(remaining, this.maxSubstep);
          this.step(stepDt);
          remaining -= stepDt;
        }

        this.cleanupRemovedBodies();
        this.rebuildGrid();
      }

      draw(ctx, camera, width, height) {
        const margin = 120;
        const left = camera.x - margin;
        const right = camera.x + width + margin;
        const top = camera.y - margin;
        const bottom = camera.y + height + margin;

        for (let i = 0; i < this.bodies.length; i++) {
          const body = this.bodies[i];
          if (body.isRemoved) continue;

          if (
            body.x + body.radius < left ||
            body.x - body.radius > right ||
            body.y + body.radius < top ||
            body.y - body.radius > bottom
          ) {
            continue;
          }

          body.draw(ctx, camera);
        }
      }

          const tangentAngle = angle + flowDirection * Math.PI * 0.5 + randomBetween(-0.04, 0.04);

          spec.hostPlanet = host;
          spec.orbitBandRadius = orbitalRadius;

          if (!this.canPlaceOrbiterAroundHost(host, x, y, spec, orbitalRadius, 10)) continue;

          this.registerProceduralBody(this.buildBody(x, y, spec));
          return true;
        }

        return false;
      }

      spawnStationAroundHost(host, minDistanceFromPlayer = 900, preferredAngle = null) {
        if (!host) {
          return false;
        }

        if (StationShip.isPlanetReservedByOther(host)) {
          return false;
        }

        for (let attempt = 0; attempt < 28; attempt++) {
          const spec = this.createStationSpec();
          const angle = preferredAngle ?? randomBetween(0, Math.PI * 2);
          const orbitalRadius = host.radius + spec.preferredPlanetOffset + randomBetween(-18, 36);
          const x = host.x + Math.cos(angle) * orbitalRadius;
          const y = host.y + Math.sin(angle) * orbitalRadius;

          if (distanceSquared(x, y, this.player.x, this.player.y) < minDistanceFromPlayer * minDistanceFromPlayer) {
            continue;
          }

          if (distanceSquared(x, y, this.player.x, this.player.y) > (this.spawnRadius - 140) * (this.spawnRadius - 140)) {
            continue;
          }

          const tangentAngle = angle + spec.orbitDirection * Math.PI * 0.5;
          const orbitSpeed = Math.sqrt((this.world.G * host.mass) / Math.max(orbitalRadius, host.radius + 20)) * randomBetween(0.86, 1.0);
          spec.vx = host.vx + Math.cos(tangentAngle) * orbitSpeed;
          spec.vy = host.vy + Math.sin(tangentAngle) * orbitSpeed;
          spec.hostPlanet = host;

          if (!this.canPlaceBody(x, y, spec, 12)) continue;

          this.registerProceduralBody(this.buildBody(x, y, spec));
          return true;
        }

        return false;
      }

      spawnScatteredStation(minDistanceFromPlayer = 900) {
        if (this.stationCount >= this.targetStationCount) {
          return false;
        }

        const hosts = this.collectPlanetHosts().filter((host) => {
          const hostDistSq = distanceSquared(host.x, host.y, this.player.x, this.player.y);
          return hostDistSq < (this.spawnRadius - 260) * (this.spawnRadius - 260);
        });
        shuffleInPlace(hosts);

        for (let i = 0; i < hosts.length; i++) {
          if (this.spawnStationAroundHost(hosts[i], minDistanceFromPlayer)) {
            return true;
          }
        }

        for (let attempt = 0; attempt < 20; attempt++) {
          const spec = this.createStationSpec();
          const angle = randomBetween(0, Math.PI * 2);
          const distance = randomBetween(minDistanceFromPlayer, this.spawnRadius - 320);
          const x = this.player.x + Math.cos(angle) * distance;
          const y = this.player.y + Math.sin(angle) * distance;

          if (!this.canPlaceBody(x, y, spec, 24)) continue;

          this.registerProceduralBody(this.buildBody(x, y, spec));
          return true;
        }

        return false;
      }

      isFarFromPlanets(x, y, minSurfaceDistance = 420) {
        for (let i = 0; i < this.world.bodies.length; i++) {
          const body = this.world.bodies[i];
          if (body.isRemoved || body.kind !== "planet") continue;
          const limit = body.radius + minSurfaceDistance;
          if (distanceSquared(x, y, body.x, body.y) < limit * limit) {
            return false;
          }
        }

        return true;
      }

      isFarFromOtherTarantulas(x, y, minDistance = 2400) {
        const limitSq = minDistance * minDistance;
        for (let i = 0; i < this.world.bodies.length; i++) {
          const body = this.world.bodies[i];
          if (body.isRemoved || body.kind !== "tarantula") continue;
          if (distanceSquared(x, y, body.x, body.y) < limitSq) {
            return false;
          }
        }

        return true;
      }

      spawnScatteredMiner(minDistanceFromPlayer = 950) {
        if (this.minerCount >= this.targetMinerCount || this.getProceduralCount() >= this.maxProceduralBodies) {
          return false;
        }

        for (let attempt = 0; attempt < 28; attempt++) {
          const spec = this.createMinerSpec();
          const angle = randomBetween(0, Math.PI * 2);
          const distance = randomBetween(minDistanceFromPlayer, this.spawnRadius - 360);
          const x = this.player.x + Math.cos(angle) * distance;
          const y = this.player.y + Math.sin(angle) * distance;

          if (!this.isFarFromPlanets(x, y, 460)) continue;
          if (!this.canPlaceBody(x, y, spec, 18)) continue;

          this.registerProceduralBody(this.buildBody(x, y, spec));
          return true;
        }

        return false;
      }

      spawnScatteredTarantula(minDistanceFromPlayer = 1700) {
        if (this.tarantulaCount >= this.targetTarantulaCount || this.getProceduralCount() >= this.maxProceduralBodies) {

        }

        for (let attempt = 0; attempt < 32; attempt++) {

          const x = this.player.x + Math.cos(angle) * distance;
