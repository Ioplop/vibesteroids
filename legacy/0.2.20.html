<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asteroids 0.2.20</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      color: white;
      font-family: monospace;
    }

    canvas {
      display: block;
      background: black;
      cursor: default;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function solveInterceptTime(relX, relY, relVX, relVY, projectileSpeed, maxLeadTime = 2.25) {
      const speed = Math.max(1, projectileSpeed);
      const a = relVX * relVX + relVY * relVY - speed * speed;
      const b = 2 * (relX * relVX + relY * relVY);
      const c = relX * relX + relY * relY;
      const EPS = 1e-6;

      if (c <= EPS) {
        return 0;
      }

      if (Math.abs(a) < EPS) {
        if (Math.abs(b) < EPS) {
          return clamp(Math.sqrt(c) / speed, 0, maxLeadTime);
        }
        const t = -c / b;
        return t > 0 ? clamp(t, 0, maxLeadTime) : null;
      }

      const discriminant = b * b - 4 * a * c;
      if (discriminant < 0) {
        return null;
      }

      const sqrtDiscriminant = Math.sqrt(discriminant);
      const t1 = (-b - sqrtDiscriminant) / (2 * a);
      const t2 = (-b + sqrtDiscriminant) / (2 * a);
      let bestTime = Infinity;

      if (t1 > EPS) bestTime = Math.min(bestTime, t1);
      if (t2 > EPS) bestTime = Math.min(bestTime, t2);

      if (!Number.isFinite(bestTime)) {
        return null;
      }

      return clamp(bestTime, 0, maxLeadTime);
    }

    function computeInterceptAim(relX, relY, relVX, relVY, projectileSpeed, leadScale = 1, maxLeadTime = 2.25) {
      const effectiveScale = Math.max(0, leadScale);
      const interceptTime = solveInterceptTime(relX, relY, relVX, relVY, projectileSpeed, maxLeadTime);
      const fallbackTime = clamp(Math.hypot(relX, relY) / Math.max(40, projectileSpeed), 0, maxLeadTime);
      const leadTime = (interceptTime ?? fallbackTime) * effectiveScale;
      return {
        leadTime,
        x: relX + relVX * leadTime,
        y: relY + relVY * leadTime
      };
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    const keys = {
      Space: false,
      KeyQ: false,
      KeyP: false,
      KeyO: false,
      KeyI: false,
      KeyC: false,
      KeyM: false,
      KeyZ: false,
      KeyX: false
    };

    window.test_mode = false;

    function createTestCheats() {
      return {
        testMode: false,
        invincibility: false,
        dragTarget: null,
        activationSequence: ["Digit8", "Digit0", "Digit8", "Digit0"],
        activationProgress: 0,
        syncGlobalFlag() {
          window.test_mode = this.testMode;
        },
        toggleTestMode() {
          this.testMode = !this.testMode;
          if (!this.testMode) {
            this.invincibility = false;
            this.dragTarget = null;
          }
          this.syncGlobalFlag();
        },
        handleActivationSequence(event) {
          if (event.repeat) {
            return false;
          }

          const expectedCode = this.activationSequence[this.activationProgress];
          if (event.code === expectedCode) {
            this.activationProgress += 1;
            if (this.activationProgress >= this.activationSequence.length) {
              this.activationProgress = 0;
              this.toggleTestMode();
            }
            return true;
          }

          this.activationProgress = event.code === this.activationSequence[0] ? 1 : 0;
          return event.code === "Digit8" || event.code === "Digit0";
        },
        isPlayerInvincible() {
          return this.testMode && this.invincibility;
        },
        handleKeyDown(event) {
          if (!this.testMode || world.isGameOver) {
            return false;
          }

          if (event.repeat && event.code !== 'KeyC') {
            return this.isReservedTestHotkey(event.code);
          }

          if (event.code === 'KeyP') {
            this.spawnPlanetAtCursor();
            return true;
          }

          if (event.code === 'KeyO') {
            this.spawnAsteroidAtCursor();
            return true;
          }

          if (event.code === 'KeyI') {
            this.invincibility = !this.invincibility;
            if (this.invincibility) {
              playerShip.hp = playerShip.maxHp;
            }
            return true;
          }

          if (event.code === 'KeyM') {
            playerShip.credits += 1000;
            return true;
          }

          if (event.code === 'KeyZ') {
            this.clearScene();
            return true;
          }

          if (event.code === 'KeyX') {
            proceduralField.spawnsEnabled = !proceduralField.spawnsEnabled;
            proceduralField.spawnAccumulator = 0;
            return true;
          }

          if (this.handleShipSpawnKey(event)) {
            return true;
          }

          if (event.code === 'KeyC') {
            if (!this.dragTarget || this.dragTarget.isRemoved) {
              this.dragTarget = findManipulableBodyUnderCursor();
            }
            return true;
          }

          return false;
        },
        isReservedTestHotkey(code) {
          return code === 'KeyP' ||
            code === 'KeyO' ||
            code === 'KeyI' ||
            code === 'KeyM' ||
            code === 'KeyZ' ||
            code === 'KeyX' ||
            code === 'Digit1' ||
            code === 'Digit2' ||
            code === 'Digit3' ||
            code === 'Digit4' ||
            code === 'Digit5' ||
            code === 'Digit6';
        },
        handleShipSpawnKey(event) {
          let spawnType = null;
          let hullClass = 'small';

          if (event.code === 'Digit1') {
            spawnType = 'station';
          } else if (event.code === 'Digit2') {
            spawnType = 'miner';
          } else if (event.code === 'Digit3') {
            spawnType = 'flea';
          } else if (event.code === 'Digit4') {
            spawnType = 'dragonfly';
            hullClass = event.shiftKey ? 'large' : 'small';
          } else if (event.code === 'Digit5') {
            spawnType = 'wasp';
            hullClass = event.shiftKey ? 'large' : 'small';
          } else if (event.code === 'Digit6') {
            spawnType = 'tarantula';
          }

          if (!spawnType) {
            return false;
          }

          this.spawnShipAtCursor(spawnType, hullClass);
          return true;
        },
        spawnShipAtCursor(type, hullClass = 'small') {
          let spec = null;
          const uniqueGroupId = proceduralField.nextSchoolId++;

          if (type === 'station') {
            spec = proceduralField.createStationSpec();
          } else if (type === 'miner') {
            spec = proceduralField.createMinerSpec();
          } else if (type === 'flea') {
            spec = proceduralField.createFleaSpec(uniqueGroupId, 0, 0);
          } else if (type === 'dragonfly') {
            spec = proceduralField.createDragonflySpec(uniqueGroupId, hullClass, 0, 0);
          } else if (type === 'wasp') {
            spec = proceduralField.createWaspSpec(uniqueGroupId, hullClass, 0, 0);
          } else if (type === 'tarantula') {
            spec = proceduralField.createTarantulaSpec();
          }

          if (!spec) {
            return null;
          }

          spec.vx = 0;
          spec.vy = 0;
          spec.angularVelocity = 0;
          const body = proceduralField.buildBody(mouse.worldX, mouse.worldY, spec);
          body.isProcedural = false;
          body.isFieldBody = false;
          world.addBody(body);
          return body;
        },
        handleKeyUp(event) {
          if (event.code === 'KeyC') {
            this.dragTarget = null;
            return true;
          }
          return false;
        },
        spawnPlanetAtCursor() {
          const spec = proceduralField.createPlanetSpec();
          spec.vx = 0;
          spec.vy = 0;
          spec.angularVelocity = 0;
          const body = proceduralField.buildBody(mouse.worldX, mouse.worldY, spec);
          body.isProcedural = false;
          body.isFieldBody = false;
          world.addBody(body);
          return body;
        },
        spawnAsteroidAtCursor() {
          const spec = proceduralField.createAsteroidSpec();
          spec.vx = 0;
          spec.vy = 0;
          spec.angularVelocity = 0;
          const body = proceduralField.buildBody(mouse.worldX, mouse.worldY, spec);
          body.isProcedural = false;
          body.isFieldBody = false;
          world.addBody(body);
          return body;
        },
        clearScene() {
          closeShop();
          factionMenuState.isOpen = false;
          mouse.brakeLockTarget = null;
          this.dragTarget = null;
          for (let i = world.bodies.length - 1; i >= 0; i--) {
            const body = world.bodies[i];
            if (body === playerShip || body.isRemoved) {
              continue;
            }
            world.removeBody(body);
          }
          world.cleanupRemovedBodies();
          proceduralField.spawnAccumulator = 0;
          proceduralField.fleaSpawnCooldown = 0;
          proceduralField.waspSpawnCooldown = 0;
          proceduralField.dragonflySpawnCooldown = 0;
          proceduralField.minerSpawnCooldown = 0;
        },
        update(dt) {
          if (!this.testMode) {
            return;
          }

          if (this.invincibility && playerShip.isAlive) {
            playerShip.hp = playerShip.maxHp;
          }

          const target = this.dragTarget;
          if (!keys.KeyC || !target || target.isRemoved) {
            if (target && target.isRemoved) {
              this.dragTarget = null;
            }
            return;
          }

          const dx = mouse.worldX - target.x;
          const dy = mouse.worldY - target.y;
          const dist = Math.hypot(dx, dy);
          if (!(dist > 0.001)) {
            return;
          }

          const accelLimit = target.kind === 'planet' ? 320 : target.kind === 'asteroid' ? 760 : 980;
          const accel = clamp(dist * 4.2, 0, accelLimit);
          target.applyAcceleration((dx / dist) * accel, (dy / dist) * accel, dt);
          target.angularVelocity *= 0.96;
        }
      };
    }

    const testCheats = createTestCheats();

    const mouse = {
      x: canvas.width * 0.5,
      y: canvas.height * 0.5,
      worldX: 0,
      worldY: 0,
      left: false,
      right: false,
      brakeLockTarget: null
    };

    function updateMouseWorld() {
      mouse.worldX = camera.x + mouse.x;
      mouse.worldY = camera.y + mouse.y;
    }

    function getControlKey(event) {
      if (event.code === "Space") {
        return "Space";
      }

      if (event.code === "KeyQ") {
        return "KeyQ";
      }

      if (
        event.code === "KeyP" ||
        event.code === "KeyO" ||
        event.code === "KeyI" ||
        event.code === "KeyC" ||
        event.code === "KeyM" ||
        event.code === "KeyZ" ||
        event.code === "KeyX"
      ) {
        return event.code;
      }

      return event.key;
    }

    window.addEventListener("keydown", (e) => {
      if (testCheats.handleActivationSequence(e)) {
        e.preventDefault();
      }

      const key = getControlKey(e);
      const cheatHandled = testCheats.handleKeyDown(e);

      if (key in keys) {
        if (key === "Space" && !keys.Space) {
          mouse.brakeLockTarget = findBodyUnderCursor();
        }
        keys[key] = true;
        e.preventDefault();
      } else if (cheatHandled) {
        e.preventDefault();
      }

      if (!cheatHandled) {
        handleMenuHotkeys(e);
      }
    });

    window.addEventListener("keyup", (e) => {
      const key = getControlKey(e);

      if (key in keys) {
        keys[key] = false;
        if (key === "Space") {
          mouse.brakeLockTarget = null;
        }
        if (testCheats.handleKeyUp(e)) {
          e.preventDefault();
        } else {
          e.preventDefault();
        }
      }
    });

    window.addEventListener("blur", () => {
      for (const key in keys) {
        keys[key] = false;
      }
      mouse.left = false;
      mouse.right = false;
      mouse.brakeLockTarget = null;
      testCheats.activationProgress = 0;
      testCheats.dragTarget = null;
    });

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function randomInt(min, max) {
      return Math.floor(randomBetween(min, max + 1));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function wrapAngle(angle) {
      const tau = Math.PI * 2;
      let wrapped = (angle + Math.PI) % tau;

      if (wrapped < 0) {
        wrapped += tau;
      }

      return wrapped - Math.PI;
    }

    function clampVectorMagnitude(x, y, maxMagnitude) {
      const magnitude = Math.hypot(x, y);

      if (!(magnitude > maxMagnitude) || magnitude <= 0) {
        return { x, y, magnitude };
      }

      const scale = maxMagnitude / magnitude;
      return {
        x: x * scale,
        y: y * scale,
        magnitude: maxMagnitude
      };
    }

    function randomColor({
      minHue = 0,
      maxHue = 359,
      minSaturation = 55,
      maxSaturation = 95,
      minLightness = 45,
      maxLightness = 72
    } = {}) {
      const hue = randomInt(minHue, maxHue);
      const saturation = randomInt(minSaturation, maxSaturation);
      const lightness = randomInt(minLightness, maxLightness);
      return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
    }

    function distanceSquared(ax, ay, bx, by) {
      const dx = bx - ax;
      const dy = by - ay;
      return dx * dx + dy * dy;
    }

    function shuffleInPlace(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = array[i];
        array[i] = array[j];
        array[j] = tmp;
      }

      return array;
    }

    function getFactionDisposition(value) {
      if (value > 80) return "ally";
      if (value < 40) return "enemy";
      return "neutral";
    }

    function getFactionColor(value) {
      const disposition = getFactionDisposition(value);
      if (disposition === "enemy") return "#ff7575";
      if (disposition === "ally") return "#ffffff";
      return "#b7b7b7";
    }

    function getAsteroidMaxHpFromRadius(radius) {
      const baseRadius = 13;
      return Math.max(1, Math.ceil((radius / baseRadius) ** 2));
    }

    function isShipLike(body) {
      return !!body && (
        body.kind === "ship" ||
        body.kind === "station" ||
        body.kind === "flea" ||
        body.kind === "wasp" ||
        body.kind === "dragonfly" ||
        body.kind === "miner" ||
        body.kind === "tarantula"
      );
    }

    function isShipKind(kind) {
      return kind === "ship" || kind === "station" || kind === "flea" || kind === "wasp" || kind === "dragonfly" || kind === "miner" || kind === "tarantula";
    }

    function isArmedNpcShip(body) {
      return !!body && (body.kind === "station" || body.kind === "wasp" || body.kind === "dragonfly" || body.kind === "miner" || body.kind === "tarantula");
    }

    function isScrapCollectorShip(body) {
      return !!body && ((body.kind === "dragonfly" || body.kind === "tarantula") && body.hp < body.maxHp - 0.01);
    }

    function isScrapBreakerShip(body) {
      return !!body && (body.kind === "wasp" || body.kind === "miner");
    }

    class Renderable {
      draw(ctx, camera) {}
    }

    class SpatialGrid {
      constructor(cellSize) {
        this.cellSize = cellSize;
        this.cells = new Map();
      }

      clear() {
        this.cells.clear();
      }

      cellX(x) {
        return Math.floor(x / this.cellSize);
      }

      cellY(y) {
        return Math.floor(y / this.cellSize);
      }

      key(cx, cy) {
        return `${cx},${cy}`;
      }

      insert(body) {
        const r = body.colliderRadius;
        const minX = this.cellX(body.x - r);
        const maxX = this.cellX(body.x + r);
        const minY = this.cellY(body.y - r);
        const maxY = this.cellY(body.y + r);

        body._gridMinX = minX;
        body._gridMaxX = maxX;
        body._gridMinY = minY;
        body._gridMaxY = maxY;

        for (let cy = minY; cy <= maxY; cy++) {
          for (let cx = minX; cx <= maxX; cx++) {
            const key = this.key(cx, cy);
            let bucket = this.cells.get(key);

            if (!bucket) {
              bucket = [];
              bucket._cx = cx;
              bucket._cy = cy;
              this.cells.set(key, bucket);
            }

            bucket.push(body);
          }
        }
      }

      forEachNearbyUnique(x, y, radius, stamp, callback) {
        const minX = this.cellX(x - radius);
        const maxX = this.cellX(x + radius);
        const minY = this.cellY(y - radius);
        const maxY = this.cellY(y + radius);

        for (let cy = minY; cy <= maxY; cy++) {
          for (let cx = minX; cx <= maxX; cx++) {
            const bucket = this.cells.get(this.key(cx, cy));
            if (!bucket) continue;

            for (let i = 0; i < bucket.length; i++) {
              const body = bucket[i];
              if (body._queryStamp === stamp) continue;
              body._queryStamp = stamp;
              if (callback(body) === false) {
                return false;
              }
            }
          }
        }

        return true;
      }

      forEachCollisionPair(callback) {
        for (const bucket of this.cells.values()) {
          const cellX = bucket._cx;
          const cellY = bucket._cy;

          for (let i = 0; i < bucket.length; i++) {
            const a = bucket[i];

            for (let j = i + 1; j < bucket.length; j++) {
              const b = bucket[j];
              const firstSharedCellX = a._gridMinX > b._gridMinX ? a._gridMinX : b._gridMinX;
              if (firstSharedCellX !== cellX) continue;
              const firstSharedCellY = a._gridMinY > b._gridMinY ? a._gridMinY : b._gridMinY;
              if (firstSharedCellY !== cellY) continue;
              callback(a, b);
            }
          }
        }
      }

      draw(ctx, camera, width, height) {
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.06)";
        ctx.lineWidth = 1;

        const left = camera.x;
        const top = camera.y;
        const right = camera.x + width;
        const bottom = camera.y + height;

        const startX = Math.floor(left / this.cellSize) * this.cellSize;
        const endX = Math.ceil(right / this.cellSize) * this.cellSize;
        const startY = Math.floor(top / this.cellSize) * this.cellSize;
        const endY = Math.ceil(bottom / this.cellSize) * this.cellSize;

        for (let x = startX; x <= endX; x += this.cellSize) {
          ctx.beginPath();
          ctx.moveTo(x - camera.x, 0);
          ctx.lineTo(x - camera.x, height);
          ctx.stroke();
        }

        for (let y = startY; y <= endY; y += this.cellSize) {
          ctx.beginPath();
          ctx.moveTo(0, y - camera.y);
          ctx.lineTo(width, y - camera.y);
          ctx.stroke();
        }

        ctx.restore();
      }
    }

    let nextBodyId = 1;

    class PhysicalBody extends Renderable {
      constructor({
        x = 0,
        y = 0,
        vx = 0,
        vy = 0,
        angle = 0,
        angularVelocity = 0,
        mass = 1,
        radius = 10,
        colliderRadius = null,
        bounciness = 0.0,
        color = "white",
        isProcedural = false,
        isFieldBody = isProcedural,
        kind = "asteroid",
        receivesGravity = true,
        exertsGravity = true,
        hp = null,
        maxHp = null
      } = {}) {
        super();

        this.id = nextBodyId++;
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.angle = angle;
        this.angularVelocity = angularVelocity;
        this.mass = mass;
        this.radius = radius;
        this.colliderRadius = colliderRadius ?? radius;
        this.bounciness = bounciness;
        this.color = color;
        this.isProcedural = isProcedural;
        this.isFieldBody = isFieldBody;
        this.kind = kind;
        this.receivesGravity = receivesGravity;
        this.exertsGravity = exertsGravity;
        this.isRemoved = false;

        const inferredMaxHp = maxHp ?? hp ?? (kind === "asteroid" ? getAsteroidMaxHpFromRadius(radius) : 1);
        this.maxHp = inferredMaxHp;
        this.hp = hp ?? inferredMaxHp;

        this.gravityRange = 0;
        this.gravityRangeSq = 0;
        this._queryStamp = 0;
        this.collisionDamageCooldown = 0;
        this.lastCollisionDamageSpeed = 0;
        this.timeSinceLastDamage = Number.POSITIVE_INFINITY;
        this.renderOpacity = 1;
      }

      get inverseMass() {
        return this.mass > 0 ? 1 / this.mass : 0;
      }

      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.angle += this.angularVelocity * dt;
        this.collisionDamageCooldown = Math.max(0, this.collisionDamageCooldown - dt);
        if (this.collisionDamageCooldown <= 0) {
          this.lastCollisionDamageSpeed = 0;
        }
        this.timeSinceLastDamage += dt;
      }

      applyAcceleration(ax, ay, dt) {
        this.vx += ax * dt;
        this.vy += ay * dt;
      }

      draw(ctx, camera) {
        ctx.save();
        ctx.translate(this.x - camera.x, this.y - camera.y);
        ctx.globalAlpha *= clamp(this.renderOpacity ?? 1, 0, 1);

        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(this.angle) * this.radius, Math.sin(this.angle) * this.radius);
        ctx.strokeStyle = this.color;
        ctx.stroke();

        ctx.restore();
      }
    }

    class Ship extends PhysicalBody {
      constructor(options = {}) {
        super({
          radius: 18,
          mass: 20,
          bounciness: 0.0,
          color: "white",
          kind: "ship",
          ...options
        });

        this.faction = options.faction ?? "neutral";
        this.thrustPower = options.thrustPower ?? 185;
        this.baseBrakePower = options.brakePower ?? 220;
        this.brakeThrustRatio = this.thrustPower > 0 ? this.baseBrakePower / this.thrustPower : 0;
        this.angularAccel = options.angularAccel ?? 5.5;
        this.angularBrakeAccel = options.angularBrakeAccel ?? 7.0;
        this.maxAimAngularSpeed = options.maxAimAngularSpeed ?? 3.9;
        this.isAlive = true;
        this.armorCrashSpeedBonus = options.armorCrashSpeedBonus ?? 0;

        this.fireRate = options.fireRate ?? 2;
        this.projectileSpeed = options.projectileSpeed ?? (620 / 3);
        this.projectilesPerShot = options.projectilesPerShot ?? 1;
        this.projectileSpread = options.projectileSpread ?? 0.11;
        this.timeUntilNextShot = 0;

        this.maxAmmo = options.maxAmmo ?? 200;
        this.ammo = options.ammo ?? this.maxAmmo;
        this.maxFuel = options.maxFuel ?? 60;
        this.fuel = options.fuel ?? this.maxFuel;
        this.fuelBurnRate = options.fuelBurnRate ?? 1;
        this.refuelDelay = options.refuelDelay ?? 1.0;
        this.refuelTimer = 0;
        this.isTouchingPlanet = false;
        this.rechargeReady = false;
        this.healReady = false;
        this.credits = options.credits ?? 0;
        this.coinMagnetRadius = options.coinMagnetRadius ?? 0;
        this.coinPickupRadius = options.coinPickupRadius ?? 0;
        this.projectileDamage = options.projectileDamage ?? 1;
        this.maxHp = options.maxHp ?? this.maxHp ?? 10;
        this.hp = Math.min(options.hp ?? this.maxHp, this.maxHp);

        this.upgradeLevels = {
          shotSpeed: 0,
          fireRate: 0,
          multishot: 0,
          maxAmmo: 0,
          maxFuel: 0,
          thrust: 0,
          turnSpeed: 0,
          armor: 0,
          refuelDelay: 0,
          maxHp: 0,
          coinMagnet: 0,
          damage: 0
        };
      }

      consumeFuel(dt, rate = this.fuelBurnRate) {
        if (this.fuel <= 0 || dt <= 0 || rate <= 0) {
          return 0;
        }

        const fuelCost = Math.min(dt * rate, this.fuel);
        this.fuel -= fuelCost;
        return fuelCost / rate;
      }

      getAmmoCostPerShot() {
        return Math.max(1, this.projectilesPerShot);
      }

      getCrashSpeedThreshold(baseCrashSpeed) {
        return baseCrashSpeed + this.armorCrashSpeedBonus;
      }

      getBrakePower() {
        return this.thrustPower > 0 ? this.thrustPower * this.brakeThrustRatio : 0;
      }

      updateCombatAim(target) {
        if (!target || target.isRemoved || target.isAlive === false) {
          this.combatTarget = null;
          this.combatDistance = Infinity;
          return this.angle;
        }

        const relX = target.x - this.x;
        const relY = target.y - this.y;
        const relVX = target.vx - this.vx;
        const relVY = target.vy - this.vy;
        const dist = Math.hypot(relX, relY);
        const aim = computeInterceptAim(relX, relY, relVX, relVY, this.projectileSpeed, 1, 1.85);
        this.combatTarget = target;
        this.combatDistance = dist;
        this.combatAimAngle = Math.atan2(aim.y, aim.x);
        return this.combatAimAngle;
      }

      draw(ctx, camera) {
        ctx.save();
        ctx.translate(this.x - camera.x, this.y - camera.y);
        ctx.rotate(this.angle);

        ctx.beginPath();
        ctx.moveTo(this.radius, 0);
        ctx.lineTo(-this.radius * 0.7, -this.radius * 0.65);
        ctx.lineTo(-this.radius * 0.35, 0);
        ctx.lineTo(-this.radius * 0.7, this.radius * 0.65);
        ctx.closePath();

        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.restore();
      }
    }

    class BaseFactionShip extends Ship {
      constructor(options = {}) {
        super({
          bounciness: 0.0,
          exertsGravity: false,
          receivesGravity: true,
          maxFuel: Infinity,
          fuel: Infinity,
          fuelBurnRate: 0,
          coinMagnetRadius: 0,
          coinPickupRadius: 0,
          ...options
        });

        this.aiWorld = options.aiWorld ?? null;
        this.aiPlayer = options.aiPlayer ?? null;
        this.squadId = options.squadId ?? 0;
        this.hullClass = options.hullClass ?? "small";
        this.squadCruiseSpeed = options.squadCruiseSpeed ?? 120;
        this.maxCruiseSpeed = options.maxCruiseSpeed ?? 240;
        this.maxAcceleration = options.maxAcceleration ?? 260;
        this.enemySenseRadius = options.enemySenseRadius ?? 980;
        this.weaponRange = options.weaponRange ?? 460;
        this.projectileSenseRadius = options.projectileSenseRadius ?? 240;
        this.coinSenseRadius = options.coinSenseRadius ?? 0;
        this.scrapSenseRadius = options.scrapSenseRadius ?? 0;
        this.squadSenseRadius = options.squadSenseRadius ?? 260;
        this.preferredSquadRadius = options.preferredSquadRadius ?? 52;
        this.personalSpace = options.personalSpace ?? (this.radius * 1.8);
        this.orbitDirection = options.orbitDirection ?? (Math.random() < 0.5 ? -1 : 1);
        this.squadPhase = options.squadPhase ?? 0;
        this.escortRadius = options.escortRadius ?? 960;
        this.escortBreakSpeed = options.escortBreakSpeed ?? 320;
        this.escortDistance = options.escortDistance ?? (140 + (this.id % 4) * 26);
        this.combatTarget = null;
        this.combatAimAngle = this.angle;
        this.combatDistance = Infinity;
        this.wanderAngle = options.wanderAngle ?? randomBetween(0, Math.PI * 2);
        this.formationLane = options.formationLane ?? ((this.id % 5) - 2);
        this.projectileColor = options.projectileColor ?? this.color;
        this.fireAngleTolerance = options.fireAngleTolerance ?? 0.25;
        this.squadAlignmentWeight = options.squadAlignmentWeight ?? 0.9;
        this.squadCohesionWeight = options.squadCohesionWeight ?? 0.9;
        this.squadSeparationWeight = options.squadSeparationWeight ?? 1.0;
        this.avoidFrontStrength = options.avoidFrontStrength ?? 0;
      }

      consumeFuel(dt, rate = this.fuelBurnRate) {
        return Math.max(0, dt);
      }

      setAIContext(world, player) {
        this.aiWorld = world;
        this.aiPlayer = player;
        return this;
      }

      queryNearby(range, callback) {
        if (!this.aiWorld || !this.aiWorld.grid || !(range > 0)) {
          return;
        }

        const stamp = this.aiWorld.gravityQueryStamp++;
        this.aiWorld.grid.forEachNearbyUnique(this.x, this.y, range, stamp, (body) => {
          if (body === this || body.isRemoved) return;
          callback(body);
        });
      }

      getDispositionTo(factionName) {
        if (!factionSystem || !factionName) return "neutral";
        return factionSystem.getDisposition(this.faction, factionName);
      }

      getCrashSpeedThreshold(baseCrashSpeed) {
        return Math.max(baseCrashSpeed, this.hullClass === "large" ? 260 : 200);
      }

      chooseCoinTarget() {
        if (!(this.coinSenseRadius > 0)) {
          return null;
        }

        let bestCoin = null;
        let bestScore = Infinity;

        this.queryNearby(this.coinSenseRadius, (body) => {
          if (body.kind !== "coin") return;

          const dx = body.x - this.x;
          const dy = body.y - this.y;
          const dist = Math.hypot(dx, dy);
          if (!(dist > 0.001) || dist > this.coinSenseRadius) return;

          const relSpeed = Math.hypot(body.vx - this.vx, body.vy - this.vy);
          const score = dist + relSpeed * 0.12 - Math.max(1, body.value ?? 1) * 16;
          if (score < bestScore) {
            bestScore = score;
            bestCoin = body;
          }
        });

        return bestCoin;
      }

      chooseScrapTarget(mode = "collect") {
        if (!(this.scrapSenseRadius > 0)) {
          return null;
        }

        let bestScrap = null;
        let bestScore = Infinity;

        this.queryNearby(this.scrapSenseRadius, (body) => {
          if (body.kind !== "scrap") return;

          const dx = body.x - this.x;
          const dy = body.y - this.y;
          const dist = Math.hypot(dx, dy);
          if (!(dist > 0.001) || dist > this.scrapSenseRadius) return;

          const relSpeed = Math.hypot(body.vx - this.vx, body.vy - this.vy);
          const hpBias = Math.max(1, body.hp ?? 1) * (mode === "break" ? 18 : 6);
          const score = dist + relSpeed * 0.08 + hpBias;
          if (score < bestScore) {
            bestScore = score;
            bestScrap = body;
          }
        });

        return bestScrap;
      }

      chooseEnemyTarget() {
        let bestTarget = null;
        let bestScore = Infinity;

        this.queryNearby(this.enemySenseRadius, (body) => {
          if (!isShipLike(body) || !body.isAlive) return;
          if (this.getDispositionTo(body.faction) !== "enemy") return;

          const dx = body.x - this.x;
          const dy = body.y - this.y;
          const dist = Math.hypot(dx, dy);
          if (!(dist > 0.001) || dist > this.enemySenseRadius) return;

          const relativeSpeed = Math.hypot(body.vx - this.vx, body.vy - this.vy);
          const pulgaBias = body.faction === "Pulgas" ? -40 : 0;
          const score = dist + relativeSpeed * 0.18 + pulgaBias;

          if (score < bestScore) {
            bestScore = score;
            bestTarget = body;
          }
        });

        this.combatTarget = bestTarget;
        this.combatDistance = bestTarget
          ? Math.hypot(bestTarget.x - this.x, bestTarget.y - this.y)
          : Infinity;
        return bestTarget;
      }

      updateCombatAim(target) {
        if (!target || target.isRemoved || !target.isAlive) {
          this.combatTarget = null;
          this.combatDistance = Infinity;
          return this.angle;
        }

        const relX = target.x - this.x;
        const relY = target.y - this.y;
        const relVX = target.vx - this.vx;
        const relVY = target.vy - this.vy;
        const dist = Math.hypot(relX, relY);
        const aim = computeInterceptAim(relX, relY, relVX, relVY, this.projectileSpeed, 1, 1.85);
        this.combatTarget = target;
        this.combatDistance = dist;
        this.combatAimAngle = Math.atan2(aim.y, aim.x);
        return this.combatAimAngle;
      }

      computeSquadState() {
        let separationX = 0;
        let separationY = 0;
        let alignmentVX = this.vx;
        let alignmentVY = this.vy;
        let centerX = this.x;
        let centerY = this.y;
        let count = 1;

        this.queryNearby(this.squadSenseRadius, (body) => {
          if (body.kind !== this.kind || body.faction !== this.faction || body.squadId !== this.squadId) return;

          const dx = body.x - this.x;
          const dy = body.y - this.y;
          const dist = Math.hypot(dx, dy);
          if (!(dist > 0.001) || dist > this.squadSenseRadius) return;

          count++;
          alignmentVX += body.vx;
          alignmentVY += body.vy;
          centerX += body.x;
          centerY += body.y;

          if (dist < this.personalSpace) {
            const push = (this.personalSpace - dist) / this.personalSpace;
            separationX -= (dx / dist) * push * 320;
            separationY -= (dy / dist) * push * 320;
          }
        });

        const avgVX = alignmentVX / count;
        const avgVY = alignmentVY / count;
        const squadCenterX = centerX / count;
        const squadCenterY = centerY / count;
        const toCenterX = squadCenterX - this.x;
        const toCenterY = squadCenterY - this.y;
        const centerDist = Math.hypot(toCenterX, toCenterY);
        const compactness = count <= 1
          ? 0
          : clamp(1 - centerDist / Math.max(1, this.squadSenseRadius), 0, 1);

        return {
          x: separationX * this.squadSeparationWeight + (avgVX - this.vx) * this.squadAlignmentWeight + toCenterX * this.squadCohesionWeight,
          y: separationY * this.squadSeparationWeight + (avgVY - this.vy) * this.squadAlignmentWeight + toCenterY * this.squadCohesionWeight,
          avgVX,
          avgVY,
          centerX: squadCenterX,
          centerY: squadCenterY,
          count,
          compactness
        };
      }

      computeHazardAvoidance() {
        let avoidX = 0;
        let avoidY = 0;
        let extraAccel = 0;
        const senseRadius = Math.max(this.enemySenseRadius * 0.5, 280);

        this.queryNearby(senseRadius, (body) => {
          if (body.kind !== "planet" && body.kind !== "asteroid") return;

          const dx = this.x - body.x;
          const dy = this.y - body.y;
          const dist = Math.max(0.001, Math.hypot(dx, dy));
          const nx = dx / dist;
          const ny = dy / dist;
          const relVX = this.vx - body.vx;
          const relVY = this.vy - body.vy;
          const inwardSpeed = Math.max(0, -(relVX * nx + relVY * ny));

          const hardRadius = body.radius + this.radius + (body.kind === "planet" ? 64 : 22);
          const softRadius = hardRadius + (body.kind === "planet" ? 180 : 90);
          if (dist >= softRadius) return;

          const closeness = clamp((softRadius - dist) / Math.max(1, softRadius - hardRadius), 0, 1);
          let strength = (body.kind === "planet" ? 120 : 64) * closeness * closeness + inwardSpeed * (body.kind === "planet" ? 1.4 : 0.7);

          if (dist < hardRadius) {
            strength += (hardRadius - dist) * (body.kind === "planet" ? 2.6 : 1.4);
          }

          avoidX += nx * strength;
          avoidY += ny * strength;
          extraAccel = Math.max(extraAccel, strength);
        });

        return { x: avoidX, y: avoidY, extraAccel };
      }

      computeProjectileDodge(multiplier = 1) {
        let dodgeX = 0;
        let dodgeY = 0;

        this.queryNearby(this.projectileSenseRadius, (body) => {
          if (body.kind !== "projectile") return;
          if (body.owner === this) return;
          if (body.faction && this.getDispositionTo(body.faction) !== "enemy") return;

          const dx = this.x - body.x;
          const dy = this.y - body.y;
          const dist = Math.hypot(dx, dy);
          if (!(dist > 0.001) || dist > this.projectileSenseRadius) return;

          const speed = Math.hypot(body.vx, body.vy);
          if (!(speed > 0.001)) return;

          const dirX = body.vx / speed;
          const dirY = body.vy / speed;
          const toMeX = dx / dist;
          const toMeY = dy / dist;
          const closing = dirX * toMeX + dirY * toMeY;
          if (closing < 0.45) return;

          const side = Math.sign(dirX * toMeY - dirY * toMeX) || (this.id % 2 === 0 ? 1 : -1);
          const panic = (1 - dist / this.projectileSenseRadius) * (0.7 + closing * 0.7) * multiplier;
          dodgeX += -dirY * side * panic * 320 - dirX * panic * 120;
          dodgeY += dirX * side * panic * 320 - dirY * panic * 120;
        });

        return { x: dodgeX, y: dodgeY };
      }

      shouldEscortPlayer() {
        if (!this.aiPlayer || !this.aiPlayer.isAlive) return false;
        if (this.getDispositionTo(this.aiPlayer.faction) !== "ally") return false;
        if (distanceSquared(this.x, this.y, this.aiPlayer.x, this.aiPlayer.y) > this.escortRadius * this.escortRadius) return false;
        return Math.hypot(this.aiPlayer.vx, this.aiPlayer.vy) <= this.escortBreakSpeed;
      }

      computeEscortVector() {
        const target = this.aiPlayer;
        const speed = Math.hypot(target.vx, target.vy);
        const heading = speed > 12 ? Math.atan2(target.vy, target.vx) : target.angle;
        const sideOffset = (0.65 + this.formationLane * 0.12) * this.orbitDirection * 110;
        const backOffset = this.escortDistance + Math.abs(this.formationLane) * 18;
        const desiredX = target.x - Math.cos(heading) * backOffset + Math.cos(heading + Math.PI * 0.5) * sideOffset;
        const desiredY = target.y - Math.sin(heading) * backOffset + Math.sin(heading + Math.PI * 0.5) * sideOffset;
        return {
          desiredVX: target.vx + (desiredX - this.x) * 1.45,
          desiredVY: target.vy + (desiredY - this.y) * 1.45,
          desiredAngle: Math.atan2(target.y - this.y, target.x - this.x),
          effectiveMaxSpeed: Math.max(this.maxCruiseSpeed, speed + 40)
        };
      }

      updateAimRotation(dt, targetAngle, gain = 4.2) {
        const angleError = wrapAngle(targetAngle - this.angle);
        const desiredAngularVelocity = clamp(angleError * gain, -this.maxAimAngularSpeed, this.maxAimAngularSpeed);
        const angularVelocityError = desiredAngularVelocity - this.angularVelocity;
        const angularStep = clamp(angularVelocityError * 4.8, -this.angularAccel, this.angularAccel);
        this.angularVelocity += angularStep * dt;
        this.angularVelocity *= 1 / (1 + dt * 3.2);
      }
    }

    class WaspShip extends BaseFactionShip {
      constructor(options = {}) {
        const hullClass = options.hullClass ?? "small";
        const isLarge = hullClass === "large";
        super({
          radius: isLarge ? 18 : 12,
          colliderRadius: isLarge ? 18 : 12,
          mass: isLarge ? 14 : 7,
          color: isLarge ? "#ffd24a" : "#ffee58",
          kind: "wasp",
          thrustPower: isLarge ? 250 : 290,
          brakePower: isLarge ? 280 : 320,
          angularAccel: isLarge ? 2.35 : 2.9,
          angularBrakeAccel: isLarge ? 2.8 : 3.4,
          maxAimAngularSpeed: isLarge ? 2.8 : 3.2,
          fireRate: isLarge ? 2.35 : 3.45,
          projectileSpeed: isLarge ? 620 : 690,
          projectileSpread: 0,
          projectilesPerShot: 1,
          maxAmmo: Infinity,
          ammo: Infinity,
          faction: "Avispas",
          maxHp: isLarge ? 18 : 7,
          hp: isLarge ? 18 : 7,
          coinMagnetRadius: 110,
          projectileDamage: isLarge ? 5 : 3,
          coinSenseRadius: isLarge ? 340 : 380,
          scrapSenseRadius: isLarge ? 420 : 460,
          hullClass,
          squadCruiseSpeed: isLarge ? 118 : 138,
          maxCruiseSpeed: isLarge ? 250 : 280,
          maxAcceleration: isLarge ? 310 : 350,
          enemySenseRadius: 1120,
          weaponRange: isLarge ? 520 : 480,
          projectileSenseRadius: 230,
          squadSenseRadius: 280,
          preferredSquadRadius: isLarge ? 66 : 56,
          personalSpace: isLarge ? 26 : 20,
          escortRadius: 980,
          escortBreakSpeed: 300,
          escortDistance: isLarge ? 190 : 150,
          fireAngleTolerance: 0.18,
          squadAlignmentWeight: isLarge ? 1.85 : 2.15,
          squadCohesionWeight: isLarge ? 2.25 : 2.65,
          squadSeparationWeight: isLarge ? 0.72 : 0.82,
          ...options
        });
      }

      updateAutopilot(dt) {
        if (!this.aiWorld) return;

        const squad = this.computeSquadState();
        const avoid = this.computeHazardAvoidance();
        const dodge = this.computeProjectileDodge(0.5);
        const enemy = this.chooseEnemyTarget();
        const coinTarget = enemy ? null : this.chooseCoinTarget();
        const scrapTarget = enemy || coinTarget ? null : this.chooseScrapTarget("break");
        let desiredVX = this.vx;
        let desiredVY = this.vy;
        let desiredAngle = this.angle;
        let effectiveMaxSpeed = this.maxCruiseSpeed;

        if (enemy) {
          const dx = enemy.x - this.x;
          const dy = enemy.y - this.y;
          const dist = Math.max(0.001, Math.hypot(dx, dy));
          const nx = dx / dist;
          const ny = dy / dist;
          const tx = -ny * this.orbitDirection;
          const ty = nx * this.orbitDirection;
          const standoff = enemy.radius + (this.hullClass === "large" ? 210 : 170) + Math.abs(this.formationLane) * 9;
          const approach = clamp((dist - standoff) * 1.18, -135, 150);
          const tangent = this.hullClass === "large" ? 74 : 96;
          const squadBiasX = (squad.centerX - this.x) * 0.85 + (squad.avgVX - this.vx) * 0.25;
          const squadBiasY = (squad.centerY - this.y) * 0.85 + (squad.avgVY - this.vy) * 0.25;
          desiredVX = enemy.vx + nx * approach + tx * tangent + squadBiasX;
          desiredVY = enemy.vy + ny * approach + ty * tangent + squadBiasY;
          desiredAngle = this.updateCombatAim(enemy);
          effectiveMaxSpeed = Math.max(this.maxCruiseSpeed, Math.hypot(enemy.vx, enemy.vy) + 120);
        } else if (this.shouldEscortPlayer()) {
          const escort = this.computeEscortVector();
          desiredVX = escort.desiredVX;
          desiredVY = escort.desiredVY;
          desiredAngle = escort.desiredAngle;
          effectiveMaxSpeed = escort.effectiveMaxSpeed;
          this.combatTarget = null;
          this.combatDistance = Infinity;
        } else if (coinTarget) {
          const dx = coinTarget.x - this.x;
          const dy = coinTarget.y - this.y;
          const dist = Math.max(0.001, Math.hypot(dx, dy));
          const pull = clamp(dist * 1.75, 90, 240);
          desiredVX = coinTarget.vx + squad.avgVX * 0.25 + (dx / dist) * pull + (squad.centerX - this.x) * 0.42;
          desiredVY = coinTarget.vy + squad.avgVY * 0.25 + (dy / dist) * pull + (squad.centerY - this.y) * 0.42;
          desiredAngle = Math.atan2(dy, dx);
          effectiveMaxSpeed = Math.max(this.maxCruiseSpeed, 210, Math.hypot(coinTarget.vx, coinTarget.vy) + 120);
          this.combatTarget = null;
          this.combatDistance = Infinity;
        } else if (scrapTarget) {
          const dx = scrapTarget.x - this.x;
          const dy = scrapTarget.y - this.y;
          const dist = Math.max(0.001, Math.hypot(dx, dy));
          const nx = dx / dist;
          const ny = dy / dist;
          const tx = -ny * this.orbitDirection;
          const ty = nx * this.orbitDirection;
          const standoff = scrapTarget.radius + 155 + Math.abs(this.formationLane) * 7;
          const approach = clamp((dist - standoff) * 0.95, -120, 130);
          const squadBiasX = (squad.centerX - this.x) * 0.82 + (squad.avgVX - this.vx) * 0.28;
          const squadBiasY = (squad.centerY - this.y) * 0.82 + (squad.avgVY - this.vy) * 0.28;
          desiredVX = scrapTarget.vx + nx * approach + tx * 34 + squadBiasX;
          desiredVY = scrapTarget.vy + ny * approach + ty * 34 + squadBiasY;
          desiredAngle = this.updateCombatAim(scrapTarget);
          effectiveMaxSpeed = Math.max(this.maxCruiseSpeed, 220);
        } else {
          if (Math.random() < dt * 0.35) {
            this.wanderAngle += randomBetween(-0.35, 0.35);
          }
          desiredVX = squad.avgVX * 0.55 + Math.cos(this.wanderAngle) * this.squadCruiseSpeed + (squad.centerX - this.x) * 0.9;
          desiredVY = squad.avgVY * 0.55 + Math.sin(this.wanderAngle) * this.squadCruiseSpeed + (squad.centerY - this.y) * 0.9;
          desiredAngle = Math.atan2(desiredVY, desiredVX);
          this.combatTarget = null;
          this.combatDistance = Infinity;
        }

        desiredVX += squad.x * 0.45 + avoid.x + dodge.x;
        desiredVY += squad.y * 0.45 + avoid.y + dodge.y;
        effectiveMaxSpeed = Math.max(effectiveMaxSpeed, Math.hypot(this.vx, this.vy));
        this.updateAimRotation(dt, desiredAngle, this.hullClass === "large" ? 4.2 : 4.8);

        const faceX = Math.cos(this.angle);
        const faceY = Math.sin(this.angle);
        const desiredDeltaVX = desiredVX - this.vx;
        const desiredDeltaVY = desiredVY - this.vy;
        const forwardIntent = desiredDeltaVX * faceX + desiredDeltaVY * faceY;

        if (forwardIntent > 4) {
          const thrust = clamp(forwardIntent * 2.9, 0, this.thrustPower + avoid.extraAccel * 0.15);
          this.applyAcceleration(faceX * thrust, faceY * thrust, dt);
        }

        const currentSpeed = Math.hypot(this.vx, this.vy);
        const desiredForwardSpeed = desiredVX * faceX + desiredVY * faceY;
        const currentForwardSpeed = this.vx * faceX + this.vy * faceY;
        const needsBrake = desiredForwardSpeed < currentForwardSpeed - 14 || Math.abs(wrapAngle(desiredAngle - this.angle)) > 1.1 || currentSpeed > effectiveMaxSpeed + 16;

        if (needsBrake && currentSpeed > 0.001) {
          const brakeStep = Math.min(this.getBrakePower() * dt, currentSpeed);
          this.vx -= (this.vx / currentSpeed) * brakeStep;
          this.vy -= (this.vy / currentSpeed) * brakeStep;
        }

        const velocity = clampVectorMagnitude(this.vx, this.vy, effectiveMaxSpeed);
        this.vx = velocity.x;
        this.vy = velocity.y;
      }

      update(dt) {
        this.updateAutopilot(dt);
        super.update(dt);
      }

      draw(ctx, camera) {
        const sx = this.x - camera.x;
        const sy = this.y - camera.y;

        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(this.angle);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;

        ctx.beginPath();
        ctx.moveTo(this.radius * 1.15, 0);
        ctx.lineTo(-this.radius * 0.72, -this.radius * 0.62);
        ctx.lineTo(-this.radius * 0.3, 0);
        ctx.lineTo(-this.radius * 0.72, this.radius * 0.62);
        ctx.closePath();
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-this.radius * 0.05, -this.radius * 0.74);
        ctx.lineTo(this.radius * 0.18, -this.radius * 0.08);
        ctx.moveTo(-this.radius * 0.05, this.radius * 0.74);
        ctx.lineTo(this.radius * 0.18, this.radius * 0.08);
        ctx.stroke();

          this.combatDistance = Infinity;

          const dy = coinTarget.y - this.y;

          const dx = body.x - this.x;
          const dy = body.y - this.y;
          const dist = Math.hypot(dx, dy);
          if (!(dist > 0.001) || dist > bestDist) return;

          nearest = body;
          bestDist = dist;
        });

        if (!nearest) return null;
        return { ship: nearest, distance: bestDist };

          this.combatDistance = Infinity;
        }

        desiredVX += avoid.x * 1.18 + dodge.x;

        const currentSpeed = Math.hypot(this.vx, this.vy);
        const desiredForwardSpeed = desiredVX * faceX + desiredVY * faceY;
        const currentForwardSpeed = this.vx * faceX + this.vy * faceY;

          this.vy -= (this.vy / currentSpeed) * brakeStep;
        }

        const velocity = clampVectorMagnitude(this.vx, this.vy, effectiveMaxSpeed);
        this.vx = velocity.x;
        this.vy = velocity.y;

        ctx.stroke();
        ctx.restore();
      }

    class PlayerShip extends Ship {
      update(dt) {
        if (!this.isAlive) {
          super.update(dt);
          return;
        }

        const aimDX = mouse.worldX - this.x;
        const aimDY = mouse.worldY - this.y;
        if (Math.hypot(aimDX, aimDY) > 0.001) {
          const targetAngle = Math.atan2(aimDY, aimDX);
          const angleError = wrapAngle(targetAngle - this.angle);
          const desiredAngularVelocity = clamp(angleError * 8.5, -this.maxAimAngularSpeed, this.maxAimAngularSpeed);
          const angularVelocityError = desiredAngularVelocity - this.angularVelocity;
          const angularStep = clamp(angularVelocityError * 5.5, -this.angularAccel, this.angularAccel);
          this.angularVelocity += angularStep * dt;

          const smartDamping = 1 / (1 + dt * (2.6 + 6.5 * Math.max(0, 0.22 - Math.abs(angleError))));
          this.angularVelocity *= smartDamping;
        }

        if (mouse.right) {
          const thrustDt = this.consumeFuel(dt, this.fuelBurnRate);

          if (thrustDt > 0) {
            const ax = Math.cos(this.angle) * this.thrustPower;
            const ay = Math.sin(this.angle) * this.thrustPower;
            this.vx += ax * thrustDt;
            this.vy += ay * thrustDt;
          }
        }

        if (keys.Space) {
          const matchBody = mouse.brakeLockTarget && !mouse.brakeLockTarget.isRemoved ? mouse.brakeLockTarget : null;
          const targetVX = matchBody ? matchBody.vx : 0;
          const targetVY = matchBody ? matchBody.vy : 0;
          const relVX = this.vx - targetVX;
          const relVY = this.vy - targetVY;
          const relSpeed = Math.hypot(relVX, relVY);

          if (relSpeed > 0) {
            const brakeDt = this.consumeFuel(dt, this.fuelBurnRate * 0.9);
            const brakeStep = this.getBrakePower() * brakeDt;

            if (brakeStep >= relSpeed) {
              this.vx = targetVX;
              this.vy = targetVY;
            } else if (brakeStep > 0) {
              this.vx -= (relVX / relSpeed) * brakeStep;
              this.vy -= (relVY / relSpeed) * brakeStep;
            }
          }

        }

        super.update(dt);
      }
    }

    class PlanetBody extends PhysicalBody {
      constructor(options = {}) {
        super({
          bounciness: 0.0,
          color: "cyan",
          kind: "planet",
          ...options
        });

        this.targetRadius = options.targetRadius ?? this.radius;

      }

      absorbAsteroidMass(mass, sourceRadius = 0) {
        if (!(mass > 0)) {
          return;
        }

        const density = this.materialDensity > 0
          ? this.materialDensity
          : this.mass / Math.max(1, this.targetRadius * this.targetRadius);

        this.materialDensity = Math.max(0.0001, density);
        this.mass += mass;
        this.targetRadius = Math.sqrt(Math.max(1, this.mass / this.materialDensity));
        this.absorptionGlow = Math.min(
          1.8,
          this.absorptionGlow + clamp(mass / Math.max(12, this.mass), 0.12, 0.42) + clamp(sourceRadius / Math.max(18, this.radius), 0.05, 0.22)
        );
      }

      update(dt) {
        super.update(dt);

        const blend = 1 - Math.exp(-dt * 2.6);
        if (Math.abs(this.targetRadius - this.radius) > 0.01) {
          this.radius = lerp(this.radius, this.targetRadius, blend);
          if (Math.abs(this.targetRadius - this.radius) < 0.04) {
            this.radius = this.targetRadius;
          }
          this.colliderRadius = this.radius;
        } else if (this.radius !== this.targetRadius) {
          this.radius = this.targetRadius;
          this.colliderRadius = this.radius;
        }

        this.absorptionGlow = Math.max(0, this.absorptionGlow - dt * 0.48);
      }

      draw(ctx, camera) {
        const sx = this.x - camera.x;
        const sy = this.y - camera.y;

        ctx.save();
        ctx.translate(sx, sy);

        if (this.absorptionGlow > 0.001) {
          const glowAlpha = Math.min(0.3, this.absorptionGlow * 0.18);
          ctx.beginPath();
          ctx.arc(0, 0, this.radius * (1.02 + this.absorptionGlow * 0.04), 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255,255,255,${glowAlpha})`;
          ctx.lineWidth = 5 + this.absorptionGlow * 4;
          ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, 0, this.radius * 0.7, 0.2, Math.PI * 1.7);
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        if (this.absorptionGlow > 0.001) {
          const arcRadius = this.radius * (0.82 + this.absorptionGlow * 0.06);
          const arcSpan = Math.PI * (0.22 + this.absorptionGlow * 0.08);
          const baseAngle = performance.now() * 0.0013 + this.id * 0.37;

          ctx.beginPath();
          ctx.arc(0, 0, arcRadius, baseAngle, baseAngle + arcSpan);
          ctx.strokeStyle = "rgba(255,255,255,0.28)";
          ctx.lineWidth = 2.2;
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(0, 0, arcRadius * 0.92, baseAngle + Math.PI * 0.9, baseAngle + Math.PI * 0.9 + arcSpan * 0.82);
          ctx.strokeStyle = "rgba(255,255,255,0.18)";
          ctx.lineWidth = 1.6;
          ctx.stroke();
        }

        ctx.restore();
      }
    }

    class ProjectileBody extends PhysicalBody {
      constructor(options = {}) {
        super({
          radius: 3,
          mass: 0.08,
          bounciness: 0.0,
          color: "white",
          kind: "projectile",
          exertsGravity: false,
          receivesGravity: true,
          hp: 1,
          maxHp: 1,
          ...options
        });

        this.owner = options.owner ?? null;
        this.faction = options.faction ?? null;
        this.damage = options.damage ?? 1;
        this.age = options.age ?? 0;
        this.factionTimeout = options.factionTimeout ?? 6;
        this.maxLifetime = options.maxLifetime ?? 10;
        this.maxTravelDistance = options.maxTravelDistance ?? 5000;
        this.maxTravelDistanceSq = this.maxTravelDistance * this.maxTravelDistance;
        this.originX = options.originX ?? this.x;
        this.originY = options.originY ?? this.y;
        this.shouldDespawn = false;
      }

      update(dt) {
        this.age += dt;
        if (this.faction !== null && this.age >= this.factionTimeout) {
          this.faction = null;
        }
        super.update(dt);
        this.shouldDespawn = this.age >= this.maxLifetime || distanceSquared(this.x, this.y, this.originX, this.originY) >= this.maxTravelDistanceSq;
      }

      draw(ctx, camera) {
        const sx = this.x - camera.x;
        const sy = this.y - camera.y;
        const speed = Math.hypot(this.vx, this.vy);

        let dirX = Math.cos(this.angle);
        let dirY = Math.sin(this.angle);

        if (speed > 0.0001) {
          dirX = this.vx / speed;
          dirY = this.vy / speed;
        }

        ctx.save();
        ctx.translate(sx, sy);

        ctx.beginPath();
        ctx.moveTo(-dirX * this.radius * 2.8, -dirY * this.radius * 2.8);
        ctx.lineTo(dirX * this.radius * 1.2, dirY * this.radius * 1.2);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();

        ctx.restore();
      }
    }

    class ScrapBody extends PhysicalBody {

      draw(ctx, camera) {
        const sx = this.x - camera.x;
        const sy = this.y - camera.y;
        const shapes = [
          [[1.0, 0.0], [0.34, 0.82], [-0.5, 0.72], [-0.98, 0.12], [-0.62, -0.78], [0.18, -0.92]],
          [[0.88, -0.08], [0.18, 0.92], [-0.72, 0.52], [-0.94, -0.22], [-0.16, -0.98], [0.62, -0.54]],
          [[0.96, 0.12], [0.56, 0.88], [-0.12, 0.64], [-0.92, 0.28], [-0.74, -0.7], [0.12, -0.94]],
          [[0.82, -0.26], [0.42, 0.86], [-0.42, 0.94], [-0.98, 0.06], [-0.42, -0.82], [0.32, -0.98]]
        ];
        const pts = shapes[this.shapeIndex % shapes.length];

        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(this.angle);
        ctx.globalAlpha *= clamp(this.renderOpacity ?? 1, 0, 1);

        ctx.beginPath();
        ctx.moveTo(pts[0][0] * this.radius, pts[0][1] * this.radius);
        for (let i = 1; i < pts.length; i++) {

        ctx.lineTo(this.radius * 0.24, -this.radius * 0.28);
        ctx.strokeStyle = this.accentColor;
        ctx.lineWidth = 1;
        ctx.stroke();
