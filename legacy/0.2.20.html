    class StationShip extends Ship {
      static reservedHostPlanets = new Map();

      static getPlanetReservationKey(planet) {
        return planet?.id ?? null;
      }

      static isPlanetReservedByOther(planet, ship = null) {
        const key = StationShip.getPlanetReservationKey(planet);
        if (key == null) return false;
        const ownerId = StationShip.reservedHostPlanets.get(key);
        return ownerId != null && ownerId !== ship?.id;
      }

      constructor(options = {}) {
        super({
          radius: 32,
          colliderRadius: 32,
          mass: 26,
          bounciness: 0.0,
          color: "#7ddcff",
          kind: "station",
          exertsGravity: false,
          receivesGravity: true,
          thrustPower: 148,
          brakePower: 230,
          angularAccel: 0,
          angularBrakeAccel: 0,
          fireRate: 1.25,
          projectileSpeed: 620 / 3,
          projectileSpread: 0,
          projectilesPerShot: 1,
          maxAmmo: Infinity,
          ammo: Infinity,
          maxFuel: Infinity,
          fuel: Infinity,
          fuelBurnRate: 0,
          faction: "Mercader Ambulante",
          maxHp: 50,
          hp: 50,
          coinMagnetRadius: 200,
          ...options
        });

        this.interactionRadius = options.interactionRadius ?? (this.radius + 124);
        this.aiWorld = options.aiWorld ?? null;
        this.aiPlayer = options.aiPlayer ?? null;
        this.hostPlanet = null;
        this.hostRetargetTimer = 0;
        this.orbitDirection = options.orbitDirection ?? (Math.random() < 0.5 ? -1 : 1);
        this.preferredPlanetOffset = options.preferredPlanetOffset ?? randomBetween(360, 540);
        this.preferredPlanetBand = options.preferredPlanetBand ?? randomBetween(56, 96);
        this.maxCruiseSpeed = options.maxCruiseSpeed ?? 46;
        this.maxThrustAcceleration = options.maxThrustAcceleration ?? 84;
        this.maxPlanetMatchAcceleration = options.maxPlanetMatchAcceleration ?? 156;
        this.maxCourtesyAcceleration = options.maxCourtesyAcceleration ?? 42;
        this.playerCourtesyRadius = options.playerCourtesyRadius ?? (this.interactionRadius + 70);
        this.hostSeekDistance = options.hostSeekDistance ?? 3600;
        this.planetSenseRadius = options.planetSenseRadius ?? 2200;
        this.asteroidSenseRadius = options.asteroidSenseRadius ?? 340;
        this.weaponRange = options.weaponRange ?? 340;
        this.enemyWeaponRange = options.enemyWeaponRange ?? 720;
        this.enemySenseRadius = options.enemySenseRadius ?? 950;
        this.weaponAimLead = options.weaponAimLead ?? 0.92;
        this.combatTarget = null;
        this.combatAimAngle = this.angle;
        this.combatDistance = Infinity;
        this.isOrbitingPlanet = false;
        this.longRangeReactionTimer = 0;
        this.longRangeReactionX = 0;
        this.longRangeReactionY = 0;
        this.groupAnchor = null;
        this.targetPreference = "asteroid";
        this.wanderAngle = randomBetween(0, Math.PI * 2);
        this.rescueApproachRadius = options.rescueApproachRadius ?? Math.max(88, this.interactionRadius * 0.68);

        if (options.hostPlanet) {
          this.setHostPlanet(options.hostPlanet);
        }
      }

      onRemoved() {
        this.releaseHostPlanet();
      }

      releaseHostPlanet() {
        if (this.hostPlanet) {
          const reservationKey = StationShip.getPlanetReservationKey(this.hostPlanet);
          if (reservationKey != null && StationShip.reservedHostPlanets.get(reservationKey) === this.id) {
            StationShip.reservedHostPlanets.delete(reservationKey);
          }
        }

        this.hostPlanet = null;
      }

      setHostPlanet(planet) {
        if (planet === this.hostPlanet) {
          if (planet) {
            const reservationKey = StationShip.getPlanetReservationKey(planet);
            if (reservationKey != null) {
              StationShip.reservedHostPlanets.set(reservationKey, this.id);
            }
          }
          return planet;
        }

        if (!planet || planet.isRemoved) {
          this.releaseHostPlanet();
          return null;
        }

        const reservationKey = StationShip.getPlanetReservationKey(planet);
        const ownerId = reservationKey != null
          ? StationShip.reservedHostPlanets.get(reservationKey)
          : null;

        if (ownerId != null && ownerId !== this.id) {
          return this.hostPlanet;
        }

        this.releaseHostPlanet();
        if (reservationKey != null) {
          StationShip.reservedHostPlanets.set(reservationKey, this.id);
        }
        this.hostPlanet = planet;
        return this.hostPlanet;
      }

      consumeFuel(dt, rate = this.fuelBurnRate) {
        return Math.max(0, dt);
      }

      getCrashSpeedThreshold(baseCrashSpeed) {
        return Math.max(baseCrashSpeed, 1000);
      }

      setAIContext(world, player) {
        this.aiWorld = world;
        this.aiPlayer = player;
        return this;
      }

      getPlanetSurfaceStandOffMax() {
        return this.preferredPlanetOffset + this.preferredPlanetBand;
      }

      getPlanetSurfaceCoverageRange() {
        return this.getPlanetSurfaceStandOffMax() + 36;
      }

      queryNearby(range, callback) {
        if (!this.aiWorld || !this.aiWorld.grid || !(range > 0)) {
          return;
        }

        const stamp = this.aiWorld.gravityQueryStamp++;
        this.aiWorld.grid.forEachNearbyUnique(this.x, this.y, range, stamp, (body) => {
          if (body === this || body.isRemoved) return;
          callback(body);
        });
      }

      getDispositionTo(factionName) {
        if (!factionSystem || !factionName) return "neutral";
        return factionSystem.getDisposition(this.faction, factionName);
      }

      chooseHostPlanet() {
        let bestPlanet = null;
        let bestScore = Infinity;
        const searchRadii = [this.hostSeekDistance, this.hostSeekDistance * 1.6];

        for (let i = 0; i < searchRadii.length; i++) {
          const searchRadius = searchRadii[i];

          this.queryNearby(searchRadius, (body) => {
            if (body.kind !== "planet") return;
            if (StationShip.isPlanetReservedByOther(body, this)) return;

            const dx = body.x - this.x;
            const dy = body.y - this.y;
            const dist = Math.hypot(dx, dy);
            const desiredRadius = body.radius + this.preferredPlanetOffset;
            const radiusError = Math.abs(dist - desiredRadius);
            const speedMismatch = Math.hypot(this.vx - body.vx, this.vy - body.vy);
            const score = radiusError + dist * 0.028 + speedMismatch * 1.1;

            if (score < bestScore) {
              bestScore = score;
              bestPlanet = body;
            }
          });

          if (bestPlanet) {
            break;
          }
        }

        return bestPlanet ?? this.hostPlanet ?? null;
      }

      computeAvoidance() {
        let avoidX = 0;
        let avoidY = 0;
        let extraAccel = 0;
        let hardPlanetThreat = false;
        const senseRadius = Math.max(this.planetSenseRadius, this.asteroidSenseRadius);

        this.queryNearby(senseRadius, (body) => {
          if (body.kind !== "planet" && body.kind !== "asteroid") {
            return;
          }

          const dx = this.x - body.x;
          const dy = this.y - body.y;
          const dist = Math.max(0.001, Math.hypot(dx, dy));
          const nx = dx / dist;
          const ny = dy / dist;
          const relVX = this.vx - body.vx;
          const relVY = this.vy - body.vy;
          const inwardSpeed = Math.max(0, -(relVX * nx + relVY * ny));

          let hardRadius;
          let softRadius;
          let baseStrength;
          let velocityWeight;
          let penetrationWeight;

          if (body.kind === "planet") {
            hardRadius = body.radius + this.radius + 104;
            softRadius = body.radius + Math.max(190, this.preferredPlanetOffset * 0.8);
            baseStrength = body === this.hostPlanet ? 80 : 92;
            velocityWeight = 1.65;
            penetrationWeight = 1.65;
          } else {
            hardRadius = body.radius + this.radius + 30;
            softRadius = body.radius + this.radius + 132;
            baseStrength = 34;
            velocityWeight = 1.1;
            penetrationWeight = 0.95;
          }

          if (dist >= softRadius) {
            return;
          }

          const band = Math.max(softRadius - hardRadius, 1);
          const closeness = clamp((softRadius - dist) / band, 0, 1);
          let strength = baseStrength * closeness * closeness + inwardSpeed * velocityWeight;

          if (dist < hardRadius) {
            strength += (hardRadius - dist) * penetrationWeight + (body.kind === "planet" ? 48 : 12);
            if (body.kind === "planet") {
              hardPlanetThreat = true;
            }
          }

          avoidX += nx * strength;
          avoidY += ny * strength;
          extraAccel = Math.max(extraAccel, strength);
        });

        return {
          x: avoidX,
          y: avoidY,
          extraAccel,
          hardPlanetThreat
        };
      }

      computeAllyGrouping() {
        let avgVX = 0;
        let avgVY = 0;
        let centerX = 0;
        let centerY = 0;
        let count = 0;

        this.queryNearby(320, (body) => {
          if (!isShipLike(body) || body.faction !== this.faction) return;
          const dx = body.x - this.x;
          const dy = body.y - this.y;
          const dist = Math.hypot(dx, dy);
          if (!(dist > 0.001) || dist > 320) return;
          avgVX += body.vx;
          avgVY += body.vy;
          centerX += body.x;
          centerY += body.y;
          count++;
        });

        if (count <= 0) {
          return { x: 0, y: 0 };
        }

        avgVX /= count;
        avgVY /= count;
        centerX /= count;
        centerY /= count;

        const toCenterX = centerX - this.x;
        const toCenterY = centerY - this.y;
        const alignmentX = (avgVX - this.vx) * 0.55;
        const alignmentY = (avgVY - this.vy) * 0.55;
        const cohesionX = toCenterX * 0.015;
        const cohesionY = toCenterY * 0.015;
        return { x: alignmentX + cohesionX, y: alignmentY + cohesionY };
      }

      updateCombatTarget(ignoreAsteroids = false) {
        let bestTarget = null;
        let bestScore = Infinity;
        let bestAimAngle = this.angle;
        let bestDistance = Infinity;
        let bestPreference = "asteroid";
        const queryRange = Math.max(this.weaponRange, this.enemyWeaponRange);

        this.queryNearby(queryRange, (body) => {
          if (body === this) return;

          const isEnemyShip = isShipLike(body) && body.isAlive && this.getDispositionTo(body.faction) === "enemy";
          const isAsteroid = !ignoreAsteroids && body.kind === "asteroid";

          if (!isEnemyShip && !isAsteroid) {
            return;
          }

          const relX = body.x - this.x;
          const relY = body.y - this.y;
          const dist = Math.hypot(relX, relY);
          const allowedRange = isEnemyShip ? this.enemyWeaponRange : this.weaponRange;

          if (!(dist > 0.001) || dist > allowedRange) {
            return;
          }

          const relVX = body.vx - this.vx;
          const relVY = body.vy - this.vy;
          const aim = computeInterceptAim(relX, relY, relVX, relVY, this.projectileSpeed, this.weaponAimLead, 2.0);
          const aimAngle = Math.atan2(aim.y, aim.x);
          const angleError = Math.abs(wrapAngle(aimAngle - this.angle));
          const score = (isEnemyShip ? 0 : 240) + dist + angleError * (isEnemyShip ? 36 : 54);

          if (score < bestScore) {
            bestScore = score;
            bestTarget = body;
            bestAimAngle = aimAngle;
            bestDistance = dist;
            bestPreference = isEnemyShip ? "enemy" : "asteroid";
          }
        });

        this.combatTarget = bestTarget;
        this.combatAimAngle = bestAimAngle;
        this.combatDistance = bestDistance;
        this.targetPreference = bestPreference;
        return bestTarget;
      }

      registerLongRangeHit(projectile) {
        const impactSpeed = Math.hypot(projectile.vx, projectile.vy);
        if (!(impactSpeed > 0.001)) return;
        const dirX = projectile.vx / impactSpeed;
        const dirY = projectile.vy / impactSpeed;
        this.longRangeReactionX = -dirX * 280;
        this.longRangeReactionY = -dirY * 280;
        this.longRangeReactionTimer = 4.5;
      }

      updateAutopilot(dt) {
        if (!this.aiWorld) {
          return;
        }

        const surfaceCoverageRange = this.getPlanetSurfaceCoverageRange();
        this.weaponRange = Math.max(this.weaponRange, surfaceCoverageRange);
        this.coinMagnetRadius = Math.max(this.coinMagnetRadius, surfaceCoverageRange);
        this.asteroidSenseRadius = Math.max(this.asteroidSenseRadius, surfaceCoverageRange + 80);

        this.longRangeReactionTimer = Math.max(0, this.longRangeReactionTimer - dt);
        this.hostRetargetTimer -= dt;

        if (
          !this.hostPlanet ||
          this.hostPlanet.isRemoved ||
          this.hostRetargetTimer <= 0 ||
          distanceSquared(this.x, this.y, this.hostPlanet.x, this.hostPlanet.y) > this.hostSeekDistance * this.hostSeekDistance
        ) {
          const nextHostPlanet = this.chooseHostPlanet();
          this.setHostPlanet(nextHostPlanet);
          this.hostRetargetTimer = randomBetween(0.3, 0.7);
        }

        this.updateCombatTarget(true);
        const nearbyEnemyCombat = !!(
          this.combatTarget &&
          this.targetPreference === "enemy" &&
          this.combatDistance <= this.enemySenseRadius
        );

        let desiredVX = this.vx;
        let desiredVY = this.vy;
        let maxAccel = this.maxThrustAcceleration;
        let orbiting = false;

        if (this.hostPlanet) {
          const host = this.hostPlanet;
          const dx = host.x - this.x;
          const dy = host.y - this.y;
          const dist = Math.max(0.001, Math.hypot(dx, dy));
          const nx = dx / dist;
          const ny = dy / dist;
          const tx = -ny * this.orbitDirection;
          const ty = nx * this.orbitDirection;
          const relativeVX = this.vx - host.vx;
          const relativeVY = this.vy - host.vy;
          const radialVelocity = relativeVX * nx + relativeVY * ny;
          const desiredRadius = host.radius + this.preferredPlanetOffset;
          const radiusError = dist - desiredRadius;
          const orbitSpeed = Math.sqrt((this.aiWorld.G * host.mass) / Math.max(dist, host.radius + 28)) * 0.92;
          let radialCorrection = clamp(radiusError * 0.18 - radialVelocity * 1.1, -34, 34);
          const tooCloseDistance = host.radius + this.radius + 112;

          if (dist < tooCloseDistance) {
            radialCorrection = -56 - Math.min(40, (tooCloseDistance - dist) * 0.4);
          }

          desiredVX = host.vx + tx * orbitSpeed + nx * radialCorrection;
          desiredVY = host.vy + ty * orbitSpeed + ny * radialCorrection;
          orbiting = Math.abs(radiusError) < this.preferredPlanetBand && Math.abs(radialVelocity) < 9 && dist > tooCloseDistance + 12;

          if (Math.hypot(this.vx - host.vx, this.vy - host.vy) > 16) {
            maxAccel = this.maxPlanetMatchAcceleration;
          }

          const desiredRelative = clampVectorMagnitude(
            desiredVX - host.vx,
            desiredVY - host.vy,
            orbiting ? Math.max(orbitSpeed * 1.18, 24) : this.maxCruiseSpeed
          );
          desiredVX = host.vx + desiredRelative.x;
          desiredVY = host.vy + desiredRelative.y;
        }

        const dispositionToPlayer = this.aiPlayer && this.aiPlayer.isAlive
          ? this.getDispositionTo(this.aiPlayer.faction)
          : "neutral";
        const rescueFuelThreshold = this.aiWorld?.merchantRescueFuelThreshold ?? 2;
        const shouldRescuePlayer = !!(
          this.aiPlayer &&
          this.aiPlayer.isAlive &&
          dispositionToPlayer !== "enemy" &&
          this.aiPlayer.fuel <= rescueFuelThreshold &&
          this.aiWorld?.merchantRescueStationId === this.id &&
          !nearbyEnemyCombat
        );

        let enemyTarget = null;
        if (shouldRescuePlayer) {
          const dx = this.aiPlayer.x - this.x;
          const dy = this.aiPlayer.y - this.y;
          const dist = Math.max(0.001, Math.hypot(dx, dy));
          const nx = dx / dist;
          const ny = dy / dist;
          const desiredStandoff = Math.max(
            this.radius + this.aiPlayer.radius + 18,
            Math.min(this.rescueApproachRadius, this.interactionRadius * 0.42)
          );
          const approach = clamp((dist - desiredStandoff) * 0.4, -28, 96);
          desiredVX = this.aiPlayer.vx + nx * approach;
          desiredVY = this.aiPlayer.vy + ny * approach;

          if (dist < desiredStandoff + 14) {
            desiredVX = lerp(desiredVX, this.aiPlayer.vx, 0.7);
            desiredVY = lerp(desiredVY, this.aiPlayer.vy, 0.7);
          }

          orbiting = false;
          maxAccel = Math.max(maxAccel, this.maxPlanetMatchAcceleration * 1.08);
        } else if (this.aiPlayer && this.aiPlayer.isAlive && dispositionToPlayer === "enemy") {
          const dx = this.aiPlayer.x - this.x;
          const dy = this.aiPlayer.y - this.y;
          const dist = Math.hypot(dx, dy);
          if (dist <= this.enemySenseRadius) {
            enemyTarget = this.aiPlayer;
            const desiredStandoff = this.enemyWeaponRange * 0.68;
            const nx = dx / Math.max(0.001, dist);
            const ny = dy / Math.max(0.001, dist);
            const tangentX = -ny * this.orbitDirection;
            const tangentY = nx * this.orbitDirection;
            const approach = clamp((dist - desiredStandoff) * 0.18, -34, 30);
            desiredVX = enemyTarget.vx + tangentX * 24 + nx * approach;
            desiredVY = enemyTarget.vy + tangentY * 24 + ny * approach;
            maxAccel = Math.max(maxAccel, 72);
          }
        } else if (this.aiPlayer && this.aiPlayer.isAlive && dispositionToPlayer === "ally") {
          const dx = this.aiPlayer.x - this.x;
          const dy = this.aiPlayer.y - this.y;
          const dist = Math.hypot(dx, dy);
          if (dist < 900 && !orbiting) {
            const offsetAngle = Math.atan2(dy, dx) + this.orbitDirection * 0.9;
            const offsetDistance = 180 + (this.id % 3) * 40;
            const desiredX = this.aiPlayer.x - Math.cos(offsetAngle) * offsetDistance;
            const desiredY = this.aiPlayer.y - Math.sin(offsetAngle) * offsetDistance;
            desiredVX = this.aiPlayer.vx + (desiredX - this.x) * 0.2;
            desiredVY = this.aiPlayer.vy + (desiredY - this.y) * 0.2;
            maxAccel = Math.max(maxAccel, 56);
          }
        } else if (this.aiPlayer && this.aiPlayer.isAlive) {
          const dx = this.aiPlayer.x - this.x;
          const dy = this.aiPlayer.y - this.y;
          const dist = Math.hypot(dx, dy);

          if (dist < this.playerCourtesyRadius && !orbiting) {
            const t = clamp(1 - dist / this.playerCourtesyRadius, 0, 1);
            const matchStrength = dist < this.interactionRadius * 0.95
              ? 1
              : clamp(0.35 + t * 0.65, 0, 1);
            desiredVX = lerp(desiredVX, this.aiPlayer.vx, matchStrength);
            desiredVY = lerp(desiredVY, this.aiPlayer.vy, matchStrength);
            maxAccel = Math.max(this.maxCourtesyAcceleration, Math.min(this.maxPlanetMatchAcceleration, 30 + t * 14));
          }
        }

        if (!enemyTarget && !this.combatTarget && !orbiting && !this.hostPlanet) {
          if (!this.wanderAngle || Math.random() < dt * 0.35) {
            this.wanderAngle = randomBetween(0, Math.PI * 2);
          }

          const wanderSpeed = this.maxCruiseSpeed * 0.72;
          desiredVX = Math.cos(this.wanderAngle) * wanderSpeed;
          desiredVY = Math.sin(this.wanderAngle) * wanderSpeed;
          maxAccel = Math.max(maxAccel, this.maxThrustAcceleration * 0.82);
        }

        if (this.longRangeReactionTimer > 0) {
          desiredVX += this.longRangeReactionX * 0.18;
          desiredVY += this.longRangeReactionY * 0.18;
          maxAccel = Math.max(maxAccel, 74);
        }

        const grouping = this.computeAllyGrouping();
        desiredVX += grouping.x;
        desiredVY += grouping.y;

        const avoidance = this.computeAvoidance();

        if (avoidance.hardPlanetThreat) {
          orbiting = false;
          maxAccel = Math.max(maxAccel, this.maxPlanetMatchAcceleration);
        }

        const rawSteerX = (desiredVX - this.vx) * 2.1 + avoidance.x;
        const rawSteerY = (desiredVY - this.vy) * 2.1 + avoidance.y;
        maxAccel = Math.max(maxAccel, Math.min(this.maxPlanetMatchAcceleration, this.maxThrustAcceleration + avoidance.extraAccel * 0.55));

        const steer = clampVectorMagnitude(rawSteerX, rawSteerY, maxAccel);
        this.applyAcceleration(steer.x, steer.y, dt);
        this.isOrbitingPlanet = orbiting;

        this.updateCombatTarget();

        let targetAngle = this.combatAimAngle;

        if (!this.combatTarget) {
          const faceVX = Math.abs(rawSteerX) + Math.abs(rawSteerY) > 0.6
            ? rawSteerX
            : desiredVX;
          const faceVY = Math.abs(rawSteerX) + Math.abs(rawSteerY) > 0.6
            ? rawSteerY
            : desiredVY;

          if (Math.hypot(faceVX, faceVY) > 0.001) {
            targetAngle = Math.atan2(faceVY, faceVX);
          } else {
            targetAngle = this.angle;
          }
        }

        this.angle += wrapAngle(targetAngle - this.angle) * clamp(dt * (this.combatTarget ? 7.5 : 4.5), 0, 1);
        this.angularVelocity = 0;
      }

      getCrashSpeedThreshold(baseCrashSpeed) {
        return Math.max(baseCrashSpeed, 500);
      }

      update(dt) {
        this.updateAutopilot(dt);
        super.update(dt);
      }

      draw(ctx, camera) {
        const sx = this.x - camera.x;
        const sy = this.y - camera.y;

        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(this.angle);

        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;

        ctx.beginPath();
        ctx.moveTo(this.radius * 1.12, 0);
        ctx.lineTo(-this.radius * 0.6, -this.radius * 0.58);
        ctx.lineTo(-this.radius * 0.2, 0);
        ctx.lineTo(-this.radius * 0.6, this.radius * 0.58);
        ctx.closePath();
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(-this.radius * 0.14, 0, this.radius * 0.38, 0, Math.PI * 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-this.radius * 0.9, -this.radius * 0.72);
        ctx.lineTo(-this.radius * 0.18, -this.radius * 0.26);
        ctx.moveTo(-this.radius * 0.9, this.radius * 0.72);
        ctx.lineTo(-this.radius * 0.18, this.radius * 0.26);
        ctx.stroke();

        ctx.fillStyle = "rgba(125, 220, 255, 0.2)";
        ctx.fillRect(-this.radius * 1.08, -this.radius * 0.2, this.radius * 0.22, this.radius * 0.4);
        ctx.fillRect(-this.radius * 0.18, -this.radius * 0.12, this.radius * 0.54, this.radius * 0.24);

        ctx.restore();
      }
    }

          const dx = body.x - this.x;
          const dy = body.y - this.y;
          const dist = Math.hypot(dx, dy);
          if (!(dist > 0.001) || dist > this.coinSenseRadius) return;

          const relSpeed = Math.hypot(body.vx - this.vx, body.vy - this.vy);
          const score = dist + relSpeed * 0.14 - Math.max(1, body.value ?? 1) * 18;
          if (score < bestScore) {
            bestScore = score;

          }
        });

        });

        return bestScrap;

      getCrashSpeedThreshold(baseCrashSpeed) {

      updateAutopilot(dt) {
        if (!this.aiWorld) {
          return;
        }

        this.longRangeReactionTimer = Math.max(0, this.longRangeReactionTimer - dt);
        this.hostPlanet = null;
        this.isOrbitingPlanet = false;
        this.updateCombatTarget();

        const coinTarget = this.chooseCoinTarget();
        const scrapTarget = this.targetPreference === "enemy" ? null : this.chooseScrapTarget();
        const grouping = this.computeAllyGrouping();
        const avoidance = this.computeAvoidance();

        let desiredVX = this.vx;
        let desiredVY = this.vy;
        let targetAngle = this.angle;
        let maxAccel = this.maxThrustAcceleration;
        let effectiveMaxSpeed = this.maxCruiseSpeed;

        if (this.combatTarget && this.targetPreference === "enemy") {
          const target = this.combatTarget;
          const dx = target.x - this.x;
          const dy = target.y - this.y;
          const dist = Math.max(0.001, Math.hypot(dx, dy));
          const nx = dx / dist;
          const ny = dy / dist;
          const tx = -ny * this.orbitDirection;
          const ty = nx * this.orbitDirection;
          const desiredDistance = this.enemyStandoffDistance + target.radius * 0.55;
          const approach = clamp((dist - desiredDistance) * 0.22, -44, 54);
          desiredVX = target.vx + nx * approach + tx * 22;
          desiredVY = target.vy + ny * approach + ty * 22;
          targetAngle = this.combatAimAngle;
          maxAccel = Math.max(maxAccel, 82);
          effectiveMaxSpeed = Math.max(this.maxCruiseSpeed, Math.hypot(target.vx, target.vy) + 40);
        } else if (this.combatTarget && this.targetPreference === "asteroid") {
          const asteroid = this.combatTarget;
          const dx = asteroid.x - this.x;
          const dy = asteroid.y - this.y;
          const dist = Math.max(0.001, Math.hypot(dx, dy));
          const nx = dx / dist;
          const ny = dy / dist;
          const desiredDistance = asteroid.radius + this.asteroidApproachDistance;
          const approach = clamp((dist - desiredDistance) * 0.24, -50, 68);
          desiredVX = asteroid.vx + nx * approach;
          desiredVY = asteroid.vy + ny * approach;
          targetAngle = this.combatAimAngle;
          maxAccel = Math.max(maxAccel, 78);
          effectiveMaxSpeed = Math.max(this.maxCruiseSpeed, 182);
        } else if (coinTarget) {
          const dx = coinTarget.x - this.x;
          const dy = coinTarget.y - this.y;
          desiredVX = coinTarget.vx + dx * 2.25;
          desiredVY = coinTarget.vy + dy * 2.25;
          targetAngle = Math.atan2(dy, dx);
          maxAccel = Math.max(maxAccel, 92);
          effectiveMaxSpeed = Math.max(this.maxCruiseSpeed, 188);
          this.combatTarget = null;
          this.combatDistance = Infinity;
        } else if (scrapTarget) {
          const dx = scrapTarget.x - this.x;
          const dy = scrapTarget.y - this.y;
          const dist = Math.max(0.001, Math.hypot(dx, dy));
          const nx = dx / dist;
          const ny = dy / dist;
          const desiredDistance = scrapTarget.radius + 140;
          const approach = clamp((dist - desiredDistance) * 0.24, -44, 58);
          desiredVX = scrapTarget.vx + nx * approach;
          desiredVY = scrapTarget.vy + ny * approach;
          targetAngle = this.updateCombatAim(scrapTarget);
          maxAccel = Math.max(maxAccel, 80);
          effectiveMaxSpeed = Math.max(this.maxCruiseSpeed, 176);
          this.combatTarget = scrapTarget;
          this.combatDistance = dist;
          this.targetPreference = "scrap";
        } else {
          this.combatTarget = null;
          this.combatDistance = Infinity;
          this.wanderRetargetTimer -= dt;
          if (this.wanderRetargetTimer <= 0 || Math.random() < dt * 0.16) {
            this.wanderRetargetTimer = randomBetween(1.8, 3.5);
            this.wanderAngle += randomBetween(-1.0, 1.0);
          }

          const wanderSpeed = this.maxCruiseSpeed * 0.7;
          desiredVX = Math.cos(this.wanderAngle) * wanderSpeed;
          desiredVY = Math.sin(this.wanderAngle) * wanderSpeed;
          targetAngle = Math.atan2(desiredVY, desiredVX);
        }

        if (this.longRangeReactionTimer > 0) {
          desiredVX += this.longRangeReactionX * 0.22;
          desiredVY += this.longRangeReactionY * 0.22;
          maxAccel = Math.max(maxAccel, 88);
          effectiveMaxSpeed = Math.max(effectiveMaxSpeed, this.maxCruiseSpeed + 24);
        }

        desiredVX += grouping.x * 0.6;
        desiredVY += grouping.y * 0.6;

        const rawSteerX = (desiredVX - this.vx) * 2.35 + avoidance.x * 1.2;
        const rawSteerY = (desiredVY - this.vy) * 2.35 + avoidance.y * 1.2;
        maxAccel = Math.max(maxAccel, Math.min(this.maxPlanetMatchAcceleration, this.maxThrustAcceleration + avoidance.extraAccel * 0.72));

        const steer = clampVectorMagnitude(rawSteerX, rawSteerY, maxAccel);
        this.applyAcceleration(steer.x, steer.y, dt);

        const velocity = clampVectorMagnitude(this.vx, this.vy, effectiveMaxSpeed);
        this.vx = velocity.x;
        this.vy = velocity.y;

        if (!this.combatTarget && !coinTarget && Math.hypot(this.vx, this.vy) > 0.001) {
          targetAngle = Math.atan2(this.vy, this.vx);
        }

        this.angle += wrapAngle(targetAngle - this.angle) * clamp(dt * (this.combatTarget ? 7.2 : 4.2), 0, 1);
        this.angularVelocity = 0;
